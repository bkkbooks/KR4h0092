body:
  text: 乾坤清氣巻十一明偶桓編五言絶句錄汴梁宫人語楊奐煥然一入深宫裏經今十五年長因批帖子呼到御床前嵗嵗逢元夜金蛾閙簇巾見人心自怯終是女兒身殿前輪直罷偷去賭金釵怕見黄昏月殷勤上玉堦翠翹珠䘿臂小殿夜藏鈎驀地羊車至低頭笑不休人間多棗栗不到九重天長被黄衫吏花攤月賜錢宣和墨竹寒雀虞集伯生洒墨寫琅玕深宫春晝閒蕭條數枝雪不似紇干山上馬眼昏身手鈍上馬怕風沙秖好扶藜杖循籬看菊花黄筌畫紅蕉十二紅柯九思敬仲故國三千里名禽十二紅白頭供奉在揮淚濕東風題汲水美人圖汲水立銀床照見紅妝影王孫殊未歸寶釧霜花冷題緑竹江南撥鐙法寂寞冷天涯阿誰春雨後貌得翠蛾眉題王節婦巻王沂師魯夫亡姑已塟二子幸成人甚日歸泉下還夫薄命身題扇上著色竹陳旅衆仲江上竹枝歌為君顰兩蛾秋風團扇底零落黛㾗多倪元鎮雨竹落日楚江深鷓鴣啼逺林相思不可見池上冩春隂題顧周道濯足圖潘純子素脫屨白石上濯足清泉中悠然天際想木末生微風飲酒丁復仲容北闕諸公貴東門幾客還撇來缸靣酒擕上屋頭山贈孟通孟通朔方彦領薦過昇州花發瓊林苑題詩向石頭杏花鵝郭翼羲仲溪上好鵝賔相呼雪一羣栁根春水煖來泛杏花雲秋風濯足圖荆棘銅駞陌桑田碧海波秋風歌濯足歸去白雲多絶句山根秋水落江樹與舡清遮莫歸來晚東頭月未生陽春曲栁色青堪把櫻花雪未乾宫中裁白苧猶怯剪刀寒松下釣魚圖鄭東季明皎皎月在樹泠泠風滿衣欲問三江口長歌遂不歸五言律詩恒山樓劉因夢吉萬嶺尊恒岳遺臺枕後潭仰髙慚對坐哭險負竒探影落滄溟北雲開斗柄南山靈怜野客今夕費烟嵐登武陽城朝遊樊子館晚上武陽城潮接滄溟近山連碣石生斷虹雲淡白返照雨疎明日暮悲吟處樵歌巳慘情趙氏南庄許衡仲平晚起北窗凉清談戢羽觴入簾花影重落地燕泥香夢裏青山好吟邉白日長秋風載書籍相對築茅堂輿病髙崖道中作姚燧端甫役役乾坤逺栖栖道路頻五年三入蜀十夢九歸秦瘧鬼偏凌客山英定笑人無勞問前渡祇覺白頭新舟達黄溪草木隨寒暑殊方榮悴同葦花兼露白檉葉未霜紅日月雙飛鳥江湖一病翁晚來沙嶼上愁坐獨書空發舟青神縣青神開百文江岸轉荒凉薜荔懸松起蒹葭竝竹長深披豺虎徑毒犯虺蛇鄉何莫非王事牽夫可惋傷婺源縣齋書事盧摯處道竹樹映清曉坐聞山鳥鳴瓶花香病骨簷雨挾詩聲客亦非餘子春無負此生明朝予問俗吟罷却須晴書梓山寺經室問俗來山谷擕春到竹溪花香破禪寂林樾受鶯啼欲和觀音偈聊乗醉墨題閒雲若留客不肯為余栖青華觀西軒琳宇夏天曉官曹今日閒深松欲無路疎竹不遮山静對黄冠語時㸔白鳥還平生林壑趣聊復此窗閒少林寺贈達禪師古刹東風裏逢僧一解顔收經出深竹披衲下空山未要天花墜聊㸔石影閒何妨病居士明日到田間岳陽樓待渡高克恭彦敬楚水凝千里湘雲隔萬層城髙秋浦月星雜夜船燈旅况天誰管年光雁可憑殷勤淡山色相送過巴陵泊舟湘岸長沙今在眼青草舊知名二月風檣疾三湘雪浪平藤深帝子廟花發定王城莫艤江南岸啼鵑處處聲贈永清曹縣尹趙孟頫子昻赤縣郎官宰清朝學士班雲端雙履冷花裏一琴閒鴻鵠宜天路麒麟近帝闗會當從此召豈待及瓜還送李清甫御史出按四川蜀道青天上繡衣驄馬行霜威御史府春色錦官城萬里平安報三年菽水清相逢一杯酒似為别離情次袁學士上都集韻金城雨露邉河漢歴中天玉殿散青靄瓊樓飄紫烟闗山誠險固宗社自綿延世祖龍飛地皇綱億萬年曉日夾雲樹春風吹雪山飛鷹𤣥磧飲馬白狼灣寶帶呉鈎逈金矛漢節閑將軍萬里外不怕二毛斑贈黄秋江處士李孟道復君釣秋江月我畊秋谷雲逃名君笑我伴食我慙君老我素多病壯君髙出羣何時各歸去雲月兩平分偶成日午山中道停驂進步難鹻侵苔徑滑風入毳袍寒匡國終無補全身尚未安一尊茅店酒强飲不成歡寄東宫艱危勤扈從俯仰盡周旋小試屠龍技翻成抱虎眠脫鈎魚縱壑漏網鳥冲天萬事從今始灰心未死前十年陪顧問一旦決安危自合成功去應慚識事遲長城徒自壞孤注莫相疑辟穀求仙者髙名百世師送張尚德虞集伯生六月初聞雨官河潦水生江南歸宋玉樓下謝荀卿鵰鴞青霄逈兼葭白露盈都留詩興在來聽上林鶯明皇按樂圖新度霓裳曲三年敎有成驚鴻渾不下飛燕若為輕芍藥春亭莫芙蓉野水生梨園多白髮吹笛到天明送長沙守白髮長沙守循良又好文近辭金馬去逺有玉魚分對竹聽湘雨開簾㸔岳雲漢廷思賈誼一飯莫忘君贈楊友直雒陽楊友直字擬漢中郎畫若錐穿石垂如雨溜墻舞花羞女美醉草笑僧狂昨日鴻都學煩君冩數行錢舜舉畫一樹花如雪清明客未歸坐㸔黄鳥竝夢作綵雲飛翠袖寒猶薄羊車過絶稀相如能作賦月下巻春衣寄段惟德竈副持節雙溪上寒梅照鬂華臨風懷鳳閣見月憶龍沙夜訪山隂竹晨飡海上瓜自嗟留滯久欲斷使君車畫檜茅山多古樹此檜更長生鸛鶴栖來稳蛟龍化得成雲深還近户月落似聞笙千載如相見蒼然故舊情八月八日有感書視草堂壁載筆趍芸閣探囊索緼袍坐銷秋日静心折夜風髙識字頭先白謀生計轉勞文園多病渴常想賜葡萄汪道士草亭飛白妙娉婷新題照草亭仙遺相鶴法客借換鵝經霧雨歸縣黍風雲䕶茯苓遥知春晝永深坐讀黄庭送魯子翬亷使之漢中封上頌臺禮輕車入漢中節毛吹渭雨木葉動秦風把酒臺基古馳書嵗事豐朝回倚西閣日日數歸鴻送朱潛虚之廣東照磨聖主多清暇臨池愛日長天章垂鳳彩雲氣動龍香進諌慙簮筆争書敢近床承恩君最早服玉向炎方寄薩天鍚進士江上新詩好亦知公事閒投壺深竹裏繫馬古松間夜月多臨海秋風或在山玉堂蕭爽地思爾珮珊珊答榮存初參議秋夜見寄寄館城門夕髙秋雨露開天垂華蓋近月轉紫垣來疎闊思良㑹淹留到不才深期謝安石揮麈散風埃晚過孔奉章舍下范梈德機滄江一萬里書信近如何向暮客懷薄及秋鄉夢多故人相慰藉竝舍數經過但願長無事彤庭接珮珂哀文集賢時奉使南海道卒瘴海距天闗道踰千萬山空傳靈雨送不見使星還旌斾青楓暗樓臺白水閒郡人唯我最逺客淚潺潺京下思歸黄落薊門秋飄飄在逺遊不眠聞戍鼓多病憶歸舟甘雨從昏過繁星達曙流鄉無徐孺子萬口薄南州貴州離思久不愜幽情晚更添天宜明月獨山與客雲兼蛩語通支柱蛛絲映捲簾若無光霽在何以破朱炎通潮閣候館駐征騎西風獨夜清閉門聞葉落倚杖㸔潮生有禮齊蠻俗無歌學楚聲凄凉蘇季子行處足髙名送鄧慶長從宦吳中聞說吳中郡青山萬疊開雲霞通井邑水木映樓臺子去嗟何恨吾生念却迥辛勤官下養書寄合頻來答李宗明采江莫采蘋思食莫思蓴間嵗曽為客經時獨夢人林園花動夕帷帳草留春萬里燕山路空懷涕泗頻客居惟所適不是逺時人聞喜池臺僻來依第宅新月涵鍾警夕風引釀生春頗得過從樂相㸔莫厭頻酬王繼學大參久客嵗云暮悠悠念異鄉病因詩暫愈愁為酒先降屋隠疎篁半城依老樹雙晨朝有好鳥命我隔東窗寄邵允文馬祖常伯庸故友經年别如今髮白無清秋江鷺浴長夏野猿呼客舍栖書冊齋厨具筍蒲知賢不能薦羞澀望東吳南征乆雨闗河濕今朝日始晴浮舡下夜瀬覔酒近春城鵝鴨將雛出牛羊傍母行獨怜無侣客萬里又南征石田山居甲子人愁雨河田麥巳丹嵗㐫捐瘠衆天逺禱祠難賈客還沽酒王孫自飽飡更怜䵩面黑征戍出桑乾四月淮天雨清林䕃碧池筍香隣甕酒禽聽客窗棋田鼓春迎社鄉巫夜賽祠漸知飄泊久自覺是農師郎中蘇公哀挽墓門翁仲泣秋草九原深身世書盈屋鄉園樹滿林故人多執紼令子早冠簮曽作陽闗曲今成薤露吟羅學士奉㫖南祀海岳繇鍾陵相别聞尚宿留會稽有懷奉寄掲傒斯曼碩鍾陵一分手幾日過錢塘五月山隂路千峰海上凉烟霞含景氣草木識天香夙昔經行處風流轉不忘題祝道士龍虎山先天觀圖聞說先天觀重重絶壁環鳥啼青澗裏花落白雲間樵子能長嘯居人識大還洞門無處認唯有水潺湲黄尊師髙軒觀鵝因留宿開軒南岳下世事未曽聞落葉常疑雨方池半是雲偶尋騎鶴侣來此㸔鵝羣一夜潺湲裏秋光得細分送人之淮東扁舟何處客此去飽經過彭蠡江聲合揚州月色多天低知近海地濶欲横河自是吾生拙如君定若何廬阜聞鐘廬山三百寺何處扣層雲宿鳥月中起歸人湖上聞入空應更逈近瀑正難分遥想諸僧定香爐上夕熏送蘇尊師歸茅山華陽隠居者聞復有蘇仙時向梅花下髙枕石頭眠劒匣出飛電琴心流暗泉閒來京闕下夜夜夢雲邉送張漢英之廣西憲幕候雁幾時到送君今逺遊三湘秋欲老五嶺瘴全收隨俗調眠食乗時力進脩賢侯開幕府萬一子能留懷沆姪蔌蔌黄桑葉蒼蒼白竹峰居人争野碓歸客背林鐘路暗縁溪濕山寒著霧濃阿咸收稻未辛苦缺相從象石王士熈繼學老石何年有江頭閲嵗華蜿蜒龍吸水突兀象蹲沙地軸資神禹天工付女媧歸來銀漢客好與共空槎寄友人劉師魯楊載仲𢎞聞君遊宦處正値洞庭湖落日波濤壯晴天島嶼孤舟帆通漢沔風物覧衡巫天下文章弊非公孰起予渡江寄俞仲連舟濟大江濆中流日欲曛鹵翻沙際雪潮落渡頭雲鯨躍常知候鴻飛不亂羣頗思論勝槩把酒莫如君和孟東野題崑山寺蘭若負崑崗鑿崖安佛床梯雲石磴滑入厨泉水香旦寒鳥相聚月黑龍放光舟行苦局促幸憇殊勝塲酬子行初秋風颶之變暮夜風濤變崩騰怒不休魚龍皆失穴江海欲同流竝岸漂千舍連檣覆萬艘隂陽知有沴惻愴動深憂奉題伯父雙峰樵隠山出雙峰秀溪流一沠清土風存禮讓人事省將迎路逐髙低過田隨早晚耕家林有如此南望每闗情童穉離桑梓猶能憶故山雲峯垂白脚蘚石露蒼顔插架詩書富應門禮義閒緑林遺我恨回首涙䦨珊石樹盤根瘦沙溪激浪清竹間㸔犢卧木末見人行穡事常分力樵歌輒和聲從來擕杖處不礙白雲生山曲兩三家相過路不賒對門開竹徑臨水種梅花酒熟留人醉詩成任客誇時時談舊事相㸔鬢垂華蠧簡往古韋編在何年始汗青蠧蟲深卜宅蝌蚪不成形泯滅沾秦火搜羅出漢廷斯文天未䘮不敢望全經敗裘寂寞牛衣子能無敝緼袍塵埃須浣濯蟣虱費爬搔意味存鷄肋寒凉視馬毛千金既銷鑠猶聽朔風號送葉彦中之官行臺范滂將攬轡周景巳題輿九扈名兼美三鱣兆豈虚都門愁摻袂江徼喜沿書重有斑衣奉南州摠不如送張宣撫使嶺南奉使入蠻烟終軍始妙年抗旌辭朔野擊節渡湘川翠竹侵岩際黄茅盡海邉狼荒非善地為戒莫留連送孫大方歸朝元宫飛構上凌空依稀想故宫金盤凝曉露玉珮振秋風溟涬那違俗支離更飬䝉大還何日就變化入無窮送胡汲古之吳中有客佩蒼精居然得此生山開栖越跡水泝入呉程佚老悠悠計傷離戀戀情食菲方未巳應不為魚羮送王元禮歸平城牧羊怜馬援投筆困班生侯印終兼綰窮愁實飽更大材當用世小拙亦知名快飲桑乾酒能澆氣不平酬張宣撫瀛海無消息冥冥道路長巳驚雙鬢短更待兩瞳方落日依平嶂洪河入大荒憂來那可得揮涕欲沾裳和袁集賢上都雜詠栁貫道傳出塞行瞻日趨朝喜近天離宫開苑囿馳道絶風烟瑤水巡非逺峒山厯更綿甘泉多法從獻賦憶當年雨水漸衣黑雲沙際目黄烟開纔黯淡日出已蒼凉徇俗髙簷帽清心小篆香端居萬里念蕙草惜微芳謠俗隨方異溝途隔舍迷醺人唯馬湩勸客有駞蹄殿角孤花靚城隅雜樹低天涯中夜舞如意昔曽擕天潢猶白白雲幙故青青積潦摧車軸髙風堕箭翎宫塗丹赭堊殿户紫金釘女樂蓬萊秘哀簫動杳𠖇幄殿層雲陣轅門積雪峰竒鷹皆戴角御馬盡飛龍瀚海將臨幸云亭望陟封青丘大羽獵有事待𤣥冬乾坤清氣巻十一
