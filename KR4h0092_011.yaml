body:
  text: 乾坤清氣卷十一明偶桓編五言絶句録汴梁宫人語楊奐煥然一入深宫裏經今十五年長因批帖子呼到御床前嵗嵗逢元夜金蛾閙簇巾見人心自怯終是女兒身殿前輪直罷偷去賭金叉怕見黃昏月殷勤上玉階翠翹珠䘿臂小殿夜藏鈎驀地羊車至低頭笑不休人間多棗栗不到九重天長被黃衫吏花攤月賜錢宣和墨竹寒雀虞集伯生灑墨寫琅玕深宫春晝間蕭條數枝雪不似紇干山上馬眼昏身手鈍上馬怕風沙秖好扶藜杖循籬看菊花黃筌畫紅蕉十二紅柯九思敬仲故國三千里名禽十二紅白頭供奉在揮淚濕東風題汲水美人圖汲水立銀床照見紅妝影王孫殊未歸寶釧霜花冷題緑竹江南撥鐙法寂寞冷天涯阿誰春雨後貌得翠蛾眉題王節婦卷王沂師魯夫亡姑已葬二子幸成人甚日歸泉下還夫薄命身題扇上著色竹陳旅衆仲江上竹枝歌為君顰兩蛾秋風團扇底零落黛䀶多倪元鎮雨竹落日楚江深鷓鴣啼逺林相思不可見池上寫春隂題顧周道濯足圖潘純子素脫屨白石上濯足清泉中悠然天際想木末生微風飲酒丁復仲容北闕諸公貴東門幾客還撇來缸靣酒擕上屋頭山贈孟通孟通朔方彥領薦過升州花發瓊林苑題詩向石頭杏花鵝郭翼羲仲溪上好鵝賔相呼雪一羣栁根春水暖來泛杏花雲秋風濯足圖荆棘銅駝陌桑田碧海波秋風歌濯足歸去白雲多絶句山根秋水落江樹與船清遮莫歸來晚東頭月未生陽春曲栁色青堪把櫻花雪未乾宫中裁白苧猶怯剪刀寒松下釣魚圖鄭東季明皎皎月在樹泠泠風滿衣欲問三江口長歌遂不歸五言律詩恆山樓劉因夢吉萬嶺尊恆嶽遺臺枕後潭仰髙慚對坐哭險負竒探影落滄溟北雲開斗柄南山靈憐野客今夕費煙嵐登武陽城朝遊樊子館晚上武陽城潮接滄溟近山連碣石生斷虹雲淡白返照雨疏明日暮悲吟處樵歌巳慘情趙氏南莊許衡仲平晚起北窗涼清談戢羽觴入簾花影重落地燕泥香夢裏青山好吟邉白日長秋風載書籍相對築茅堂輿病髙崖道中作姚燧端甫役役乾坤逺栖栖道路頻五年三入蜀十夢九歸秦瘧鬼偏凌客山英定笑人無勞問前渡祇覺白頭新舟達黃溪草木隨寒暑殊方榮悴同葦花兼露白柳葉未霜紅日月雙飛鳥江湖一病翁晚來沙嶼上愁坐獨書空發舟青神縣青神開百文江岸轉荒涼薜荔懸松起蒹葭並竹長深披豺虎徑毒犯虺蛇鄉何莫非王事牽夫可惋傷婺源縣齋書事盧摯處道竹樹映清曉坐聞山鳥鳴瓶花香病骨簷雨挾詩聲客亦非餘子春無負此生明朝豫問俗吟罷却須晴書梓山寺經室問俗來山谷擕春到竹溪花香破禪寂林樾受鶯啼欲和觀音偈聊乘醉墨題間雲若留客不肯為余栖青華觀西軒琳宇夏天曉官曹今日間深松欲無路疏竹不遮山靜對黃冠語時看白鳥還平生林壑趣聊復此窗間少林寺贈達禪師古剎東風裏逢僧一解顔收經出深竹披衲下空山未要天花墜聊看石影間何妨病居士明日到田間嶽陽樓待渡高克恭彥敬楚水凝千里湘雲隔萬層城髙秋浦月星雜夜船燈旅况天誰管年光雁可憑殷勤淡山色相送過巴陵泊舟湘岸長沙今在眼青草舊知名二月風檣疾三湘雪浪平藤深帝子廟花發定王城莫艤江南岸啼鵑處處聲贈永清曹縣尹趙孟俯子昻赤縣郎官宰清朝學士班雲端雙履冷花裏一琴間鴻鵠宜天路麒麟近帝關會當從此召豈待及瓜還送李清甫御史出按四川蜀道青天上繡衣驄馬行霜威御史府春色錦官城萬里平安報三年菽水清相逢一杯酒似為别離情次袁學士上都集韻金城雨露邉河漢歷中天玉殿散青靄瓊樓飄紫煙關山誠險固宗社自綿延世祖龍飛地皇綱億萬年曉日夾雲樹春風吹雪山飛鷹玄磧飲馬白狼灣寶帶吳鈎逈金矛漢節間將軍萬里外不怕二毛斑贈黃秋江處士李孟道復君釣秋江月我耕秋谷雲逃名君笑我伴食我慙君老我素多病壯君髙出羣何時各歸去雲月兩平分偶成日午山中道停驂進步難鹻侵苔徑滑風入毳袍寒匡國終無補全身尚未安一尊茅店酒強飲不成歡寄東宫艱危勤扈從俯仰盡周旋小試屠龍技翻成抱虎眠脫鈎魚縱壑漏網鳥沖天萬事從今始灰心未死前十年陪顧問一旦決安危自合成功去應慚識事遲長城徒自壞孤注莫相疑辟穀求仙者髙名百世師送張尚德虞集伯生六月初聞雨官河潦水生江南歸宋玉樓下謝荀卿雕梟青霄逈兼葭白露盈都留詩興在來聽上林鶯明皇按樂圖新度霓裳曲三年教有成驚鴻渾不下飛燕若為輕芍藥春亭莫芙蓉野水生梨園多白髮吹笛到天明送長沙守白髮長沙守循良又好文近辭金馬去逺有玉魚分對竹聽湘雨開簾看嶽雲漢廷思賈誼一飯莫忘君贈楊友直雒陽楊友直字擬漢中郎畫若錐穿石垂如雨溜墻舞花羞女美醉草笑僧狂昨日鴻都學煩君寫數行錢舜舉畫一樹花如雪清明客未歸坐看黃鳥並夢作綵雲飛翠袖寒猶薄羊車過絶稀相如能作賦月下卷春衣寄段惟德竈副持節雙溪上寒梅照鬢華臨風懷鳳閣見月憶龍沙夜訪山隂竹晨餐海上瓜自嗟留滯久欲斷使君車畫檜茅山多古樹此檜更長生鸛鶴栖來穩蛟龍化得成雲深還近户月落似聞笙千載如相見蒼然故舊情八月八日有感書視草堂壁載筆趍藝閣探囊索緼袍坐銷秋日靜心折夜風髙識字頭先白謀生計轉勞文園多病渴常想賜葡萄汪道士草亭飛白妙娉婷新題照草亭仙遺相鶴法客借換鵝經霧雨歸縣黍風雲護茯苓遙知春晝永深坐讀黃庭送魯子翬亷使之漢中封上頌臺禮輕車入漢中節毛吹渭雨木葉動秦風把酒臺基古馳書嵗事豐朝回倚西閣日日數歸鴻送朱潛虛之廣東照磨聖主多清暇臨池愛日長天章垂鳳彩雲氣動龍香進諌慙簮筆爭書敢近床承恩君最早服玉向炎方寄薩天鍚進士江上新詩好亦知公事間投壺深竹裏繫馬古松間夜月多臨海秋風或在山玉堂蕭爽地思爾珮珊珊答榮存初參議秋夜見寄寄館城門夕髙秋雨露開天垂華蓋近月轉紫垣來疏闊思良會淹留到不才深期謝安石揮麈散風埃晚過孔奉章舍下范梈德機滄江一萬里書信近如何向暮客懷薄及秋鄉夢多故人相慰藉並舍數經過但願長無事彤庭接珮珂哀文集賢時奉使南海道卒瘴海距天關道踰千萬山空傳靈雨送不見使星還旌斾青楓暗樓臺白水間郡人唯我最逺客淚潺潺京下思歸黃落薊門秋飄飄在逺遊不眠聞戍鼓多病憶歸舟甘雨從昏過繁星達曙流鄉無徐孺子萬口薄南州貴州離思久不愜幽情晚更添天宜明月獨山與客雲兼蛩語通支柱蛛絲映捲簾若無光霽在何以破朱炎通潮閣候館駐征騎西風獨夜清閉門聞葉落倚杖看潮生有禮齊蠻俗無歌學楚聲凄涼蘇季子行處足髙名送鄧慶長從宦吳中聞説吳中郡青山萬疊開雲霞通井邑水木映樓臺子去嗟何恨吾生念却迥辛勤官下養書寄合頻來答李宗明采江莫采蘋思食莫思蓴間嵗曽為客經時獨夢人林園花動夕帷帳草留春萬里燕山路空懷涕泗頻客居惟所適不是逺時人聞喜池臺僻來依第宅新月涵鍾警夕風引釀生春頗得過從樂相看莫厭頻酬王繼學大參久客嵗云暮悠悠念異鄉病因詩暫愈愁為酒先降屋隱疏篁半城依老樹雙晨朝有好鳥命我隔東窗寄邵允文馬祖常伯庸故友經年别如今髮白無清秋江鷺浴長夏野猿呼客舍栖書册齋厨具筍蒲知賢不能薦羞澀望東吳南征久雨關河濕今朝日始晴浮船下夜瀨覔酒近春城鵝鴨將雛出牛羊傍母行獨憐無侣客萬里又南征石田山居甲子人愁雨河田麥巳丹嵗凶捐瘠衆天逺禱祠難賈客還沽酒王孫自飽餐更憐黧面黑征戍出桑乾四月淮天雨清林蔭碧池筍香鄰甕酒禽聽客窗棋田鼓春迎社鄉巫夜賽祠漸知飄泊久自覺是農師郎中蘇公哀挽墓門翁仲泣秋草九原深身世書盈屋鄉園樹滿林故人多執紼令子早冠簮曽作陽關曲今成薤露吟羅學士奉旨南祀海嶽繇鍾陵相别聞尚宿留會稽有懷奉寄揭傒斯曼碩鍾陵一分手幾日過錢塘五月山隂路千峰海上涼煙霞含景氣草木識天香夙昔經行處風流轉不忘題祝道士龍虎山先天觀圖聞説先天觀重重絶壁環鳥啼青澗裏花落白雲間樵子能長嘯居人識大還洞門無處認唯有水潺湲黃尊師髙軒觀鵝因留宿開軒南嶽下世事未曽聞落葉常疑雨方池半是雲偶尋騎鶴侣來此看鵝羣一夜潺湲裏秋光得細分送人之淮東扁舟何處客此去飽經過彭蠡江聲合揚州月色多天低知近海地濶欲橫河自是吾生拙如君定若何廬阜聞鐘廬山三百寺何處扣層雲宿鳥月中起歸人湖上聞入空應更逈近瀑正難分遙想諸僧定香爐上夕熏送蘇尊師歸茅山華陽隱居者聞復有蘇仙時向梅花下髙枕石頭眠劒匣出飛電琴心流暗泉間來京闕下夜夜夢雲邉送張漢英之廣西憲幕候雁幾時到送君今逺遊三湘秋欲老五嶺瘴全收隨俗調眠食乘時力進修賢侯開幕府萬一子能留懷沆姪蔌蔌黃桑葉蒼蒼白竹峰居人爭野碓歸客背林鐘路暗緣溪濕山寒著霧濃阿咸收稻未辛苦缺相從象石王士熙繼學老石何年有江頭閲嵗華蜿蜒龍吸水突兀象蹲沙地軸資神禹天工付女媧歸來銀漢客好與共空槎寄友人劉師魯楊載仲𢎞聞君遊宦處正值洞庭湖落日波濤壯晴天島嶼孤舟帆通漢沔風物覽衡巫天下文章弊非公孰起豫渡江寄俞仲連舟濟大江濆中流日欲曛鹵翻沙際雪潮落渡頭雲鯨躍常知候鴻飛不亂羣頗思論勝槩把酒莫如君和孟東野題崑山寺蘭若負崑岡鑿崖安佛床梯雲石磴滑入厨泉水香旦寒鳥相聚月黑龍放光舟行苦局促幸憩殊勝場酬子行初秋風颶之變暮夜風濤變崩騰怒不休魚龍皆失穴江海欲同流並岸漂千舍連檣覆萬艘隂陽知有沴惻愴動深憂奉題伯父雙峰樵隱山出雙峰秀溪流一沠清土風存禮讓人事省將迎路逐髙低過田隨早晚耕家林有如此南望每關情童稚離桑梓猶能憶故山雲峯垂白腳蘚石露蒼顔插架詩書富應門禮義間緑林遺我恨回首淚闌珊石樹盤根瘦沙溪激浪清竹間看犢卧木末見人行穡事常分力樵歌輒和聲從來擕杖處不礙白雲生山曲兩三家相過路不賒對門開竹徑臨水種梅花酒熟留人醉詩成任客誇時時談舊事相看鬢垂華蠧簡往古韋編在何年始汗青蠧蟲深卜宅蝌蚪不成形泯滅沾秦火搜羅出漢廷斯文天未喪不敢望全經敗裘寂寞牛衣子能無敝緼袍塵埃須浣濯蟣虱費爬搔意味存雞肋寒涼視馬毛千金既銷鑠猶聽朔風號送葉彥中之官行臺范滂將攬轡周景巳題輿九扈名兼美三鱣兆豈虛都門愁摻袂江徼喜沿書重有斑衣奉南州總不如送張宣撫使嶺南奉使入蠻煙終軍始妙年抗旌辭朔野擊節渡湘川翠竹侵岩際黃茅盡海邉狼荒非善地為戒莫留連送孫大方歸朝元宫飛構上凌空依稀想故宫金盤凝曉露玉珮振秋風溟涬那違俗支離更飬蒙大還何日就變化入無窮送胡汲古之吳中有客佩蒼精居然得此生山開栖越迹水泝入吳程佚老悠悠計傷離戀戀情食菲方未巳應不為魚羮送王元禮歸平城牧羊憐馬援投筆困班生侯印終兼綰窮愁實飽更大材當用世小拙亦知名快飲桑乾酒能澆氣不平酬張宣撫瀛海無消息冥冥道路長巳驚雙鬢短更待兩瞳方落日依平嶂洪河入大荒憂來那可得揮涕欲沾裳和袁集賢上都雜詠栁貫道傳出塞行瞻日趨朝喜近天離宫開苑囿馳道絶風煙瑤水巡非逺洞山厯更綿甘泉多法從獻賦憶當年雨水漸衣黑雲沙際目黃煙開才黯淡日出已蒼涼徇俗髙簷帽清心小篆香端居萬里念蕙草惜微芳謠俗隨方異溝途隔舍迷醺人唯馬湩勸客有駝蹄殿角孤花靚城隅雜樹低天涯中夜舞如意昔曽擕天潢猶白白雲幕故青青積潦摧車軸髙風墮箭翎宫塗丹赭堊殿户紫金釘女樂蓬萊祕哀簫動杳冥幄殿層雲陳轅門積雪峰竒鷹皆戴角御馬盡飛龍瀚海將臨幸云亭望陟封青丘大羽獵有事待玄冬乾坤清氣卷十一
