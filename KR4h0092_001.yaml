body:
  text: 乾坤清氣卷一明偶桓編五言古詩有大如天地劉因夢吉有大如天地日夜常乾乾有小如螻蟻營營誰使然我亦形跡中豈得獨安間萬物相為用錯綜盈兩間如身百骸具少一為不完有形無虗生豈豫獨贅偏森然氣分內既有不可鐫蝮蛇誰宥之生生亦能延安有人道尊堙滅獨不傳乾乾以為師餘者一聽天晨起書事蒼星彗明河三月麗朱方兩月忽散落一月留中央下有五星連西近東少張仰靣東北隅流星墜彩芒誰令月有癭飄搖及吾窗須㬰日東生有星環四旁一星當日中佇視搖晶光自北忽西旋老陽已榆桑西北雲一絲翠暈揚清芳嫩雲生碧蘚得句聲琅琅俄見雲有魚其大丈許長火繩紛繞之昂然欲飛揚呼友與共觀此境已茫茫靈樞夢為病周官夢為祥寤言札諸闥庸俟知者詳燕歌行薊門來悲風易水生寒波雲物何改色遊子唱燕歌燕歌在何處盤礴西山阿武陽燕下都歲晚獨經過青丘遙相連風雨墮嵯峨七十齊郡邑百二秦山河學術有管樂道義無丘軻蚩蚩魚肉民誰與休干戈往事已如此後來復如何割地更石郎曲終哀思多馮瀛王道吟詩臺林壑少佳色風霜有清秋為問北山靈吟臺何久留時危亦常事人生足良謀不有撥亂功當乘浮海舟飄飄扶搖子脫屣雲臺游每聞一朝革尚作數日愁朝廷乃自樂山林為誰憂視彼昂昂駒奈此泛泛鷗四維既不張三綱遂橫流坐令蚩蚩氓謂此聖與儔蚩蚩尚可恕儒臣豈無尤不有歐馬筆孰能用萬牛太行千里來瀟灑橫中州今朝此登臨孤懷漲嵒幽何當剗疊嶂一洗他山羞翟節婦兵塵浩無際烈士難自全婦人無九首志欲不二天燕山翟氏女既嫁夫防邊一朝聞死事健婦增慨然生有如此夫蚤寡非所憐求尸白刃中負土家山前事去哀益深義盡身可捐無兒欲何為所依惟黃泉鄉鄰救引决烈日丹衷縣誰辨節孝翁重賦睢陽賢我昨過其鄉山水猶清妍聞風髮如竹飄蕭動踈煙千年吟詩臺峨峨太寧巔為招馮太師和我節婦篇和陶詠荆軻兩兒戲邯鄲六國朝秦嬴秦王鷙鳥姿得飽肯顧卿燕丹一何淺結客報咸京當時勢已危竒謀不及行政使無此舉寧免繫頸纓如丹不足論世豈無豪英天方事掃除孰禦狂飈聲我欲論成敗高歌呼賈生乾坤有大義迅若雷霆驚堂堂九國師誰定討罪名一戰固未晚何為割邊廷區區六孱王山東但空城孟荀豈無術乘時失經營今雖聖者作不救亂已成酒酣發羽奏亂我懷古情古意劉祁京叔庭前有佳樹緑葉尚離披秋風動地起飄零將安歸高飛入青雲下飛落汙泥貴賤既偶爾孰為喜與悲秋江有芙蓉顔色好鮮潔褰裳欲采折水深不及涉嚴風下飛霜芳艷空凋歇悵望一長歎臨川無桂楫懷長源涼月夜如水秋風吹紫蘭獨立悵無聊佳人阻河山河山邈千里相望何時已雲橫鴈影沉露下蟲聲起烽火照中州西南殺氣浮君居劉山下果若向時不人生有離别但惜知音絶匣內卧青蛇光芒射秋月汴水碧參差葉飛空樹枝如何相憶處還值莫秋時送雷伯盛朔風起天末落木鳴空山氷霜正凝沍遊子百里還出郭送將别徘徊上高原如何暌離情對此芳歲䦨壯士志四方不須涕汍瀾人生非山海㑹靣亦不難願子崇明德餘功振文翰長因東南鴻惠我金玉言送鄧善之提舉江浙盧亘彥威離離天星高皓皓雲月光候鴈過楚澤蟋蟀鳴中堂天時諒難測徒然多感傷念子去意遠深憂結中腸憶昔初奉歡露白春蘭芳清尊罷新製妙趣深濠梁飛景急西匿川流浩湯湯𤣥髮淒歲晚木落天雨霜蔓草豈容惜松柏在高岡春思趙孟俯子昂春柳黃如鵝春江皺緑波美人在何許忽若阻山河攀條弄白日常恐成蹉跎懷思鬱不舒佳期將奈何良辰難驟得臨風空浩歌出都都邑何雄麗車馬日喧喧雞鳴趍蘭省日夕不遑眠兹晨奉明詔馳驛東南奔雪積原野白路修煙塵昏馬鳴朔風起壯士慘無言還顧望帝京更覺勞心魂我今無家客斷蓬離本根願為雙飛鶴奮翅入青雲擬古長夜何漫漫寒雞胡不鳴我行在中野霜露上沾纓虎豹夾路啼熊羆復縱橫我前鬼長嘯我後啼鼯鼪四顧寂無人北斗高且明天道誠幽逺吾心空屏營古風詩亡春秋作仲尼益苦心空言恐難託指事著亦深大義炳如日萬古仰照臨鳯鳥久不至楚狂乃知音愁來不得語起坐彈吾琴絶代有佳人被服綺與紈蛾眉秀聨姢吐詞芬若蘭清歌啓皓齒瑶琴發哀彈一彈再三歎聽者涕汍瀾借問誰家子為言本邯鄲讀伯庸學士止酒詩貢奎仲章今晨不可出大風吹我帷陋巷泥沮洳空牆雨淋漓研硃課兒書冥思解群疑敲門童子來袖有止酒詩讀之至再三擊節喜且悲若飲以𤣥酒揖讓陶唐時峩峩古冠裳執彼璋與圭短褐才掩脛藜藿空忘飢風雅久已衰作者微君誰嗟我重景仰老大將何為月出古城東虞集伯生月出古城東海氣浮空濛車騎各已息宫闕何穹窿牧馬草上露吹笳沙際風帳中忽聞雁傳令彀雕弓出直次韻月下白玉階露生黃金井疏條棲鵲寒衰蕙流螢冷戀闕感時康懷歸覺宵永晨鐘禁中來白髮聊自整寄陳衆仲助教上都作學省足清晝詞垣驚早秋美人隔河漢落月在高樓持衣未成曲吹笛不勝愁還趨鳷鵲觀别製鷫鸘裘茅山道士雲松巢昔年李太白廬山思結巢褰雲自天上和鶴止松梢道士潘文遠高居古大茅誦經門卧虎看劍石眠蛟飛步脫鳬舄長吟吹鳯匏九江攬秀色許爾作神交送張兵部孟功巡河分題得屋上烏花發上陽春門開未央曙城柝起羣棲流光散朝羽息景須近簷結巢願當户轆轤轉金井終日灌嘉樹送張道士歸上清白雲旴水上自古多仙人手擕緑玉杖頭戴白綸巾袖中出風雨天上禮星辰歸來庭户靜芳草自生春送張鍊師歸武當范梈德機張君瀛洲人來作武當客始來武當時祗著謝公屐弟子百數輩稍稍來服役誅茅立萬柱空中現金碧辛苦三十年夜卧不側席以之律鬼神故亦如短墨元年踰冬旱朱火燒四國野谷方焦熬六月畿甸赤朝廷亦不愛犧牲與圭璧僵巫暨憊史歌舞無消息君時待詔來公卿初不識一朝傳天語問以濟旱䇿君云臣鄙愚造化非所測隂陽有開閉此實智者責公卿復致辭物生今孔棘已敕京兆尹取足輸粟帛此如解倒縣祀事惟所擇君聞猶固讓心實內憂惕飛章白玉闕瀝膽殫悃愊臣實才淺鮮臣實學迮塞臣有一寸心願輔后皇德后皇本愛民民今旱為厄或者罪有由皇亦重開釋祈謝各有方咒禁各有式上堂薦明水下堂考金石夜分請命既昧爽大施設為壇東市門經紀法靈册庭中𤣥武旗飄飄墨黍黑君臨一揮手怒髮上霄直指揮東方龍卷水東海側指揮西方龍卷水略西極北南暨中央各以方率職某日某甲子漏下五十刻我在壇上伺不得忤區畫豐隆與飛亷列缺與辟歷汝將汝風馳汝遣汝雷擊汝雲馮勿漓汝雨必三尺汝不從誓言不畏上帝敕至期果響畣動蕩七日澤常時人所難君若不以力公卿奏天子是必有褒錫可以寵號名可以蕃服裼君曰天子聖卿從誠所格臣敢貪天功况在歸計迫昨得山中書至自青溪宅向來百弟子遲歸在朝夕暾時冬序半霜下木葉積明當課剪伐結搆西巖壁山田晚報熟芝术及采摘獮猿長如人夜夜盜柿栗隄防茍不豫六時盡蟊賊公家事既己私事容棄擲方知用世士遺世等糠籺所過如虛空焉知去留迹我持一杯酒欲以贈遠色歲暮不見君悵望空山翮贈馮鍊師歸嶽陽王子吹笙侣精神如九秋暫擕碧山屐遨嘯帝王州江湖未識靣寄語旋鳴騶夏雲逼幽澗春鳥啼芳洲行色當及時景氣適惠柔眷眷將歸客勝日懷林丘何時謝燕闕亦得西南游洞庭木葉下期爾嶽陽樓贈安西王提舉别車聲何軋軋我去亦翩翩借問車中人幾時到秦川秦疆數千里西與雲棧連行人秣馬過猿啼上青天長安古帝州宅土腴不偏聞君畣平昔宦游秪晏眠十齡涉文史十五懷家氊二十學壯游五十綴朝聨奉常老掌故今已二十年功業晚何就蕭蕭髮垂肩天子念縫掖錫官頗靜便紫衣綰墨綬此是車中緣飄颻上都門白馬錦連乾舉案招青山孟光老猶賢大兒坐車軒小兒調馬鞭中兒又絶好國語荷珠圓旦夕俟君至買舍清渭壖此皆足慰意日食官俸錢俸錢足養親親自有圭田人生慕富貴富貴翻受憐不有鍾鼎食亦無膏火煎前日三市事目擊心凛然當時氣凌人不得呵烏鳶觀君浩蕩去萬事當棄捐孔子不西行及河軌再旋今君涉河流西路方綿綿終南與嵩華是中多神仙仙掌出浮雲上有三峰蓮真人玉柱杖掛在明月弦便當往從之吸月升太𤣥金鼎交龍虎使我神貌堅奈何二三月百憂集離筵空花如錦機野色相交鮮楊花亂愁思萬條散青煙我不酌美酒敬讓故人先椎碎琥珀杯獨灑春風前春風淡無言徒以别慮牽别亦無所慮所慮應當宣願及相思時中腸鬱紏纒為吹雙紫燕銜書到君邊矯矯蕭徴君珠貝藏龍淵一别如列星隨天夜移躔鳯有五色瑞時下岐山巔請君問起居歸來定何年順昌道中冉冉秋序高勞勞客程促如何霜霰交不見原野肅顛崖絢夕紅古澗漾寒緑非惟藤蔓敷亦復芳氣馥物生固有常氣候殊過續以兹羸疾身動往居瘴毒念彼閩村人田稀口如粟耕種上青雲妻孥力寒燠吁嗟公私弊羣需待其熟安得廉恥吏俾之食常足上以承恩光下以厚風俗丹心映皓首我何自拘束麻姑壇揭徯斯曼碩嵯峨仙都觀遙望丹霞天後有千歲松前有百頃田風日夏颯煙雲晝葱芊羣彥一時集安知非列仙持觴起相酬罷琴抗高言天道信悠邈人情何拘牽靈君不可致落景詎少延仰雖慚冥冥俯亦憂元元主人顧座客此中可忘年春日薄書朝出西城門孤墳何穹窿雄狐竄其西修蛇出其東云昔有狂士七尺才且雄平生無所賴屠狗涉春冬一朝際風塵身貴位益崇死生好惡間咄唶生秋風氣驕日憑陵家國兩蒿蓬子孫分散盡空有牛羊蹤奉同柯博士甘內掾下直賦暮出閶闔門解鞍坐前庭泠泠草露白華月隔林生蟋蟀奮哀響鴻鴈流遺聲常恐芳景晏不知寒節并萬物肅將斂孤懷徒自盈捉襟激長嘯棲泊諒難徴題江道士清虛觀遺紛極𤣥覽宴坐白玉京日月朗朝夕河漢流無聲冉冉兩玉童雙吹紫鸞笙下視九九州浮以四大瀛萬劫猶一瞬逍遙樂太清贈淳真子蕩蕩白玉京超超淳真子十一求神仙服事丘與李嵩洛二十載結茅白雲裏餐是晹谷霞飲是玉池水鬼神莫能識百念吹不起一朝忽騰化徑去不可遮飛駟服五龍角巾搖三花朝發扶桑國莫宿河漢槎朝食千歲桃莫食五色瓜長揖青牛君高歌渡流沙還憩金陵邸調笑許史家日食五侯鯖安得厭胡麻春風長安陌落日邯鄲道迎人上青天送人入秋草竦身八極外天地忽亦老寄謝區中人全真以為寶過江州遙瞻九江樹已踏西江土落日照庾樓驚風滿湓浦寒鷗迎棹起遠岫依城吐悵然感羈游淡爾成賔主白頭釣魚叟赤腳浣紗女未識居者歡安知行者苦春日雜言羃歷楊栁枝蒙茸春草齊天天誰家婦采桑臨路岐零露沾其裳蛛絲罥其衣樹高身苦弱蠺饑行復遲辛苦事姑嫜宿夕减容輝見者皆嘆息此心知獨誰良人日莫至醉問爾何為我有琅玕草欲贈江東客出門道路長卷袂空嘆息靈苖世所尚良士豫所惜神仙無千年耿耿誰復識雪軒楊載仲𢎞北風海上來大雪何壯哉上下九萬里洗淨無纎埃君家十二樓軒忩洞然開吹笙擊鳴鼓呼賓與銜杯名言落四座大笑聲如雷舉頭望長空高興驚冥鴻仙人五六輩飛下白雲中粲粲明珠袍相從萬玉童問君何所事未就丹鼎功翩然却擕手共入蓬萊宫太古雪為楊友直賦往時天大風能吹華山裂墜此一卷石或云太古雪粵自開闢初雲氣所凝結已經六萬歲變化同􅏭嶫望之色正白表裏共澄徹塵土不能涴光彩耀日月願君勿愛此持以獻金闕回中避暑時特用消毒熱江上竹王士熙繼學蕭蕭江上竹依依遍山麓晨霞屑明金夕月擁寒玉梢梢緑鳯翼葉葉青鸞足深叢疑立壁高節折垂纛荒凉含雨露歷亂同草木不求笋煮羮不求椽架屋褰條作長笛吹我平調曲青青河畔草青青河畔草江上春來早春來不見人思君千里道千里君當還夙昔奉容顔青樓獨居妾含情山上山白鴈歸塞北一行千萬羣團團月出雲却使妾見君次韻呈周儀之虞伯生袁桷伯長英英雲中君含思歌太乙回鸞舞天葩流粲曉莫述報之不成章玉雪耿素質臨風發長謡庸以永今日道逢學仙人御氣不飲酒我笑初無言彼已嗔我否哀哉守其愚繫石猶在肘冥化隨悲風淪淪骨不朽竒樹生南薰清坐彈五絃凉風邈永古白雲赴蒼煙世故日已偷俯仰隨嵗年折腰倘為酒猶足青簡編少年恣青雲歡至無復戀一為關河行常恐不得見新鴈雲中來飛飛落南遠歸心耿未寐寒更促浮箭送邵元道梅生一尉微喋喋正天紀洗心洞元化削跡無妻子龍變孰為馴蟬蛻乃真止松回風泠泠水落石齒齒大明宫早朝胡寬則大蓬萊拂曙色曄煜舒祥光九儀肅清蹕日月開旗常聖人握金鏡繡衮臨玉堂咸英偹雅奏圭璧輯羣方歡宴洽湛露敷恩奐龍章謳歌罄率土豈樂逢時康典文極藻繪聲烈昭前王巍巍纘鴻緒萬年斯無疆感寓滕斌玉霄宇宙忽空闊飲馬萬里流平生負兩眼及此行寓州天清健鶻運木脫饑鷹投長風吹海雨濯我紫綺裘相逢半游俠把酒髯如虬慷慨說史記歷歷山川秋向來衣帶水目斷河無舟吾愛李太白玩世如游龍自知天上謫何必人間容海風吹緑髮蕭蕭卧雲松我昔夢見之遺以金芙蓉清輝恍在眼月落蛾眉峯西風桂花落我上天台山仙子扶我手泠然蒼水環乘鸞者誰子飛煙渺難攀三生此游戲弄影銀河灣空山忽風瀑四顧鳴潺湲長揖馬子微此豈非人間春風吹緑波淡蕩洛陽栁高樓語錦瑟落花泛緑酒何人白鼻騧蒙茸紫貂袖一字或未識銀菟縣兩肘煌煌貝宫珠乃落緯蕭手爰居偶鐘鼓犧牛竟文繡終然同一盡豈復論好醜誰知草𤣥者窮巷閉白首步出湧金門所見土花碧徘徊衣上月感此美人夕美人胡不歸月落江水白寒潮已復去海馬曉無迹萬弩射鯨魚駭浪接天赤空聞魯仲連孤感橫八極哀哀精衛石填海竟何益贈客黃金羈勸客白玉巵昔我亦為客得此慨不辭小草戲其出檳郎笑其饑相識何所無所樂心相知平生數公子腰下珊瑚枝冥冥或相隔寤寐恍見之無絲繡平原無金鑄鍾期秋風山陽笛淚落不自持贈我火浣布報君吉光裘一笑結意氣呼酒黃鶴樓神交豈待語與子為天游擕手閬風觀濯髮扶桑洲下視俠少年笑嬉藏怨尤世無羊左烈風雪且自謀東井不可酌天駟豈服輈送李茂叔以酒字為韻杜本清碧樟江水逵逵民俗多雜揉李君専檄來號令肅巡棷遂令萬家邑安集日豐厚春風有歌姬夜月無吠狗築堤捍水災皆自將軍手至今此邦人稱謂常在口我來自京師始得一聚首經過日以數言論竟開剖有如濟世方乃爾困升斗孰云勞積多反使歲月久方今天子聖賢知在左右銓曹每推擇往往雜瓊玖此行看薦進直入紆組綬莫負平生心要使斯民夀豈敢為贈言裁詩侑杯酒擬古寄京師諸知已雅勒呼正卿中天縣高臺上有仙人家雲忩織流月石磴凌飛霞簾縈翡翠絲壁粲芙蓉砂羣仙恣遨游青鸞驂羽車左擕若木枝右折蟠桃花斡旋雨露功吞吐日月華願蘇顛崖氓天瓢浩無涯草木悉沾濡遂及蒹與葭閬風接𤣥圃紫禁連西清扶桑浴朝暾縹眇見層城海水幾萬里誰能計修程東皇司造命廣庭延羣英中有三五君生平想儀形賡歌諧都俞論思贊高明菲菲藹春華翕如鏘鳯笙而我抱幽獨幾年適蠻荆瘴癘肌肉消盜賊夢寐驚種種履憂患誰能念伶仃願假刀圭妙白日羽翰生微眇得攀附相將還帝京耕雲鋤月寄貞居周馳景逺買山靈山下石多如羊羣造物為我耕種之皆白雲洶湧初鬱勃散漫還氤氲收歸方寸間吐作五色文一笑顧妻子未用愁空囷石田不生禾何以養吾拙中宵披白雲自起鋤明月明月無根株滿地散霜雪吾鋤不妄揮要使蕭艾别惜無植杖翁相對同此潔送馬伯庸南祀嵩衡淮瀆薛漢宗海總章盛金德齊明赫當寧皇皇遣天使肅肅承詔語三熏禮嶽瀆萬里涉梁楚祀釐歸堯舜降神出申甫南斗迎文星西風起儀羽樂張洞庭月斾濕湘岸雨壯吟鄙騷怨高談洗儒腐過家猿鶴喜攬轡鴻鴈聚青闈閔賢勞黃屋深記注歸騎慎勿徐席虛玉堂署和鄭應奉雜詩淳風散已久青黃陋窪樽婉孌爭媚好役智空自昏豈知葛天民無言道彌敦我有白雲操泠泠寄桐孫調古識者寡幽探萬化源驅車涉逺道日晏不知疲一見嵩華高始覺培塿卑吾道麗天壤昭昭匪難知千金買刀圭但為方士欺贏糧往問道去結汗漫期志士方盛時危冠怒衝髮猛心石為開壯氣山可拔安知橫江鯨中路螻蟻狎所以巢居子商歌竟不輟歌竟寂無言坐聽天籟發發大都黃溍晉卿辭親獨行邁遙遙抵京國胡為突不黔驅馬更逺適至尊有時巡樹羽隱阡陌宿衛必近臣顧問須耆德陋臣亦何知冗從同執㦸草深原野青雨暗關塞黑寥寥盛年意眷眷游子色一身萬人中敢不思努力同王待制校文上京八月十五日宿龍門驛凉風墮黃榆萬馬皆南馳而我方北首度關及鳴雞石路幽且阻僕夫慘不怡徐驅待明發泱漭窮烟扉貂裘者誰子怪我縫掖衣為言霜露多皇皇獨何之我非不自愛簡書今有期憶昔州縣間折腰向小兒荏苒二十年白首初登畿同袍如燕鴻去住常相違悠然慨平生與世何參差暗投龍門驛高館臨回溪青崖拱白月水木含餘暉秋色故瀟灑我行殊未遲相從况魁彥炯若珊瑚枝衰莫奚足云一觴聊共持浮雲蔽白日浮雲蔽白日羣動何喧喧嗚呼麒麟兒化為猴與猿登高望四荒但見黃河奔誰哉泝其流與我歸崑崙葳㽔青林花霜霰日已繁歎息復奚道山中桃可餐古詩悲聞臨廣路南北何多岐躑躅顧所從吾今信安之故山豈不佳亦有平生期且復回吾車勿受塵世欺清晨掩書坐忽忽有所思所思非親故千載多異時南山何峩峩上有青桂枝吾將折其榮歲晚庶自怡居庸關連山東北趨中斷忽如鑿萬古爭一門天險不可薄聖人大無外善閉非楗鑰車行已方軌關吏迭擊柝居民動成市廬井互聨絡幽龕白雲聚石磑清泉落地雖臨要衝俗乃近淳朴政須記桃源不必銘劍閣僕夫跪謂我無為久淹泊山川豈不好但恐風雨惡送林彥清歸永嘉柯九思敬仲鴈蕩接銀漢翠湧生高寒芙蓉散秋錦飛落秋雲端我昔造絶頂天濶路漫漫遙瞻廣寒殿素娥正憑䦨白兔搗月魄指顧成神丹因招宋成公吹簫乘紫鸞俯視九萬里元氣清團團别來知幾時弱水如平灘忽遇鴈山客霞佩青蓮冠還入鴈山去玉髓供晨餐報我舊遊者久待凌煙巒吾患為有身南望空長歎春日病起看花走筆呈座上諸友幾日不出門花開已如許錦繡薄流霞胭脂透疏雨暖生蝴蝶夢風淡鴛鴦浦底事逺游人鷗邊蕩柔櫓秦長城驅車出長城飲馬長城窟翔雲黃浩浩萬里見秋鶻白骨渺何處腥風卷寒沙䝉恬劍下血化作川上花祖龍一何愚社稷付征杵長城土未乾秦宫已焦土千載不可問似聞鬼夜哭矯首武陵原紅霞滿川谷次韻答京師友人陳旅衆仲百金買駿馬千金買紅妝長安畫樓上飲酒吹笙簧夭夭園中桃鬱鬱陌上桑美人越山下白髮生雕房涼風振高梧繁露集幽菊攬衣起徘徊殘月照我屋曽襟鬱孤清日日塵眯目銀河在天上手短不可掬哭陳元麟阿麟能讀書八歲貢京國翺翔公卿間聲譽頗藉藉我家越山南汝家越山北及我官橋門見汝長五尺翩翩丹穴雛五彩作毛翮昆侖有瑶樹上有實可食汝胡不此留而去不可即乃翁擕汝來為汝頭盡白辛苦擕骨歸江蘺黯愁夕可憐東門吳任達乃强釋鄭子經下貺名篇勉强續貂秋山何稜稜秋樹亦莽莽游子中夜吟凉風在林户豫將薊北行與子同歲莫誰能客荆州登樓悵非土功名果何物我欲取而撫酣歌弄吳鉤破屋虹氣吐潭上花方積叔高幽潭太古色上有千樹華深根溉甘泉衆實結丹砂食之可長生千秋顔若花縹眇潭上仙種此遺其家安期日往來時乘紫雲車田中爵家爵不入山野鼠不戀屋爵來食我苗鼠來食我粟一日食一斗十日食一斛斗斛日空虛鼠爵焉得足衡門有餘樂台哈布哈兼善衡門有餘樂初日照屋梁晨起冠我幘亦復理我裳雖無車馬喧草木日夜長朝食園中葵莫擷澗底芳所願不在飽頷顑亦何傷八月十一日夜直省中甘立允從凉風生廣除白露墮銀漢沉沉夜氣集皎皎月光爛門深棨㦸嚴庭寂兵吏散柝鳴棲雀起階濕吟蛩亂俳徊久不寐感慨輒興歎非才直承明弱冠弄柔翰遭逢愧終賈漂泊類王粲名臣鎮大藩從事乏良算晚出西掖共柯博士賦薄莫出重門逶迤望雙闕輦路猶輕塵上林已初月悠悠文書靜去去車馬絶小草慚長松承恩亦無别瓊林臺為薛𤣥卿賦西山有崇臺上與雲氣通仙人紫霞珮導以青雙童逍遙琪樹林盤礴瑶華宫積石象𤣥圃連岑搆崆峒纚纚駐遙景泠泠度天風丹鳯刷羽儀絳節飄曈曨矯首不可及滅沒凌飛鴻願言采靈藥與世終無窮和揭曼碩兼懷武昌名勝楊缺信可親友日以疏江漢日已深孤雲懷海嶠倦翮思長林終然念所知沿流動悲吟豈無後日期邈若隔千岑安得好風來泠然入中襟日與親友㑹微言自規針和盧子儀寄懷盧肅政上巴陵王侯人生有知遇永懷不可忘俯視萬丈淵仰睇千仞岡青山何其高江水空自長忽憶石潨叟别我半載强昨者從湘中歲晏歸朔方孤舟渡淮水遺歌滿滄浪迢迢天際雲青青陌上桑用謝𤣥暉入朝曲分韻得收字送馬中丞赴南臺傅若金與礪金陵鬱迢遞行斾曖悠悠蘭臺清露集松庭積靄收白鷺回修渚朱鳯矯崇丘離離曵青綬曄曄振彤騶遠甸芳風散神都旭景浮臨軒結沖想還車寧久留雪中送宋上舍仲敏歸滑州省親北風何烈烈雨雪亦雱雱游子去成均將往古靈昌詩書豈不樂歲晏懷我鄉我鄉伊可懷父母在中堂休告亦有時定省焉可忘浮雲踰大伾白日照宣防子行日以至送者各盡觴當歌念逺游令我愧中腸四月十日發京六龍西北馳羣鳥東南翔感我客游志心神隨飛揚迢迢踰大河恍若越崇岡已驚時序易復念道路長驅車出東門浩歌慨以慷燕薊豈不樂吳楚為我鄉父母久違離兄弟不在旁當兹遂歸去聊可慰中腸送吳寅可之揚州薩都拉天錫青楊吹白花銀魚跳碧藻落日上江船三月淮南道渺渺春水涯悠悠雲樹杪安得快剪刀江頭剪芳草同幕府楊子承李伯貞避暑烏石山晚酌晚凉上烏石置酒天章臺日夕下山去海風吹月來豪氣吐千丈朗吟動三台白露灑仙掌銀河瀉金杯誰識芙蓉仙飛身在蓬萊高臺在層霄肩輿上絶壁露下酒尊涼月出海門白坐拂衣上雲醉卧林下石西風吹鬢毛南斗在肘腋題詩向天閽奎光射瑶席寄鉛山别駕完顔子忠我識顔别駕風度修且間近持五色筆輝光動南蠻甘飲石井水卧治鵝湖山玉峰露灑灑風林佩珊珊表表臺閣姿豈久州郡間相思不相見可望不可攀海風吹夜月飛度七閩關河上納凉有懷吳子彥貢師泰泰甫天風吹海樹瑟瑟秋氣凉河漢西北流衆星耿微光昔我同袍友逺在水一方相思不可見展轉清夜長遙聞鳴笳發攬衣月蒼蒼贈蒼梧縣尹朝觀扶桑日莫望蒼梧雲重華去已逺神氣猶氤氲遺黎在山下飲食而耕耘懷哉賢大夫彈琴詠南薰胡為不我即使我心殷殷秋風洞庭水緑竹愁湘君古意黃金本何物舉世相紛爭賤者可以貴死者可以生既解平城圍亦散六國衡神用信莫測萬寶孰敢嬰亦有髙世士唾視瓦礫輕寧為凍餓殍不受汚辱名斯人倘可見吾將與同盟嗟哉首陽薇千載有餘清乾坤清氣卷一
