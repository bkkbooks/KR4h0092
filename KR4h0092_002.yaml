body:
  text: 乾坤清氣卷二明偶桓編五言古詩和陶詠荆軻郝經伯常燕國八百里最為逺秦嬴可作殷周基何乃事荆卿癡兒强復讎七首揕咸京徑刎于期首更圖督亢行倉皇事不就狼藉斷冠纓寒風死别歌睥睨一世英不若専設諸飲恨復吞聲縱使殺一秦寧無一秦生呂政方忘燕忽作繞柱驚并吞勢不已舉兵復有名掃平黃金臺故鼎入秦庭昔我渡易水晚登燕子城投文弔田疇思賢重屏營舉事本道義不係敗與成為國恃刺客夫豈豪英情湖南憲幕牡丹盧摯處道仙人何許來絳衣翠為裾朝霞映樓居瑞日臨綺疏韶容託植物神竒升豐腴豈無瓊華枝亦有珊瑚株國風芍藥贈騷客芙蓉襦愧爾顔色好愧爾芳菲殊誰云風霜地亦復雨露濡猗猗緑竹抽絢絢羣芳餘公餘文墨暇嘉賓此虛邪時清景逾勝不樂將何如送李廉使西歸洛陽靡靡歲年晚肅肅霜露霏君子不遑處四牡來騑騑月出方皎皎我心恆依依今夕復何夕山中仰容輝惠然有深契使我心悅夷北風日已凉行役乃無期言邁未可留淒然送將歸永懷金玉音時得慰渴飢宿汝墳閻缺子濟朝發長社城薄莫汝墳陌秋風吹汗馬為我駐逺客主人指見聞書劒事行役悵然失所對芒刺去未獲蔬食亦自飽微月在枕席紅塵三尺塗清境初不隔疏疏岸樹直㶑㶑沙水白晨雞未須鳴吾意方自適雜詩張翥仲舉寒夜何皛皛中庭積繁霜天風下河漢萬里流玉光羽衣四三人各乘白鳯凰笙響發空際游雲高馳翔無緣執霞珮攬結雙鳴璫願託月中桂終古有遺芳隴坂何﨑嶇行人且復止直上望秦川遙遙憶鄉里流離肝腸斷悲歌不能已一身已遐征永念同室子何殊轉蓬科隨風四散起雖得同根生不得同根死吾恐古今淚多于隴頭水春江采芳草將以伸繾綣初期拾翠洲復道滋蘭畹美人隔花深歌竟瑶瑟偃臨流不可見忽恍心未穩佳時難驟得鶗鴂鳴已晚秖有千古思綿綿楚波逺前出軍前軍紅衲袍朱絲繫彭排後軍細鎧甲白羽攢鞲靫輜車左右馳萬馬擁長街送行動城郭斗酒飲同儕壯士當報國毋為鄉故懷昨日發萬軍今日發萬軍明日發萬軍梟騎來羣羣馬蹄所經過黃埃蕩成雲堆糧與作儲倒樹與作薪道途行者絶那得有居人京師少年子膽氣乃粗豪傾金售寶劒厚價買名刀白氊作行帳紅綾製戰袍結束往從軍談笑取功勞當時霍嫖姚豈在學戎韜後出軍步卒傖楚健長刀短甲衣大呌前搏敵跳蕩如鳥飛左提血髑髏右奪賊馬歸黃金得重賞顧盻生光輝爾輩疾歸命將軍是天威先鋒才攻門後軍已登陴拔都不怕死直上搴賊旗馬前獻逆首腳下踏死尸長河走敗船疾遣飛將追幕中作露板應有傅修期行行鐵兜鍪隊隊金駱駝嗚嗚吹銅角來來齊唱歌總戎靣如虎指顧揮雕戈馬蹄無賊壘手箠可填河王師本無敵安用戰圖多題蛾眉亭張以寧志道緑酒白玉瓶獨酌蛾眉亭不見李太白但見三山青秋色淮上來蒼然滿雲汀安得十五絃彈與蛟龍聽送友歸古田君家重峯下我家大溪頭君家門前水我家門前流我行久别家思憶故鄉水何况故鄉人相見六千里十年在揚州五年在京城不見故鄉人見君難為情見君情尚爾别君奈何許送君遽不堪憶君良獨苦君歸過溪上為問水中魚别時魚尾赤别後今何如古意呈仲章貢侍御黃清老子肅娉婷二入女絶色妙難畫新妝薄鉛華照影修竹下盛年事夫壻錦玉耀精舍雖非伯鸞妻惓然惜長夜琴餘月當軒默默倚風榭寄語東家兒紅顔莫輕嫁梧桐生髙岡雲氣涵空清南枝挂孤月上有蒼鸞鳴大匠揮玉斧渾然合天成置之白玉堂被之絃歌聲一彈松風來再鼓溪月明子期人已往青山為誰情送僧定觀歸詩僧百丈來復作五臺别丁然振金錫桂子落秋雪山空白雲間風息萬籟滅相思何處無江湖一明月孤憤一章和夢菴韻楊維楨亷夫楊子哭停雲厯數死生友首哭台州帥再哭江州守三哭天水頭四哭淮渦口五哭六哭餘英風復何有確山截罵舌宛湖沉斫首嗟嗟徇國臣培養百年久猛去晉終背彧死魏何咎而況鳴吠才蠢蠢小雞狗弋鴻羽既怯釣魚餌滋誘根撥那望實蒂分尚懷藕珠雀既失彈火鼠重被垢長包中土心相詫模稜手外壼宜倒戈中薄肯敝笱祝宗祈未死循墻駭還走長涕未上書窮辭空還酒驚見夢菴詩一首灑百醜大義揭日月孤忠縣畎畝亂厭出下泉厄極還易缺懷君郭泰交夜柈飣春韭和君孤憤章澆致酒一斗芝雪堂分韻得對字窮冬積繁隂快雨不破塊問途玉山下繫船桃溪匯主人聞客來把酒欣相徠窈窕雙歌聲嬋娟兩眉黛談笑方云云妍嗤各成態憶昔獻䇿時日炯重瞳對下馬宴瓊林宫花出西內俯仰三十年同袍幾人在明當理行舟天逺征鴻背那能事煩劇曉出星猶戴行當謝冠冕歸荷山陽耒三叟者訣道逢三叟者高夀比神仙問叟何以夀夀訣倘豫傳上叟前致辭大道抱天全中叟前致辭寒暑順節宣下叟前致辭百歲半單眠是為三夀訣所以能長年南婦還今日是何日慟返南州岐汩汩東逝水一日有西歸長别二十年休戚不相知去時鬢髮青歸來靣眉黧昔人今則是故家今則非脫胎有父母結髮有夫妻驚呼問閭里共指冡纍纍訪死欲穿隧泣血不復疑白首滿丘山我逝其從誰書邵節判事潭州李刺史劊手驅妻兒松江邵節判劊手屬氷夷闔門十八口一死殉無遺鮫人為泣泪龍伯為負尸姓名照濁世信史録吾詩同堂老僚友開門竪降旗蕭蕭飢馬鳴李孝光季和蕭蕭飢馬鳴隔林見落月游子慕父母豈復畏脫别負書或在船津吏已催發臨觴不能持惆悵生白髮況是江海永歲晏多風雪風雪塞中路不隔遊子轍平生四方志念此心欲折男兒各有願君子保明哲上思娛尊親下以浣悁潔送僧朴菴用柯敬仲韻月行天中央天高如屋極中有雪色兔世人不能識我曽摩其鬚仙吏睨我側衆仙乞秋毫密如霧雨塞蹴踏河漢翻洶湧若秋汐是誰致此竒南有彌天釋仙吏今上天令人淚沾臆題梅巷北風吹倒山三日雪塞門愔愔巖谷裏萬木命在根天翁粲然笑洗出明月魂春如鼎中香已覺火力溫秋夜同張仲舉欣笑隱龍翔寺聨句先皇日潛邸梵宫冠東南金碧麗紺宇張旌幢覆瓊㮀六龍駐神馭李百靈護鸞驂地蟠龍虎氣欣殿擁貂蟬簮文石露篆古張化城天樂酣杏梁虹飲渚李壁甃蟾生潭復道星辰直欣觚稜煙霧含浮圖琅璫語張藻井罘罳函曽暉􅑷鐵鳯李清旭眩氷蠶望氣芒碭逺欣問道崆峒嵁御床塵宛宛張仙仗華毿毿珠襦鎖玉柙李猊座湧寶龕遺弓泣父老欣執豆奔侯男衣冠閟原廟張矛㦸圜精籃憑几敡末訓李銘鼎紀𤣥談聖祚萬世啓欣法筵諸佛參貝翻譯經六張圖繪笑像三華鬘衆唄作李象教一默諳猿鶴驚此客欣林澗洗餘慚齊厨飯香靄張瞑閣鍾聲韽錦蔫渴獸抉李礎踞雕虎耽灑掃愧無補欣倡酬知匪堪燥吻茗屢沃張苦心䇿頻探焚膏續遷晷李卷簾納霏嵐氍毺月采淨欣鑿落雲液甘風籟摐古柏張秋隂挾髙柟户牖蜂脾矗李丹青海波涵袖中合陶謝欣方外師瞿曇息影了虛寂張枯禪屏癡貪苾芻交折堲李伊蒲不盈甔心同略形迹欣纍遣忘憂惔錦雉絡羽扇張赤螭御劒鐔㕙毫走奰屓李麈尾揮䰐鬖堅壘避屈賈欣陋邦敵吳郯韻劇魔膽落句雄神力擔擁鼻極營度張刺手勞鉤撏緘筒遞銀鹿蠧葉剔白蟫幢燈粟蠢蠢李鼎香穗馣馣山河入帝綱天人繞優曇欣境勝情自曠理超思彌覃李雲卧委巾舄雨歸借箯籃張投章愧木李留怡踰黃柑欣話言諒所慕治醉詎可妉李捧席白足慧張觸屏蒼頭憨欣偏袒鳯肩聳李鏤匡鐻耳儋張吾我涉誕謾欣爾汝忘詀喃張罅發栗穰厚色滃醪味醰李剪韭差可芼食魚更須泔張青溪渙以瀏蔣陵聞其􅛦欣兹事付千載相期結廬菴張宴集分韻得落字張天英楠渠東家白雲翁載酒青山郭相招竹林彥坐對春風酌一花飛入樓泛我銀鑿落醉步松月歸令人夢孤鶴松門玩月徘徊青松門鑒我古明月露零沐青髯𤣥珠燭寒髮願言駕雲螭飛步上天闕微雨中夜來北風卷成雪春夜酬李五峰酣歌惜春夜起向月中立北斗挂長松風摧翠蛟泣山花如美人飛香染衣濕青天落吾手大白不滿吸推山出門去秀氣還復入次韻歐陽檢閲濠池觀荷薛羲𤣥卿行行濠池上亭亭見長荷瓊葩耀初日碧芰卷輕波深蒲曉色亂微雨晚香多方舟時自移高軒或來過豈無河朔飲那復發商歌商歌一慷慨此物奈君何野宿山簡虞博士王待制迢迢野宿山峯巒何崔嵬朝登猛虎嘯莫宿𤣥猿哀高風四靣發花草為誰開傳聞章皇帝此地昔徘徊龍駕竟不還浮雲空往來秀色九天外巨靈不敢摧飄搖散襟帶覽結何悠哉題宋氏南軒楊鑄季子脫灑謝塵喧棲神在巖户殘雲床下起昨日山中雨緣澗弄驚流攀林玩芳樹非關薄時榮逍遙自成趣晚憩澗北亭我性喜蕭散東園時獨行高亭俯絶澗下有流泉聲秀木翳繁隂朱華散微馨踟蹰淡忘歸夕露沾我纓人生忽如寄何乃苦營營優游在空谷飲水有餘情贈石維秀才楊鎰顯民石子山中來衣上白雲濕俯仰時自謡鏗鏘溢篇什注書空林間花落常自拾明晨城南去相望空悒悒雨至維南有崇山山上多浮雲靜聞微雨至寂寂在西軒曠然無所懷端坐復何言不知春向深况知賤與貧春暮周權衡之春暮適川上意與流水長時有白雲至逺帶松翠香手擕淵明詩倦坐據胡床悠然宇宙間是非兩亡羊次韻張德甫朝緍北澗鮮莫采南山樵貴則食五鼎賤則飲一瓢妍醜莫自校用舍隨所遭為我揮緑綺鴻飛楚天高瀛海篇贈吕鍊師丁復仲容我本瀛海人瓠落九州土三山不得歸六鰲競何所凝精耿宵寐往往呼安期跂豫紫霞想感此白日馳客有金庭仙玉霄住雲月近從爵溪來霜紈卷溟渤褰衣拂天姥跣踞青芙蓉羲和擢僵指夜寒笞六龍金烏飛上天露草忽已晞奈何閟靈景忍此人民非朝褰四明霞夕涉㑹稽道鄭𢎞招不來賀監亦已老胥濤吼奔雷逆折生回風鸞乘桂子府鶴語梅花宫清湖自歌舞顔髮凋青紅壺丹碧光瀉劍影洞庭水霜落山橘寒還至吳王里吳王湎不醒館娃骨已氷乃爾憶張果亦復尋茅盈玉妃發春哂手折雙瓊花寄語雙女兒相逢學丹砂翩然不肯留浪迹金陵市長歌六帝秋嫋嫋聞夢耳青裾曵明月問我丹井南揮手緑雲表語别愁何堪往年去天台蕖草徑香滿彼之溪上人泣向西風斷瑶臺天上遙銀橋霧中沒葛陂一丈竹鱗鬛生倐忽颷車劃雷近輪轅不相將尺地不可縮况兹道路長故人衡湖居舊約赤城下緣崖履靈跡㺯瀑潄清瀉今聞綰漢綬好作常州牧興公賦金聲名山阻高躅東行即相討自稱回道人榴皮醉香墨曉過東林春海圖慎勿視但恐馳其神東海有蟠桃東海有蟠桃結根何歲年花開不關春霜露不繫天仙種固靈異未知樹所緣我欲往問之代無絶世賢適來王母至遂奉武皇筵驕主好自誕後來信謂然愚者諒多惑智者當不傳同永嘉李孝光望鍾山聫句鍾山日在望匏繫未成往我本忘世人李誰能久塵鞅窮猿尚擇木丁冥鴻不離網納蕞升斗縻李乃此尺尋枉川江互迢遞丁天地一莽㝗霸氣遂終陳李山名猶姓蔣䇿羸結幽躋丁拔茹傾勝賞踡林萬虬伏李獰石羣獸仰雨晴虹霓裂丁雲熱鸛鶴響靈骨瘞浮屠李癯趺踞方丈陟閣鷹巢危丁窺户蜂房敞禪林舊稱一李梵剎新闡兩苾芻化城喻丁獬豸嚴駕上一人㪺小月李七佛築峻壤狻猊睥玉除丁科虯罥銀榜庸超謝膻葷李媚禱懷肹蠁俗子空卑棲丁至人廓遐想相期訪龍盤李何如游鴈宕窗明誦楞嚴丁林昏過魍魎終然千仞顛李極彼九州廣圓龕坐覔心丁方具跪合掌攬秀目顒顒李討幽心養養沈綿阻客游丁爽塏令人奬境虛雲壓䦨李江逺浪浮槳揮清宜麈尾丁翳靜便鶴氅城分三國鼎李淮湊百川輞喜彈青綺冠丁倦曵緑玉杖朝晴竟﨑嶔李夜夢猶佛倣祝酒遣詩魔丁搜句搔技癢深推衆壑宗李雄據諸峰長碧眼覽益逺丁白髯聨苦強地籟息箕簸李天孫遺女紡金聲調危鐸丁石華繡卑磉騎驢約兹後李驚猿記疇曩資罄恐支離丁腹果歸莽蒼閒休幼安席李敏奪雲門棒竹露曉衾濕丁松飈秋髮爽玉樹異風標李珠林列星朗躡屐去後齒丁早炊囊宿滰弔古重追尋李披荒增慨慷丁雜興陳肅伯將黃帝作弓劍一戰擒蚩尤張樂洞庭野煉玉昆侖丘白日乘紫雲飄颻謝諸侯如何橋山下高冢悲千秋長安有高第云是金張家朱門映緑水弱栁啼春鴉曉合列侯馬莫多名主車可憐歌舞月空照玉梁斜驅車洛東北遙望首陽山昔有兩兄弟采薇於其間我願從之游孰云不可攀躊躇日將莫感此空忘還生長宛葉間廓落不事家結託劉文叔調笑隂麗華還沽舂陵酒更賞河陽花興䦨聊騁望紛紛龍虎霞妾住雕隂東君去漁陽北惟有别時草依依滿行迹不忍行迹沒掃盡還更碧君情如妾意纒綿無終極寄薛鶴齊張率孟循東海有一鶴翩翩好容儀翻飛上林苑照影昆明池雞鶩與爭食鳯凰亦低垂吳山碧玉樹自有摩雲枝客廣陵答天錫見貽韻吳克恭寅夫泛舟春風生江光揚雲藻人生杜牧遊栁色淮南道幸欣韶芳媚孰云春事杪逺思極綿綿無緣是芳草短衣短衣荷長鑱晨起斸黃獨歸來讀道書日晏飢我腹羽入丹砂床遙知在澗谷松膏滴雲腴山房酒應熟友人仕掾曹為上官所迫促賦此送歸采蘭復采蘭緑葉何參差馨香滿懷袖特以遺所思恩情中道絶此心當告誰願結青林佩悠哉白雲期石間攬三秀學道倘因之送徐元慶歸江西倪瓉元鎮悠悠西江水綿綿江上山借問離羣鶴孤飛幾時還白雲亦忌潔青雲安可攀時時王子晉吹笙向人間春日雲林齊居臨池春流駃掃地夕隂滿正襟味道言超遙坐溪館嵐嶺當書榻煩襟一舒散靡靡松花黃逐逐雲氣暖石梁青苔合于焉人跡斷故非與世踈冥棲遂忘返聽袁子方彈琴蕙帳凝夕清高堂流月明芳琴發綺席列坐散繁纓回翔别鵠意縹眇孤鸞鳴一寫氷霜操掩抑寄餘情秋夜空林溥露氣疏鐘時獨聞清夜息羣動高居無俗氛恬淡誠吾事榮名非所欣樂哉詠王風忘年棲白雲題巾子山僧房潘純子素清江抱禪棲山頂在屋下朝霞生庭户老樹立石罅日出漁舟集日入市賈罷僧子獨何為逍遙事閒暇秋日陪杜微君李先生遊金華山輕雲淡秋色凉日靜琳宫水落白石上人行深樹中悠悠坐長嘯肅肅來清風仙人不可見芳草碧叢叢松泉圖郭翼羲仲迢迢澗上松㶁㶁松下泉微飈散晴雪飛琴瀉寒絃懷哉山中人眇豫墮塵緣九江秀可攬山色青於蓮浩歌招黃鵠重賦雲巢篇貞女慎行露陳基敬初貞女慎行露君子戒履霜歲莫懷百憂離居增慨慷方舟豈無楫河水亦可杭臨流不能渡佇立以旁皇夜坐懷二君子良夜殊未央明星一何爛懷人阻層城邈若河與漢棲鶴驚露叢落葉依井幹據梧不成彈惻惻空浩歎醉贈秦文仲還三洲饒介介之東望大瀛海影落扶桑弓三洲直如矢正射三山中三山負朝日日日波浪紅仙人不騎鶴所適多御風秦君家三洲長與仙人通即之不可見忽爾能相靣翩翩頭上巾舉舉塵中扇高談清溽暑知子不貧賤聞君寡良儔有酒不自薦此日足可醉况得邦之彥小醉須解酲大醉不用醒生平慎許可祇有一劉伶太湖三萬頃七十二峯青凝竚山水秀開堂修酒經白雲生研石疏雨灑窗櫺子上三洲去吾杯猶未停出門膏吾車鄭采季亮出門膏吾車欲登昆侖丘昆侖在西極我家東海頭十步若九輟鄰巷亦阻修况茲幾萬里而乃復悠悠但當努其力歲晏非所憂聞道夕可死聖謨實吾舟耕雲釣月送林彥清秦約文仲朝耕南蕩雲莫釣蓀湖月湖月只自好焉知有圓缺放歌擊空明欲往愁桂楫世無任公子誰與同此潔眷言凌風去逍遙白銀闕宴梧竹堂分韻得鳯字陸仁良貴張宴池館夕酥凝酒微凍明月流綺疏華燈照隂洞翠琯裊遺音朱絃細成弄倚徙桐花源相期聽鳴鳯擬古鎦堪子輿千金買明珠百寶裝帶鉤寶帶綰同心明珠垂兩頭美人結新歡託體相綢繆再拜稱主夀持以奉千秋龍吟軒吾衍子行四山若龍盤精廬剡溪曲中有不蟄龍長吟破幽緑道人宴坐起拂袖窗牖開手持碧琅玕聽此風雨來張伯雨贈黃精山中有靈草乃云太陽精况聞天老言餌之可長生故人赤松意分贈慰我情玉津比靈芝采采三秀英我願服此久飄然出蓬瀛緑髮無秋霜身如羽翰輕舉臂入霄漢丹臺列高名手把金芙蓉與君遊太清乾坤清氣卷二
