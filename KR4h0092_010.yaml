body:
  text: 乾坤清氣卷十明偶桓編古樂府大姑謠鄭洪君舉大姑嫁將軍小姑未有夫小姑兩腳泥大姑滿頭珠前月小姑去嫁作在家婦叉削爨下荆衣裁機上布大姑嗔小姑生憎兒女癡多少馬上郎偏愛牧羊兒八月㸃軍卒將軍玉門出大姑詫夫壻上馬快如鶻昨日邊報歸大姑淚如揮郎君馬上死無處寄征衣連理與枯枝雙飛成戢翅都無百夜恩浪作千嵗計小姑莊上來瓦盆雙鯉鮐上堂拜父母夫婦恣歡諧大姑見小姑珠翠無顔色低頭怨悵天仰天呼不得人生百年良所無白頭相送真良圖東家女郎欲嫁夫切莫猖狂學大姑城上烏為李僉憲賦城上烏尾畢逋雄飛啞啞雌者呼下飲九曲之清池上集百尺之髙梧烏鳥一巢生九雛去年築城興萬夫家家力役到妻孥使君朂我我力痡蒸豚滿筐酒滿壺作勞耳熱歌嗚嗚今年城堅如鐡石弩臺侵弓土花碧白雲為藩樹為㦸朱旗星流落日赤馬鳴蕭蕭人寂寂六門虎賁晨晏食城頭髙髙如屋極烏朝出飛暮來息雌雄哺雛乳而翼城上烏畢逋尾九雛羽翼成飛去青雲裏江南無好樹處處烽烟起危枝繞遍不堪栖昨日歸來舊巢底使君青驄馬繫在垂楊下手中金僕姑不驚城上烏思情雙飛鳥遺愛在中吳使君去幾時回新城髙百雉仰德竝崔嵬飛來孤送奎師住靈鷲張憲思亷君不是唐林夫我不是睂山蘇如何臨行索我歌驪駒借君二十四節之龍鬚擊我迎風寒露之玉壺聽我歌爾飛來孤嵌嵌嶷嶷天下無左擁羅剎江右抱西子湖靈峰秀出五百尺嘉樹玉立三千株香林冠其顚冷泉濯其趺晴嵐盡掩西子幔寒月夜上摩尼珠馴麛或墮猛虎下山鬼戲答黃猿呼千蹄鐡騎亂戎服五丈大旗屯梵區方舟子休悒怏龍節杖且載途明年二月春風裏花外馬蹄知是吾新嫁娘盧升廷舉新婦調羮湯小姑繡衣裳新婦不停手小姑不下床新婦語小姑爾亦不自量爾年二八餘寧久阿母傍請看繡針底文彩雙鴛鴦春風一朝起持贈畫睂郎爾姑别我去如我事姑嫜自君之出矣郭翼羲仲自君之出矣花開又花謝思君如日月耿耿復晝夜自君之出矣徒守零落耳思君如車輪輾轉愁不巳自君之出矣琴瑟何曾御思君如落葉蕭瑟悲秋暮五禽言布穀布穀催布穀去年官軍糧不足里正輸糧車轆轆六月長枷在牢獄今年穀種未入泥布穀早催須早啼蘆戞戞蘆戞戞沙場盡樵伐樵人指秃山無枝枿嗟嗟鳳凰無處栖鷦鷯何處巢一枝煆磨煆磨麥熟農夫餓家家無麥還租課年年濕麥五斗租一石晒乾量不過磨子不煆竈不燒門前誰呼婆餅焦秦吉了秦吉了人言汝是能言鳥嘲啁觜舌長賣弄言語巧野人張羅在林杪富貴一落樊中羈不如兩翅盤天嬉快活快活不快活茫茫海洋濶白日槍刀來檢刮風火轟天滿街殺道傍死尸鴉啄腥汝雖快活何忍鳴小姑謠小姑年可十五餘幼小只依兄嫂居爹娘愛惜不肯嫁妸娜一朵紅芙蕖大嫂含笑向小姑小姑今年當嫁夫嫁夫須嫁田家兒莫貪滿屋金與珠不見東家樓上女去年嫁作軍中婦良人戰沒招魂歸日日靈前哭如雨今年再嫁花娉婷車馬滿街相送迎寧為守義泉下鬼如何失節須臾生田家種田雖苦辛百年貧賤可終身荆叉布裙灰土面小姑歸來好相見今日行鄭東季明昨日去今日來明日忽忽復相催百川赴海何時回思之竟不令人哀傳開三神山海水青如苔五雲淩亂聞樓臺中有長生不死藥仙人青髮紅玉腮此事不許人間有籛鏗古人骨亦朽骨亦朽勸君酒長使金杯在君手昆城吳歌昆城吳水三萬頃吳兒招我入溟涬舉頭看月月在頂手弄荷花落天影酒酣起舞船底眠青天作衾毛骨冷龍女欲出聽我歌扇以凉飈吹夢醒初歌音簇含清勻忽然疾走銜枚軍百􅏜髮立皆驚奔龍女舞翻巫峽雲再歌壯以悲鳳凰背泣麟洲啼六月雪壓昆侖低我歌三發滄海裂緑水欲變黃塵熱龍女聞之悲哽咽旌旗忽動龍女歸金烏飛上若木枝暑炎如火炙我肌嗟我老病力莫支千金莫致南海犀沈書問龍女遺我蒼水璧與君乞取半湖白歸向髙堂挂空壁君住耶溪南陳基敬初君住耶溪南我住耶溪北咫尺不知名采蓮始相識君愛蓮有花我愛蓮有實花實本同根君心勿相失望潮曲郯韶九成夕風吹白波江樹搖緑烟行人望潮水心與滄溟連扶桑東來三萬里曉看浴日重淵底乃知碧海與天通只隔銀河一絲水美人住在東海頭身輕嫁與千户侯頻年轉粟直沽口檣頭夜夜望牽牛春江曲送唐閔之入閩二月春草青三月春水肥楊栁蕩洲渚蝴蝶作團飛美人向何處望望隔烟霧迢遞越王城青山海中樹海水髙入天上與銀河連相思瘴雲合目送南飛鳶賦三色梅花吟范立叔中姑射肌膚白于雪夜出瑤臺看明月羅浮仙人醉臉丹笑跨彩鸞下銀闕相逢同過金母家金母小玉名凌華一色羅衫染蜜褐仍帶絲囊盛紫霞珊瑚鉤起真珠箔玉笛吹殘風色惡羣仙齊怨老容華斑斑淚向鮫綃落見羣龍歌辛丑夏至日作徐孝基立本𤣥雲崔嵬半空黑大龍蜿蜒小龍直天瓢倒瀉銀河懸海氣空濛海波立須臾復有三四龍威稜氣勢如羣雄雷公擊鼓玉女笑飛烟烈焰飄長風維時一隂凝下土六龍在天啓坤户陽剛奮發無停機久旱終當沛甘雨我方扁舟湖上行見之頓覺雙眼明茫茫真宰不可詰乃知龍物能通靈君不見葉公好龍妙圖畫一朝忽有真龍下可憐辟易走且驚不識真龍足悲咤去婦詞鄭采季亮敝衣尚可浣古鏡尚可磨郎心一昏蔽反復將奈何緬懷初嫁時同心指江河江河固上流郎恩中道休娟娟芙蓉花託根在芳洲驅妾出門去妾身將焉求安得明月珠置之郎心頭龍王嫁女辭于立彥成東方龍王嫁龍女雷車彭彭載風雨神奸夜邀髑髏語碧草無光愁露渚幽宫沉沉精爽入鸞裾行烟翠㾗濕阿鬟嬌小不成粧帝與桑田作湯邑胭脂紫玉吹海腥陽侯擊浪玻瓈聲湖邉地皮薄如紙長堤卷作長河水短歌行白日苦易短百嵗良非長今日花間露明朝葉上霜黃河無停波浩浩東入海弱水隔神山靈藥何由采羲和總六轡蒼龍挾其輈回車謁王母蛾睂生素秋虞淵沈莫景忽在扶桑顚孰知青天上年年葬神仙尊中有美酒瀲灔浮春香調笑青霞侣娟娟紫雲娘今日不飲酒奈此白日何來者日益少去者日以多太極那能窮混沌不可補不如醉鄉人一息同千古誰云刀圭藥可以飬神骨天運未可期且盡杯中物病駝行高啓季迪駝峰黃駝茸紫曾䭾黃金獻天子燕山雪深沒駝耳錦韀糢糊駝不死去年從軍下南粵粵江水渾沙草熱毛焦肉枯骨欲折回頭却憶燕山雪燕山雪不得歸駝饑駝渴誰與知伶仃反被牛馬欺嗚呼駝兮爾勿悲爾峰可食茸可衣利爾衣食孰爾醫乙巳寒食吟袁舉仲徵香風吹面東方來櫻桃花發栁眼開鸞簫聲歇幽蘭笑十二樓前青雀呌王母騎龍愁莫雲碧桃過眼三千春北山佳城久無主寒食心摧淚如雨自驚髮薄不勝梳心事波搖為誰語白苧詞送謝叔久鄭基本初征鴻至征斾舉花發芙蓉滿江渚吳姬約雲歌白苧凝為朝雲向君舞牽絲鳴玉張宴遲稱觴聽曲心自怡君之别會有期折楊栁錢惟善思復何處好楊栁攀條送逺行花飛渡江水客醉踏歌聲秋色悽榆塞春隂接鳳城一枝不敢折為近亞夫營洛陽陌驅車洛陽陌周道何逶遲玉帛走侯甸金湯固城池潘令好桃李阮生多路岐銅駝卧荆棘索靖獨先知新街曲徐士榮仁則東街南曲聲婉揚西街北曲聲激昻佳人唱曲不下樓樓下白馬青絲韁昨日開筵擊鼉鼓今夜合席調笙簧樂聲一似曲聲雜人意豈如物意長秪恐樓上人春光不長好寧知馬上郎金璧非重寶向來恩愛江水深一旦殘花與衰草將軍歌張樞夢辰將軍走馬沙草場獰龍蹀􅞃鷹飛揚狡之窟四顧無所藏罝罿如雲箭如雨滿眼禍機寧脫此將軍一日權豈直百兔死君不見李斯非相才上蔡東門遊獵子栁風蓉月亭吟和韻袁華子英緑烟紅霧搖蘭塘嬋娟泣露啼秋芳金蟲撲帳花風熱花底雙歌踏明月畫橋十二懸妖虹美人香骨胭脂紅滿眼春嬌小蠻舞雲錦書傳青鳥語亭中主人江左客春草夢回江月白從軍行瞿榮智惠夫年少去從軍妻兒生死分弓開孤月影劒動七星文解識風雲氣能穿虎豹羣不將身許國何以樹功勳破敵三營外城頭日欲低舉烽連磧遠戰氣接雲齊旌幟驚烏起鐃簫雜馬嘶秪愁千里月少婦正悲啼挂劍操秦約文仲魯邦是聘兮魯彊孔壬王命肅將兮徒御如林徐君覯止兮話言欽欽顧我劒兮眷愛彌深我歸魯兮徐亡我諶死生不忘兮鬼神是臨嗚呼我其挂劒兮庶昭我心鴻鵠操粵鴻鵠兮舉翮髙飛戾霄漢兮矰􅗤逺而彼河山兮險阻是依建邦國兮晉實肇基濟夫河兮浮舟以楫治夫國兮匪士伊說顧鴻鵠兮其言凌厲嗟若人兮我心孔說江雨謠題偶武孟江雨軒陸仁良貴白龍祠前江水緑江上何人吹紫竹江妃清怨不能降散作浮雲滿江曲浮雲忽變江雨來亂撥驪珠三萬斛天昏地黑若混沌鐡馬交馳龍戰陸初疑巴陵走急湍復訝匡廬瀉飛瀑鮫人停機那敢織馮夷揚波自起伏須臾靜聽寂無聲嫋嫋如絲成霡霂長江直截東海邉夕陽照向江頭屋滿村父老起歌謠䆉稏今年秋雨足幽人開軒舉醽醁正愛晚來凉氣肅我今下榻軒中宿幾時更剪西窗燭憶别曲來時蘼蕪青歸時蘼蕪黃楊栁蕭瑟鳴蜩螳帖帖髙飛鴈南翔鴈南翔懷故鄉夫君逺在婁之陽玉壺青絲唱窕窈荷花落日棹相將玉佩謠吾衍子行昆吾剪月吹香風鸞絲貫縷聲瓏瓏珠華䦨珊舞回步宓妃催喚蓬萊宫聨翩鳳帶春風碎曳雨搖雲楚腰醉仙人琪樹生晚寒洞中敲折青琅玕古采蓮濕風吹花生冷香馮夷為舞冰絲裳霏霏粉金飄晚塘浮蘭舟鼓桂楫歌采蓮為君發遲遲歸來弄明月洛城曉洛陽曉氣浮春空花風漾暖香濛濛油車碧鈿金騕裊染露蹴烟移海紅回廊復宫洞房隔夢入瑤臺買春色叠栁蛾眉蜀帳昏謾識銅駝錦香陌鸞悲鏡舞秋茫茫簾移日光春晝長春晝長恨春草蝴蝶飛來鬢先老孔子琴操四首王逄原吉去魯作汶泗交流兮龜䝉相繆兮鬱乎尼丘兮禮樂賜自周兮大夫好修兮吾將返吾輈兮過匡作文王徂兮道在豫兮天蓋常時則渝兮二三子毋徐徐兮伊草露之濡兮去衛作我行于衛有淇湯湯彼或知本伊流則長載儃載徊禾黍芒芒匪邶鄘豫傷武公其亡厄陳作天地塞兮日月食兮君子厄兮周公云逺心不知所底極兮趙氏二女辭遊鯉山石髙孱顔遊鯉溪水清洄灣中有峩峩青髻鬟望如春雲不可攀壬辰仲冬寇蜂起乳臭將軍先披靡民人顚連社禝圯我固當為貞白鬼後來小妹復被驅亦葬魚腹全其軀山髙水清幾千載虹月夜貫雙驪珠夜深鮫宫屛機杼風吹草寒髑髏語何由生長江沱間及見王睢鼓衣羽願回堯天行化日女子有家男有室地下甘心燈似漆笞女臺歌熊夢祥自得在京南城放生池東髙三丈蒿草芃芃鄉老俱稱金蕭后笞女於上荒草堆燕人號為笞女臺金源蕭后飾宫女表正壼範出聖裁此事庸或有史筆獨不該繁華若流水去者不復回後人見遺跡孰不興逺懷閒花野草今猶昔當時美人安在哉丁都護樞密三知院逹爾瑪戩總戎曹州進兵陷陳諸將卒士棄其主將而潰於是被害甚慘後以十月末旬獲其骨而歸招魂于順承門外丁督護郎上馬將星煌煌干戈戚揚貔貅百萬羽林郎旌旗所指孰敢當丁督護郎下馬穹廬滿野笑言啞啞良家女兒擎玉斚夜來葉落消長夜丁督護郎進兵旗電鼓霆澤劒流星指麾衛軍歌楚聲主將傾危血刃腥丁督護魂來歸少妻嬌兒涕泗漣洏去時鞍馬何人騎肘後玉印今歸誰嗚呼猗戲國之梁棟哲人萎萎乾坤清氣卷十
