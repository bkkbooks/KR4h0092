body:
  text: 乾坤清氣巻十四明偶桓編五言長律元日朝賀趙孟頫子昻閶闔曙光生觚稜瑞氣横治朝春有象嚴蹕物無聲簮笏千官列簫韶九奏成彤墀簇仙仗翠樹拂霓旌絶域梯航至遐方玉帛盈皇圖天逺大聖德日髙明兵息知仁布民熈見化行耄倪齊鼓舞率土共昇平正月十一日朝回即事虞集伯生宫樹春隂合霓旌拂曙來天光臨閣道雲氣轉蓬萊晝漏沈沈鼓晨尊灔灔盃香霏簾底霧樂殷殿前雷祥瑞儀曹奏珍淳尚食催舞庭分鷺序効獻過龍媒融雪微生草輕風不動埃老人南極至王母上方回玉色何多喜金華得重陪裁詩賀新雨西閣待門開送南宫舍人趙子期宣詔交趾三年頒正朔五月向南交將命方離闕陪臣巳在郊衣裳鴻羽漸干戚虎皮包瘴霧衝風散瀧湍急雨捎朱鳶窺土室白雉下橧巢夜浦鮫停織陽岡荔拆苞初筵紛㲲罽後騎列笳鐃諏日修王貢兼時眡客庖方言書仄理海錯藉菁茅漢柱苔侵篆秦林樹拂旓括囊無薏苡當户有蟏蛸即見還英節毋煩筮六爻贈李兄提舉之官豫章范梈德機公孫閣下士多似魯諸生昨者聞高誼茲行起盛名文亭南斗近征斾北風輕余亦懷鄉郡今猶滯帝城關河驚半面霰雪念孤征芳宴絲簧咽新詩錦繡成長途心果怯令節眼增明渺渺飢鷹度嗸嗸旅鸛鳴露凝秋浦白雲散夕堂清是物關流動何堦計合并㑹須縈桂楫相共啜蓴羮徐孺亭前水因之幸寄聲贈翰林宅山水圖敏絶丹青手驅馳翰墨塲力能移地軸藝直破天荒素壁清風起蒼厓旭日光喬林支混沌巨石偃滄浪鶴背芙蓉影牛頭薜荔香參差殊不謬奔峭亦非常仙去遺真館人來倚釣航向知萬里近不費一生忙擬乞丹砂洞長尋碧草鄉松喬如可及結友更何方題桃源圖龍虎山南者掲徯斯曼碩桃源非一處龍虎畫難同内外關踰鉄高低石作叢黄幡青劒北紫蓋白雲東蟾影當霄逈蛾眉抱月弓千重藏曲折四面削虚空地户吟風黑天池浴日紅雪霜翻濺瀑雷雨㵼崩洪暗識猿啼遠晴聞鳥語工危龕三井秘絶澗九橋通江合仙岩怒山連鬼谷雄劉王開闢後秦晉有無中時見㸔桃侣頻逢採藥翁丹臺寒漠漠琳宇氣熊熊濟勝非無具緣源恐莫窮烟霞俄變滅草樹杳蘢䓗四序何勞誌羣愚倘擊蒙誰言武陵近十里上清宫贈周景遠學士楊載仲𢎞朔易回元氣人才起俊流聲華當翰苑文彩冠中州振佩趨臺閣抽毫侍冕旒人傳鸚鵡賦家有鷫鸘裘式覩黌宫立恭惟祀典修一朝虞或缺六器俾旁求爼豆俄成列蘋蘩遂可羞中朝方有道下士實同休已及歸鴻候姑為食蟹謀朋簮多繾綣使節少淹留曉日花間酒春風栁下舟篇章微品藻山水愧清幽鄭璞曾先辱隋珠不暗投考槃雖自引闚觀亦吾憂簡册銷長日蓬蒿憚凜秋論高非縱誕興遠托賡酬尚憶駒千里胡能貉一丘何當把君袂相逐馭風遊寄王繼學二十韻聖主敷皇極元臣建上台虚心求俊乂削跡去奸回拜命超凡品知君秉大才淳風隨日播公道應時開負鼎資烹飪操刀貴剸裁銛鋒行肯綮異味合鹽梅廟議常參决朝班復共陪艱難須佽助豁達遠嫌猜遺佚聞風起英雄接踵來經綸非董賈詞藻亦鄒枚在野思羅致盈庭想轂推既將龍作友惡假鴆為媒走也今留此公乎可念哉執竿猶海上扶耒即岩隈自守幽人意寧虞俗子咍舊遊辭玉府故事憶金臺落魄江湖阻蒼茫嵗月催丹心徒耿介素髮巳毰毸勿謂交如水能忘恥及罍飛黄當駕馭猶足異駑駘贈黄伯中從臨川吳先生卒業因之奉簡栁貫道傳天子祠垣舊巴山闕里門具瞻誰可竝友愛益宜尊往卒諸生業行穿百谷村亂流黄濁湧迎宿錄隂繁想到趨函丈承聞服緒言心將經義洽理竝聖詮存藻繢終迷質條枝實自根須無遵近輓㑹有企前轅伊闕如堪攬河汾欲併呑道初由巳致舌豈要人捫正要薫陶學全希笑色温歸裝當捆載館饋且盤飱羨爾方朝旭慙予未夕昏仰懷駒皎皎深感爰爰搖席今承問緘辭莫憚煩庶幾薦鳳觜兼得嗜熊蹯鯁膳何勞祝因茲寄不諼上執政四十韻雅勒呼正卿聖主飛龍日求賢似拾珍典謨皆故老登用必元臣日月當黄道風雲擁紫宸華封歸帝力夀域囿吾民旭旭時將旦熙熙物自春唐虞風未遠鄒魯俗還淳往者三靈墜扶持賴有人斬鯨清海沸煉石補天迍工鯀趨刑辟臯䕫起隠淪明公辭政久首詔趣裝頻渴慰蒼生望饑怜赤子貧朝陽先覩鳳春籟正書麟總代天成化俱為政入神五朝居輔弼三世掌經綸皇眷恩波濶𤣥功德澤均房謀兼杜斷蕭律繼曹遵厯法羲經秘書文頡篆新山河由秉筆社稷在垂紳衆水宗南渤諸星拱北辰濟為舟楫重任託股肱親玉燭調元氣金樞運大鈞都俞聞密賛諌論喜重陳聲教流沙外謳歌碣石濵烏臺分繡斧鳳沼繼華茵練達時無匹公忠世絶倫棟梁支大厦柱石表重闉天下皆桃李人間盡棘榛中台方正席東閣又延賔有客懷吾道無媒致此身窮經甘寂寞抱拙忍酸辛虎榜叨前列鴛墀接後塵郎潛嗟咄咄吏隠嘆逡逡十口長為旅三年屢卜隣稻粱猶不足抱負豈能伸養母留甘㫖居官守誨諄正言期董賈枉道恥儀秦草芥難終棄蒭蕘尚可詢修途多駿足沍轍有潛鱗未遂風雲信猶沾雨露仁天瓢能一滴咫尺是通津寄李冉黃溍晉卿有美維仙李孤標見碧梧髙雲留雨露短褐混泥塗姿悍寧為小機深或類愚洗心須貝葉游藝及摴蒱政爾難蔵頴幡然獨缺竽從容觀近效黽勉事難趨稍廢琴心曲能操犢背書誰將窮罔象莫使避珊瑚他日逢何暮清談動至晡醉醒勞問我喜怒得今渠契濶江湖逈飄零嵗月徂青雲悲㨗徑白日仰亨衢秋社枌榆外南包橘柚初飛騰如借順能勿哭蟾蜍題趙子昻詩巻三十韻柯九思敬仲江漢龍舡下東南王氣收求賢垂睿畧為治訪嘉猷使者班纁幣王孫覲冕旒未央凝掌露東序薦天球顥氣凌風上祥光近日浮㸔花陪雉尾視草近螭頭清曉還聞履嚴寒或賜裘宋公周有客項伯漢諸侯人仰文章貴身承禮數優五朝通内籍九命擅清流昔滯京都久時從几杖遊通家怜我慧對酒慰羈愁妙墨時相贈新篇不厭酬風流追鮑謝文彩駕枚鄒心慕歸來好官因老欲休倚闌秋待月擕客煖經丘歌罷聞啼鳥機忘玩狎鷗苕溪今寂寂松雪自悠悠馬鬛遺封在龍驤待詔不斷縑人共賞隻字世争售揮翰能兼美評量此莫儔調髙鏘玉管筆健映銀鉤江海蒼烟暮湖山碧樹秋賈充能誤國王粲謾登樓花落渾無賴春歸不自由蜀牋臨别墅英頴勝他州揮洒真成癖吟哦可解憂鍾王多韵度李杜極深幽入室能攀踐趍隅恨阻修錦標連玉軸把巻共綢繆寄王祕書王沂師魯佳士欣相識吾宗不乏賢齋房芝曄曄太液鵠翩翩得意同濠上論文到漢前偶因諧陸鐸直欲斸龍泉我巳輕平子君何念伏䖍未成臨鍜竈且復寄漁舡跡忝乗槎客心疑化鶴仙長歌洞簫賦好寄角弓篇丘壑終忘返泥塗肯自怜别來南菊再信斷北魚傳豹隠千峰雨鴻飛一握天吳江元自白燕月㡬回圓阮籍能忘飯揚雄解草𤣥風標勞夢想秋色正澄鮮欲問支機石空畊種玉田遙遙望銀浦應與鳳城連翰苑薦為應奉文字二十韻謝大司徒并呈諸學士天上金鑾客人間第一流贄名唐内相禹拜漢光侯鯤海三千水龜峯十二樓月寒紅燭夜風淡紫微秋鳳誥窺姚姒麟篇振魯鄒珮隨宫漏逺衣染御烟浮淑氣騰奎壁祥光射斗牛焜煌青𤨏闥縹緲紫霞洲瑪瑙濡堯瓮珊瑚耀漢鉤駞蹄中禁釡豹尾尚方騶僕夲師黄巻生惟伴白鷗親庭雙鶴髮家事一漁舟偶預天官選来為帝里遊緑章蒙獨薦青史許同修故郡驚王勃新豐異馬周隊隨魚圉圉角喜鹿呦呦勢似飛三鳳功如挽萬牛桑榆終有望葑菲未為愁國士恩難報書生志未酬誓堅冰雪操五色賛皇猷送葉天根南還陳旅衆仲我識天根子于今二十年吹簫來翠嶺鼓櫂入丹淵日出扶桑底雲生建木顚人間方夜半海上得春先老我江湖逈徵官嵗月遷荒泉流竹里冷雨浸芝田髮短何為者君歸重惘然飛霞浮夕景定在石林邊南山詩山在龍虎山南張宗師藏劒之地曰丹丘有小洞門玉津澗月橋天鑑池金沙井躍雪泉潄雲亭山雲閣丹桂塢桃花源云江左羣山囿仙丘倚太霞上清分亢爽南谷抱谽谺臺觀黄瓊宅林巒赤虎家天池開寶鑑日井射金沙桂霣秋岩粟桃烘曉岸葩泉香通美竹雲液潄靈芽俯澗松偏潤縁崖徑自斜幽亭宜水遶晴閣喜嵐遮神舄丹扄秘𤣥闗紫氣賒石橋留月色銀浦渺星華願解延陵劒終乗博望槎臨風一邂逅食我棗如瓜陪幸西湖台哈布哈兼善北都冠蓋地西郭水雲鄉珠樹三花放鸞旗五色翔雞翹翬鳳渚豹尾殿龍驤駕擁千官仗帆開百尺檣屬車陪後乗清道肅前行河漢元通海湖山遠勝杭經綸屬姚宋制作從班揚瑞繞金根動聲搖玉珮鏘春隂飛土雨曉露挹天漿御栁枝枝緑仙葩處處香葵傾惟日向荷偃借風張寶馬鳴沙路華舟逈石塘金吾分禁籞武衛四屯箱小大濡深澤仁明發正陽皇皇星斗濶落落股肱良朝野崇無逸邦家重有光賜租寛下國傳詔出中堂布政親巡省觀民或怠荒麥禾連野逈桑柘出林長樂嵗天顔喜回鑾月下廊送達兼善典僉傅若金與礪聖治尊儒術賢才翼帝躬立朝防觸豸行路避乘驄復道河南去先愁冀北空激揚元自任出處豈謀同地遠㸔持節天長惜轉蓬繡衣今日把尺素㡬時通别酒花開裏征帆木落中薊門懸夜月梁苑度秋風古縣藤蘿碧霜林菓蓏紅咨詢行每徧閒暇賦能工白日明髙岳黄河繞故宫登臨興何限題寄北飛鴻題索士岩詩巻薩都拉天錫憶昔登天府文章萃帝鄉俊才魚貫列多士鴈成行寶鑑懸秋水驪珠耿夜光三塲如拾芥一箭已穿楊上策師周孔蜚聲陋漢唐鳳池開御宴虎榜出宫墻賜笏丘山重恩袍雨露香天花皆剪翠法酒盡封黄冠蓋遊三日聲名滿四方歴堦趍宰輔捧表謝君王第甲分三級名碑勒上庠曲江嘉宴㑹合席盡才良契誼同昆弟比和鼓瑟簧誓辭猶在耳離思各驚腸弟出丹陽郡君登白玉堂雄文超賈董直筆走班揚臺閣需才器儒林作棟梁超遷烏府掾輝映繡衣郎廹宴封機事平明出奏章日披文典舊時念簿書忙檢討趨經幄論思近御床聖朝稽古道日昃下迴廊羈旅燃薪桂長吟出錦坊弱妻貧且病羸馬瘦仍僵窮巷迴車轍空厨乏酒漿故人傳奏日請使促行裝皇極三臺重燕南各道張承恩辭魏闕攬轡入衡陽曉幕芙蓉露秋空栢樹霜諸司循直矢羣吏肅宏綱漢水浮神馬岐山出鳳凰行須冠獬豸巳見走豺狼慚愧蓬蒿翼乗風亦下翔上京大宴和樊時中韵貢師泰泰甫一元開大統四海會時髦畿甸包幽薊天門啟應臯羣黎皆屬望百辟盡勤勞蕃國來琛獻邉陲絶驛騷劒韜龍尾匣弓屬虎皮櫜列聖尊皇極元臣異節旄宗盟存帶礪世胄出英豪嵗駕嚴先蹕居人望左纛平沙班詐馬别殿燕宗毛鳳簇珍珠帽龍盤錦繡袍扇分雲母薄屛晃水晶髙馬湩浮犀碗駝峯落寶刀暖茵攅芍藥涼甕酌蒲萄舞轉星河影歌騰陸海濤齊聲纔起和頓足復分曹急管催瑤席繁絃壓紫槽明良真曠遇熙洽喜重遭化類工成冶聲同士赴鼛隆㤙雖欵洽醉舞敢呼號拜命榮三錫論功恥二桃重華躋舜禹盛業繼䕫咎燕饗存寅畏游畋戒逸遨乾坤春拍拍宇宙樂陶陶争獻公車頌光榮勝衮襃元日靈臺官以初四日巳酉時享遂以嵗除日受誓于中書免朝紀詩八韻張翥仲舉清廟當春享彤庭放早朝扈鳴更厯正龍集轉寅杓瑞日開黄道卿雲映絳霄八方周象譯九奏舜簫韶爐煖香生术杯紅酒泛椒新符鬱壘換候琯女夷調有待寛書下行㸔戰甲銷衰年今可引歸老故山樵送廉公亮僉事江西李孝光季和除書下北闕使牡指南州暫輟紫霄顧遙瞻畫閣秋官清持玉節天近見珠旒報政民安作聞謠雨不愁梅花當路發月影入江流定有登高賦應將勝日酬吳山清暉亭與坦之仲舉聯句張天雨伯雨吳山秋色裏坦倚石望滄江日脚霞侵户濤頭雪濺窗雨浪奔沙岸叠翥山夾海門雙坦有客愁新隠雨于兹感舊邦坦憑高乘險絶懷古黜紛龎翥雜㳫書連屋淋漓酒滿缸雨聨詩搜月窟坦擘阮瀉嵒淙翥龜殻冠將墮雨龍文鼎可扛頗諧幽事熟坦未覺壯心降翥滿月孤金柱雨叢筠亂碧幢坦晴峯俄黙黙夕磬巳摐摐翥歸路風塵表酬歌不用腔雨送鎦文美知事赴燕南釋大訢笑隠江陵初扈蹕忠義可回天代邸朱虛重南陽鄧禹賢揮毫當白日舞劒動華筵宫錦紅雲暖金盤玉露圓古來三語掾今代孝廉舡無薄燕南幕相期日九遷金陵奉餞趙公子去疾理問侍平章魯公世延入蜀歸秦次龍翔大中韻丁復仲容平章向三峽公子奉雙親祖帳聫裾盛官舩發棹新屋墩誰較謝宫井自餘陳劒閣當西極刀州逺北辰魯公加上爵趙氏洊名臣死節褒賢嗣生榮溢老身渚風開鷁尾江日湧龍鱗夾岸觀如堵中流望若神埋金陵樹遠濯錦水花勻前纛仍踰蜀先墳宛在秦布帆知到日繡斧拜新春亦有羅貔虎無非聚鳳麟川將天作限山入海為濵從騎遥通棧安車緩度輪晨調珍翠釜夕侍妥文茵雛弄娯依坐鷄鳴服伺隣所期長夀考莫或後嘉賔倘有星回使惟應日問人和許集賢春夜寓直陳肅伯將通籍趨香署分曹𨽻𤨏闈金泥疏奏簡珠檢藴朝衣竹静憐鐘迥花深覺漏微絳河低綺綴紺斗入羅帷薄夢先鷄發閒情信馬歸幸因披艷藻謬用接清輝送董副樞鎮益都推轂選才雄分符寄摠戎鐃簫驚海上旌節耀山東百將乗黄道三軍出絳宫營開知偃月陣轉識偏風龍躍蓮花劒烏號棘竹弓旄頭天苑斃鑿齒地隅空奏凱青春外飛書白晝中誰當采金石願紀太平功送户部員外郎張君師允銓選于立彦成聖主當陽宁文星冠甲科經綸彌宇宙帶礪誓山河荆楚藩屛大番禺職貢多銓衡須遴選郎署得逶迤夙拜天書寵俄聞使節過後塵雲擁騎前隊鼓鳴鼉五領初消瘴三江漸息波柴桑訪遺逸廬阜入吟哦地逺雲雙翼天空海一蠡庭闈情最切鼎鼐味應和還直青綾被重鳴白玉珂歸來宣室夜前席問如何六言黄清夫秋江釣月圖趙孟頫子昻塵土染人衣袂烟波著我船窗為問行歌都市何如釣月秋江孤山放鶴圖昔年曾到孤山蒼藤古木髙寒想見先生風致畫圖留與人㸔題王子慶所藏大年墨鴈鴻鴈棲棲遵渚黄蘆索索鳴秋羡殺承平公子筆端萬里滄洲題江山烟雨圖虞集伯生千村春水方生萬里歸帆如羽不知誰在層樓卧㸔江南烟雨柯博士竹樹古石江潭木葉盡落巫峽竹枝更長剪取微風疎雨横吹殘月清霜石帶苔而蒼翠竹垂雨以珠璣藉玉五紋之組析旌六羽之翬趙承㫖蘭石温日觀葡萄天人潄凍芳潤野老沉吟屈蟠南國烟生玉煖西凉酒熟霜寒趙承㫖畫松洒霏烟之餘馨見蒼龍之一體森紫髯之如㦸激清風而直指題聶空山畫扇客來山雨鳴澗客去山翁醉眠花外春雲藹藹竹邊秋月娟娟題王孤雲界畫山水柯九思敬仲滿地山河如繡迴巖樓閣淩風㡬度春花秋雨不知秦苑呉宫過何得之先生故居掲徯斯曼碩可憐古井門外依舊鐘樓屋西何處髙吟痛飲黄花翠竹都迷心事巢由以上文章陶阮之間千古髙墳保下白雲明月青山頭上烏紗分贈篋中縞楮相酬不道别時長别誰知愁是眞愁屋上青天未老門前白日常新他日咎夔稷卨安知不是斯人題雲林畫張天雨伯雨歴歴溪山欲暝離離草樹長春風雨緑蓑歸去苔磯一向無人雜咏三首郭翼羲仲一巻北窗周易五絃南風舜琴自是無心富貴從教遁跡山林仙人杏花滿樹處士楊栁當門白髮烏紗棊局緑水青山酒尊朝汲橘泉丹井莫耕蕙圃芝田肘後長生有訣一笑曾許相傳鸚鵡瀛國公毛羽自然可數仙禽不受凡籠銜得梧桐一葉中含無限秋風乾坤清氣巻十四
