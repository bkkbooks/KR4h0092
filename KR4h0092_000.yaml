body:
  text: 乾坤清氣目録總集類卷一五言古詩一劉因夢吉六首劉祁京叔三首盧亘彥威一首趙孟俯子昂五首貢奎仲章一首虞集伯生六首范梈德機四首揭徯斯曼碩八首楊載仲𢎞二首王士熙繼學二首袁伯長五首胡寬則大一首滕斌玉霄七首杜本清碧一首雅勒呼正卿二首周馳景逺二首薛漢宗海四首黃溍晉卿六首柯九思敬仲三首陳旅衆仲四首方積叔高二首台哈布哈兼善一首甘立允從三首楊缺信可二首傅若金與礪三首薩都拉天錫四首貢師泰泰甫三首卷二五言古詩二郝經伯常一首盧摯處道二首閻缺子濟一首張翥仲舉九首張以寧志道二首黃清老子肅三首楊維楨廉夫五首李孝光季和四首張天英楠渠三首薛𤣥曦𤣥卿二首楊鑄季子二首楊鎰顯民二首周權衡之二首丁復仲容三首陳肅伯將五首張率孟循一首吳克恭寅夫三首倪瓚元鎮四首潘純子素二首郭翼羲仲一首陳基敬初二首饒介介之一首鄭采季亮一首秦約文仲一首陸仁良貴一首鎦堪子輿一首吾衍子行二首卷三七言古詩一元好問裕之一首劉因夢吉五首吳澄幼清一首趙孟俯子昂一首梁曽貢父一首張經德常一首虞集伯生六首范梈德機五首揭徯斯曼碩五首歐陽𤣥元功一首楊載仲𢎞四首李材子構一首卷四七言古詩二王士熙繼學三首李泂溉之一首鄧文原善之一首胡寬則大一首雅勒呼正卿二首黃溍晉卿三首柯九思敬仲一首元明善復初一首陳孚剛中三首陳旅衆仲四首傅若金與礪三首薩都拉天錫二首貢師泰泰甫四首歐陽檢伯恭一首張翥仲舉四首危素太朴二首卷五七言古詩三鮮于樞伯機一首劉銑桂翁四首周霆震亨逺七首馮子振海粟一首吳缺原可一首陳缺渙翁一首楊缺子承一首段天祐吉甫一首黃清老子肅四首楊維楨亷夫七首潘純子素一首卷六七言古詩四李孝光季和九首釋大欣笑隱一首丁復仲容三首鄭元祐明德二首沈存肯堂一首鄭基本初一首郭翼羲仲三首鄭東季明一首陳基敬初二首楊基孟載一首吾衍子行一首劉致時中一首文質學古一首釋宗衍道原一首陳志所安一首董缺則裕一首卷七古樂府一元好問裕之二首劉祁京叔二首盧摯處道一首趙孟俯子昂一首范梈德機三首揭徯斯曼碩五首李泂溉之三首王士熙繼學四首虞集伯生二首雅勒呼正卿三首柯九思敬仲三首劉詵桂翁四首趙橚茂先一首楊缺子承一首孫缺伯善一首周霆震亨逺二首何缺麟瑞三首祝蕃直清一首甘缺茂實一首彭缺子翔一首胡缺尊生一首趙文儀可一首談缺見心一首卷八古樂府二陳泰所安三首王沂師魯八首陳孚剛中二首陳旅衆仲四首方積叔高三首台哈布哈兼善二首甘立允從一首傅若金與礪九首薩都拉天錫七首趙頤子期一首貢師泰泰甫三首羅缺澗谷一首林缺羲元一首楊夀景熙一首張翥仲舉六首卷九古樂府三察伋士安一首楊維楨亷夫十四首李孝光季和八首張天英楠渠四首查居廣廣居一首張天雨伯雨三首釋大欣笑隱一首楊鑄季子一首胡缺艾山一首周權衡之四首陳肅伯將二首陳樵君采五首項炯可立二首吳克恭寅夫一首陸居仁宅之一首鄭元祐明德一首張簡仲簡二首夏溥大志二首宋無子虛二首不知名一首卷十古樂府四鄭洪君舉二首張憲思亷一首盧升廷舉一首郭翼羲仲九首鄭東季明二首陳基敬初一首郯韶九成二首范立叔中一首徐孝基立本一首鄭采季亮一首于立彥成二首高啓季迪一首袁舉仲徴一首鄭基本初一首錢惟善思復二首徐士榮仁則一首張樞夢辰一首袁華子英一首瞿榮智惠夫二首秦約文仲二首陸仁良貴二首吾衍子行三首王逢原吉五首熊夢祥自得二首卷十一五言絶句楊奐煥然五首虞集伯生二首柯九思敬仲三首王沂師魯一首陳旅衆仲二首潘純子素一首丁復仲容二首郭翼羲仲四首鄭東季明一首五言律詩一劉因夢吉二首許衡仲平一首姚燧端甫三首盧摯處道四首高克恭彥敬二首趙孟俯子昂四首李孟道復四首虞集伯生十三首范梈德機九首馬祖常伯庸五首揭徯斯曼碩八首王士熙繼學一首楊載仲𢎞十六首栁貫道傳五首卷十二五言律詩二雅勒呼正卿三首黃溍晉卿三首王沂師魯六首汪元量水雲二首陳旅衆仲四首方積叔高三首台哈布哈兼善三首甘立允從一首傅若金與礪七首張缺蒲澗一首蕭缺周逺二首劉聞文廷二首高缺孤雲一首郝缺新齊一首高缺志翔一首薩都拉天錫六首楊缺信可一首郭缺君彥三首貢師泰泰甫三首張翥仲舉七首段天祐吉甫三首楊維楨亷夫六首李孝光季和五首薛𤣥曦𤣥卿一首張天雨伯雨二首釋大欣笑隱三首宋無子虛二首卷十三五言律詩三周權衡之一首丁復仲容五首陳肅伯將六首吳克恭寅夫四首柯九思敬仲二首鄭元祐明德一首潘純子素五首陳方子貞一首張憲思亷一首郭翼羲仲六首鄭東季明三首郯韶九成二首楊基孟載三首孫華元實二首倪瓚元鎮三首于立彥成一首邵思文彥文二首瞿榮智惠夫一首董章士明三首屠彛彥德三首王􅑮原吉五首卷十四五言長律趙孟俯子昂一首虞集伯生二首范梈德機二首揭徯斯曼碩一首楊載仲𢎞二首栁貫道傳一首雅勒呼正卿一首黃溍晉卿一首柯九思敬仲一首王沂師魯二首陳旅衆仲二首台哈布哈兼善一首傅若金與礪一首薩都拉天錫一首貢師泰泰甫一首張翥仲舉一首李孝光季和一首張天雨伯雨一首釋大欣笑隱一首丁復仲容一首陳肅伯將二首于立彥成一首六言趙孟俯子昂三首虞集伯生六首柯九思敬仲一首揭徯斯曼碩四首張天雨伯雨一首郭翼羲仲三首瀛國公一首臣等謹按乾坤清氣集十四卷明偶桓編桓字武孟號海翁因眇一目又自號瞎牛太倉人洪武中官荆門州吏目是集録元一代之詩分體編次其中如汪元量瀛國公元好問等上該金宋之末張以寧危素等亦下涉明初朱彛尊靜志居詩話稱明初詩人操選政者賴直良卿許中麗仲孚劉仔肩汝弼沈㢲士稱王稱孟敡皆有所蔽惟瞎牛乾坤清氣一編能别開生面惜所鈔闕七言近體絶句未得全書恆以為憾此本稱鈔自孫氏蒼雪齊所闕與彛尊本同又以厲氏樊榭山房本郁氏東嘯軒本參校頗為完善雖卷帙無多而去取精審又編在明初多見舊刻如七言古詩中陳旅泰定元年八月一首張翥周昉按樂圖一首鄭元祐送林彥清一首將還淮揚一首古樂府中揭徯斯馬上郎車中女二首陳泰漢使謡一首薩都拉秋夜長一首張憲飛來孤一首五言律中如馬祖常寄邵允文一首南征一首張翥雜臺一首遊石頭城清涼寺一首楊基夏夜有懷第二首今本集皆佚不載惟賴此集以存又五言律中趙孟俯次袁學士上都集韻一首松雪集不載而談氏所刻趙子昻詩集有之當亦從此本托入也他如題金淵集詩山村集竹素山房集皆作吾衍此本作屠彛烏夜啼將進酒趙孝子歌三首玉山草堂雅集作柯九思此作雅勒呼皆足以考異其餘字句互異諸集者不一而足甚如倪瓉春日雲林齊居詩凡六韻六十字而與本集相同者僅十七字桓受知倪瓉最深是必其手授定本為編雲林集者所未見元詩選本究當以此本為善也乾隆四十一年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
