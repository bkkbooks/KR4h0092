body:
  text: 乾坤清氣巻七明偶桓編古樂府西樓曲元好問裕之遊絲落絮春漫漫西樓曉晴花作團樓中少婦弄瑤瑟一曲未終坐長歎去年與郎西入關春風浩蕩隨金鞍今年匹馬妾東還零落芙蓉秋水寒幷刀不剪東流水湘竹年年露㾗紫海枯石爛兩鴛鴦只合雙飛便雙死重城車馬紅塵起乾鵲無端為誰喜鏡中獨語人不知欲插花枝淚如洗結楊栁怨長樂坡前一盃酒鄭重行人結楊栁可憐楊栁千萬枝㸔㸔盡入行人手輕烟細雨緑相和惱亂春風態度多路人愛此風流樹無奈朝攀暮折何朝攀暮折何時了不道行人暗中老素衣今日洛陽塵白髮明朝塞城草栁色年年嵗嵗青關人何事管離情春風誰向叮寧道折盡柔條莫再生留春曲劉祁京叔絮飛冷屑龍蟠玉花殞香摧鳳銜燭批頰深林叫新緑倚䦨人唱留春曲春光欲去如死灰明朝煖風吹又來何如日日長相守典衣共醉花前盃殷勤留春春不住白日西馳水東去鏡中絲髮奈老何君當持盃我欲歌征婦詞青燈熒熒照空壁綺窗月上莎雞泣良人塞上遠從軍獨妾深閨長太息憶初癡小嫁君時謂君早晚擁旌麾如何十載尚輿𨽻東屯西戍長奔馳秋風戎馬臨關路千里持矛關上去公家事急傳令嚴兒女私情那得顧恨妾不為金鞴靫在君腰下隨風埃恨妾不為龍泉劒在君手内飛光燄慕君不得逐君行翠袖斕斒空血染君不見重瞳鳳駕遊九嶷蒼梧望斷猶未歸况今沙塲征戰地千人同去㡬人回君回不回俱未見妾心如石那可轉題子陵釣臺盧摰處道雲山蒼蒼兮烟木稠石灘潺潺兮江水流故人兮冕旒先生兮羊裘使人皆先生兮誰其伊周使人不先生兮誰其巢由可仕止久速兮舍聖人將焉求清風一絲兮豈為名鈎蕉黄荔丹兮香火千秋岸下㡬篙兮榮辱之舟先生一笑兮白雲收秋夜曲趙孟頫子昻雨聲滴夜清漏長朱簾金幕浮新凉閨中美人動裁剪故羅衣袂生秋香東鄰剥棗西鄰穫旅館無人念飄泊餘不潦盡㴠清輝芙蓉壓隄怨不歸墻根草緑隂蛾飛葡萄架空墮殷玉遙夜露寒生體粟暗蛩棲草鳴不平無絲絡緯空勞促夢魂苦短道苦長萬山深處非吾鄕玉蟲搖缸螢入屋去鴈來魚應可卜醒眼熒熒愁萬斛杏葉黄范梈德機杏葉黄天雨霜穹窿擕日照八荒回光照見白玉堂堂中美人雙鳴璫中宵抱被直西廂忠君愛親兩不忘奈何零露沾衣裳清曉樓頭見征鴈不如謝官歸故鄉轆轤怨門前水揚聲似雨幽人當窗碧絃語東里征夫去不歸一雙蛾睂鏡中舞年年井上攀轆轤勞心只恐秋葵枯他年種得長生草梅花落盡青青好掘塚歌昨日舊塚掘今朝新塚成塚前兩翁仲送舊還迎新舊魂未出新魂入舊魂還對新魂泣舊魂叮嚀語新魂好地不用多子孫子孫綿綿如不絶曾孫不掘𤣥孫掘我今掘矣良可悲不知君掘又何時楊栁青謠掲徯斯曼碩楊栁青青河水黄河流兩岸葦籬長河東女嫁河西郎河西燒燭河東光日日相迎葦簷下朝朝相送葦籬傍河邉病叟長回首送兒北去還南走昨日臨清賣葦回今朝販魚桃花口連年水旱更無蠶丁力夫徭百不堪惟有河邉守墳墓數株髙樹曉相參長風沙夜泊長風沙風沙不斷行人嗟行人嗟奈君何南風正髙北風起大船初灣小船喜移船更近大船頭不獨風沙夜可憂但祝行人好心事長河何處是安流茅屋參差數株栁時平尚置官軍守青裙老嫗詫鮮魚白髮殘兵賣私酒魚賤可買酒可沽他人心事知何如漁父辭夫前撒網如飛輪婦後搖櫓青衣裙全家托命烟波裏扁舟為屋鷗為鄰生男已解安貧賤生女巳得供炊爨天生網罟作田園不教衣食㸔人面男大還娶漁家女女大還作漁家婦朝朝骨肉在眼前年年生計大江邉但願官司減征賦有錢沽酒醉中眠雖無餘羨無不足何用世上千鍾禄馬上郎馬上郎沙撥浪織金出袖齊膝長花靴蹴踏銀鐙光紅纓白帽紫絲韁三三兩兩雙鳴璫朝飲吳臺雪夜宿秦樓月酒酣却抱琵琶撥嬌歌刺刺隨手拍此聲此曲世罕聞只今天下無南北車中女車中女紅罟罛珍珠寶結間珊瑚茜裙盤蹙金鳳雛繡簾低坐青氍毹十十五五聫鳴駒大姨封吳越小姨贈秦虢瑤池錫宴日西側紗籠照道髙聲喝君王不愛畫蛾睂未數昭君好顔色漢陽郎官湖歌李泂溉之山翁薄暮醉酒歸杖藜迷却髙陽池清風吹花緑隂倒我笑謂是秋雲移還乗貫月槎夜過郎官湖峥嶸星斗入江漢蕩漾槎影如鯨魚九華之真人邀我倒玉壺麒麟擘脯供行厨依稀仙樂在空際碧山四映寒蟾孤舉酒酌寒蟾明月下飲嫦娥俱霓裳拂雲錦萬荷㵼露瓊瑤珠麾􅓚晻靄羅烟空乃有玉皇所授之玉童風前飄飄曳廣帶對立十二秋芙蓉清香九曲銀河通真人緑髮披天風錦袍玉雪照天地口說姓字安南公是公多逸氣畧與古昔賢豪同時能掃月色延我石室烟蘿中又言昔同張謂所遊地長嘯一覆丹霞鍾風吹仙樂度溪去我已醉卧香爐峯舞姬脫鞋吟應制作吳蠶八繭鴛鴦綺繡擁彩鸞金鳳尾惜時夢斷曉妝慵滿眼春嬌扶不起侍兒解帶羅韈鬆玉纎微露生春紅翩翩白練半舒巻筍籜初抽弓様軟三尺春雲入手輕一彎新月凌波淺象牀舞罷嬌無力鴈沙踏破參差迹金蓮窄小不堪行自倚東風玉階立裴公亭吟朝遊鴻濛津莫出天壇東手把天符書笑逐黄睂翁翁行宛若飛空龍倐爍萬里生星虹翻然為我一揮霍樓觀盡入青冥中是中泉石秋玲瓏泉下禹穴滄溟通長林月色散輕霧潭影下燭玻瓈宫坐來况值青春暮一日千娥獻歌舞水殿風繙鳳髓香濃緑迢迢出廊廡宫牆亦有裴公亭溪毛映水連錢青飲酣起舞岸巾嘯太行落日春𠖇𠖇太行西來幾千里我自南來浙江水浙江潮回不寄君只憶横空紫烟起岸烟起空氤氲不煩擊石呼將軍我行慷慨謝公去更欲長揖南溟君會稽山上落花裏扶擕醉入千峯雲君莫舞王士熈繼學獸環魚鑰開九門長刀閃月如雲屯軍中置酒毛髮立楚漢瞋目争乾坤楯上切肉衫血涴白璧入手玉斗破悲風烈日吹秦聲赤龍將飛沭猴卧項莊項莊君莫舞以力取人天不與明珠美女棄若遺誰遣驪山作焦土戰旗髙髙日向曛天空雲散猶待君漢王夜走灞上路紀信成灰范增去行路難請君莫縱珊瑚鞭山髙泥滑馬不前請君莫駕木蘭船長江大浪髙觸天瞿塘之口鐡鎻絡石棧縈紆木排閣朝朝日日有人行歇棹停韉驚險惡饑虎坐嘯哀猿啼林深霧重風又淒罥衣絆足竹刺短潛形射影沙蟲低昨夜雲月暗今朝烟霧迷青天蕩蕩紅日逺王孫遊兮草萋萋行路難歸去來振衣滌塵轉淮海故山之雲莫相猜行路難古猶今翻手覆手由人心江空月落長短吟轔轔之車渡黄河汎汎之舟江上波漢使叱馭九折坂將軍横旗下牂牁君不見長江大道人如蟻漏盡鐘鳴行不已又不見吳江八月人戯潮赤脚蹴踏潮愈髙男兒有志在四方憂思坎軻纏風霜不及江南豪富兒一生足不下中堂烹龍膏薦麟髓千金一笑如花美忽然對面九疑峯送君千里復萬里生鐡無光劒花紫薄霜碎碎月在水鷄鳴函谷雲縱横志士長歌中夜起古意彈琴罷離聲置酒喜合并奉君藍田之玉巵凉州葡萄新釀成君醉不肯飲月華為誰明羅襦起舞錦茵動花落簾前驚乳鳳五更上馬雲滿天馬蹄却厭鳴珂重不向章臺學鬪雞為通名姓入金閨銅壺滴滴宫漏晚鴛鴦飛來池水滿白翎雀歌虞集伯生烏桓城下白翎雀雌䧺相呼以為樂平沙無樹托營巢八月雪深黄草薄君不見舊時飛燕在昭陽沈沈宫殿鎻鴛鴦芙蓉露冷秋宵永芍藥風暄春晝長吳中女子畫花鳥歌吳中女兒顔色好洗面㸔花花為悄調朱弄粉不自施寫作花間雪衣鳥緑窗沈沈春晝遲半生心事花鳥知花殘鳥去人不歸細雨梅酸愁畫睂秦淮謠雅勒呼正卿天險淮南紀猶隔秦淮水水上石頭城城頭更戍兵如何愛歌舞坐待韓擒虎璧月委瓊枝歡娛能㡬時大堤曲郎家大堤上妾住横塘曲年少結新歡離别豈所欲日日望郎歸門前春草緑嫁時雙明珠繫妾紅羅襦纂製逺遊屐願諧比目魚路長不可致搔首空踟蹰賦得月漉漉送方叔高作尉江南月漉漉泥在水送君歸㡬千里泥在水月不明執君别難為情漉漉見月水深泥多飄飄遊子嵗莫如何洞庭露下木落無波白雲在望鼓枻謳歌念子之來擕書一束兹焉言歸榮飬以禄雄劒在匣弨弓在箙馳騁千里毋爾局蹙烏夜啼柯九思敬仲故宫芳草春日低髙林漠漠烏夜啼烏啼不斷愁深閨萬里封侯何足道玉顔如花夢中老東方欲曙烏飛去門外落花紅不掃將進酒送方叔髙之鄔子洲巡檢君不見瀟湘之浦蒼梧山虞帝南巡去不還當時揖讓稱大聖但餘湘竹秋㾗斑又不見汨羅江頭深碧玉屈原憔悴江頭哭皇天何髙地何厚忠而被讒空放逐將進酒君莫辭聖賢亦塵土不飲當何為桃花水煖歌聲度楊栁風輕舞袖垂况是驪駒促行役美人惜别低蛾睂有肉如陵有酒如海今日盡醉極歡娛莫待重來髩絲改黄金束寶帶白玉飾雕弓將軍馬上意氣雄賦詩横槊踰江東趙孝子歌愁漠漠歌嗚嗚哀鳴背雪聲相呼中原無書嵗復晏有父萬里身羈孤兒欲從之重回首闈中有母母有姑側立乾坤去復住浩浩落日明江湖憶昔方保抱阿爺辭家去倐忽三十年兒今壯已娶一朝祖母死揮淚青山濕却辭老母遡江湖風沙何處收親骨燕市逢先友迢迢指濵州濵州東去二千里城南亂塚那可求號天頓地淚成血天地為之色慘烈結髮誓死不去此髮解塚開還見碣兒能褁骨反如慕妻能守志終同穴君不見泣林冬出筍卧冰寒得魚古來純孝動天地長歌紀事誠非虚璽書旦暮旌其閭和東坡四時詞劉詵桂翁燕子輕寒生院落佳人自捲猩紅幙樓頭風細墮楊花簾下日長添繡蕚纈紋酒暈透瓊肌雙陸初贏笑問誰閒綰同心當戸立不知花影滿春衣幙波微皺迴廊永酒闌手枕珊瑚冷槐影横堦午簟凉榴花滿地風簾静梅酸未試意先顰倦拂琵琶撥未勻紈扇半閒冰椀凍翠禽兩兩下窺人甁浸雙頭蓮顆緑畫闌閒却青奴竹微凉半下水晶簾坐㸔飛螢度髙屋夜静樓風時動扄隔墻一葉落虚庭血色鴛羅裁未就月明處處起砧聲燭暗睡消聞畫角玉盆脂水紅冰薄深戸無風繡幄垂小瓶一片梅花落轆轤隔屋聲咿啞雲母香猊暈宿霞報道捲簾寒霧重午妝纔試翠鈿花曉寒曲趙橚茂先曲闌廉繊杏花雨博山烟飛裊晴縷夢回錦帳春融融鸚鵡驚寒隔窗語美人曉妝雲滿梳栁風吹香入氍毹翠鬟裊裊綰不斷寶釵壓髩紅珊瑚丫鬟捲簾采桃葉驚起一雙黄蛺蝶錢塘歌楊缺子承錢塘女兒十四五鴉髻垂肩學歌舞黛睂染得吳山青争把琵琶按新譜婚期全不遵禮經典與豪家侑尊俎數年限滿無相離兒女相逢不相覩妖嬈再入豪家去臉色論財充阿堵飯抄雲子魚作羮髙捲珠簾鬪睂嫵色衰嫁作良人妻不事耕蠶願生女徒聞禮樂百年興吳越之風難復古吳越之風難復古去妾辭孫缺伯善妾昔紅顔鮮抱裯十五年阿母云亡主中饋安排翁續鸞膠絃新歸主婦情未密陡然兩意生荆棘推將怨隙在妾身教妾彷徨留不得翁今愛妾空有心妾亦知君愛妾深自古亡家為顔色妾身不當千黄金回頭向翁語遺子留自乳浮雲有散時人生豈長聚妾去婦肯留妾留婦應去但願主翁琴瑟調妾身不恨無歸處銅雀妓周霆震亨逺鄴城臺髙餘夕照陵草萋萋心尚少生前破賊嗔為奴却視閨門巳傳笑虞淵那得日更東賤妾飲恨何時窮月朝望罷又十五不堪回首臨新宫宫中日日選歌舞先帝舊恩金屋貯凄凉銅雀閱年華羞見西陵陵下土餅師婦妾生不識分離怨餠師朝暮長相見宫中豈少貌如花何事王心在微賤洞房清夜懸明珠夢魂睊睊繞故廬餅師召入雙淚雨放妾偕老歡如初種花道傍貴雙蔕庸奴包羞輕伉儷王心不惜恩海深一旦翻然悔初意春風落花香有無明月入水泥不汙歸來鄰媪笑相問世間亦有秦羅敷畫角辭何缺麟瑞莫吹角吹得梅花片片落朝吹暮吹吹不了盤古不知坐成老童男童女求蓬山何如此器束之髙閣間金盤擎露仙人掌何如敇斷此聲勿用響不知今日復明日兩髩常常黑如漆莫吹角天寒嵗晚情更惡天馬歌崑崙髙哉二千五百餘里日月相隠避黄河發源下有渥洼水大宛羣馬飲其澨天馬下與羣馬戯産駒一日可千里滴汗化作燕支水國人縳藁為人置水際久與馬習不經意一朝却被人馽繫張騫使還報天子天子不惜金珠與重幣期以此馬可上致大宛使人欺漢使致煩浞野樓蘭七百騎攻虜其王馬始至此馬初入天廐時一十二閑無敢嘶萬乗臨觀動一笑盛氣從此無四夷君王神武不世出天産神物相追隨髙皇手提三尺劒蹙秦誅項一指麾天下馬上得不聞取馬外國為龍如可豢龍亦物馬果龍種豈受羈徒令物故過半不補失輪臺一詔悔已遲此詩欲學旅獒可光武一牛亦足嘘漢火後天馬歌建元天子不世出天相神武産異物有馬出在月氐窟寶劒之精乾龍之靈足如奔電目如耀星汗血雨洒駿肉飇輕渴吻一飲黄河塵生昻首一鳴天雷收聲曾為伏羲出河負八卦曾隨穆王逺與西母會鸞旂屬車相後先龍盾虎䩨八寶韉萬乗親臨拜甘泉穩䭾玉輅壇壝前元鼎勒兵十八萬天子自將孰敢戰駿氣横出立陣前百萬聞嘶股俱顫天缺此馬神哉沛西極龍媒望風退天子作歌暢皇明四夷竭蹙咸來庭天馬來帝作歌漢時此馬今更多月氐王頭飲器歌祝蕃直清單于寶刀寒映雪月氐髑髏飲寃血泥丸真人辭綘宫麯生時能醉其骨閼氏夜帳葡萄香拍拍春霞艷秋月賢王起舞谷蠡歌傳呼歡笑兩耳熱燈前人影半闌殘燈後青燐已明滅持盃為爾澆嶙峋胡為對此傷精魂弓蛇猶能致惑疾智瑤豈是無心人頭顱如此當速朽生擒誤入仇家手忍將鳴鏑射頭曼吁嗟降王爾何有後來漢使渃水東猶待留犂撓盟酒碎甆盆歌甘缺茂實河伯捲土歸河水相甆窑没神工廢此盆貢入蓬萊宫監官篆記開元字中和外澤潔且明滿腹文章徧身碎初疑明月墜秋波白翻身􅂒寒毳又疑花底斷蛛絲蟬翼蜂鬚巧相綴秀山獨抱荆山輝温姿欲吐藍田氣當時載酒沈香亭海棠絶艷生精神玉環微醉三郎醒暖風吹散棃園春白頭拾遺浣花老蹇驢破帽東西村却羨田家歌老瓦茅簷醉倒卧竹根富貴賤貧同逆旅地老天荒盆解語茅簷土屋化瓊樓花落𤣥都成菜圃大家奴僕封公侯蓋世英雄散墟墓銅彞寶鼎不復出翠釜冰盤竟何去自憐夀考自珍竒玩弄乾坤逃刼數可以浮醴泉猶勝許由瓢挂樹可以盛羔豚猶勝金銅人捧露我觀古器思古人古人巳矣難招魂千載興亡又今日人不識寶天應惜通𤣥道人聞見多君家舊物重相過後五百年且莫問急呼斗酒為㿽歌莫養虎彭缺子翔莫養虎飽則喜兮饑則怒莫養鷹飢則附人飽颺去鷹去但亡恩虎怒將為寃不如團飯養雞狗狗能吠盜雞戒曉嗚呼世事反覆不可知狗或反噬雞亂啼野鷹來胡缺尊生野鷹來霜風髙山寒鳥死狡􅊵逃我有鮮肉肥爾膏軟皮為韝絲為絛山中忍飢良獨勞野鷹來髙髙臺側翅側立何為哉當途猛虎闞我室赤筋細骨皆凡材野鷹來沔之水昔年種栁今如此巢危雛弱將奈何野鷹歸來吾望爾瓊花上天歌趙文儀可朔風吹沙堆浪白二十四橋沈冷月顚風夜半撼蕪城雪蕚瓊絲破空碧金瓶嵗嵗獻君王玉􅎆泛酒蓮花香明光殿暗沙漠逺人自無情花斷腸落蘂飛天識天路何如拔樹飛昇去唐昌遊女再歸來城中只賣瓊花露江南俘客吟如叫想像裁辭不成調天宫夜半按霓裳玉女擎花紫皇笑明妃曲譚缺見心䕫江水千古萬古流漢宫三千畫圖裏䕫江有女何曾愁邏逤檀槽雙鳳侣彈得孤鴻漢言語妾身薄命蛾睂誤萬里將軍夜城苦氈車似雪雪似沙淚洒胭脂成塞花君王見妾辭玉殿不曾見妾訴琵琶絃聲欲斷心相續自古有愁無此曲世人傳曲不傳心秋草年年漢墳緑乾坤清氣巻七
