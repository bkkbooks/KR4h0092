body:
  text: 乾坤清氣巻三明偶桓編七言古詩鄧州城樓元好問裕之鄧州城下湍水流鄧州城隅多古丘隆中布衣不復見浮雲西北空悠悠長鯨駕空海波立老鶴呌月蒼煙愁自古江山感遊子今人誰觧賦登樓金太子允恭墨竹劉因夢吉黒龍江頭氣鬱蔥武皇射龍江水中江聲怒號久不瀉破墨揮洒餘神功天人與竹皆真龍墨竹以來凡馬空人間只有墨君堂何曽夢到瓊華宫瑶光樓前月如練倒影自有河山雄金源大定始全盛時以漢文當世宗興陵為父明昌子樂事孰與東宫同文采不隨焦土盡風節直與幽蘭崇百年圖籍有蕭相一代英雄惟蔡公䇿書紛紛少顔色空山夜哭遺山翁我亦飄零感白髪哀歌對此吟雙蓬秋聲蕭蕭來晚風極目海角天無窮宋理宗書宫扇杭州宫扇二好事者得之燕市一畫雪夜泛舟一畫二色菊理宗題其背有興盡為期及晚節寒香之句諸公賦詩予亦同作天津月明啼杜鵑梁園春色凝寒煙傷心莫説靖康前吳山又到繁華年繁華幾時春已換千秋萬古合歡扇銅雀香消見墨痕秋去秋來幾恩怨一聲白鴈更西風冠葢散為煙霧空百錢襪錦天留在禍胎更鑑驪山宫當時夢裏金銀闕百子樓前無六月瓊枝秀發後庭春珠簾晴巻天門雪棹歌一曲白雲秋不覺金人淚暗流乾坤幾度青城月扇影無情也觧愁五雲回首燕山北燕山雪花大如席雪花漫漫氷峩峩大風起兮奈爾何西山西山龍蟠幾千里力盡西風吹不起夜來赤脚踏蒼鱗一著神鞭上箕尾天風泠泠清入肌醉抱明月人閒歸嫦娥洒淚不敢語銀河鼓浪霑人衣寄謝君平莫饒舌袖中此物無人知觀雷溪飛狐天下脊老氣盤互回三江瀉天怒合為一水東南來此勢不殺令人愁石門喜見西山開未補青天裂誰鑿混沌胎竒聲猛狀萬萬古山根幾許猶崔巍兩山倒傾瀾百文逢顛崖先聲動毛髪餘爽開襟懐初疑萬壑轉奔石意像彷彿地軸摧又疑鼓角鳴地中百歩未到仍徘徊荒祠下石磴駭目何雄哉春風不到太古雪今日乃得胸中雷穿石誰能窮窟宅流沬勢欲浮蓬萊平生芥蔕今寒灰兩耳到骨無纎埃酈元筆頭天下水石頭之竒猶見推乃知兹游亦竒絶快弄素霓噴瓊瑰東崖一片石坐拂千年苔為招郎山君共巻長鯨杯江妃為撾靈鼓催赤鯶躍出銀山堆先生醉來泉洒靣狂歌一和湍聲哀遊郎山昨日山東州馬耳索御凌風嘶今日軍市中不覺已落山之西山之靣背一無異不待風煙變化神已迷危闗度雪嶺亂石通荒蹊林間小草不識風日自太古我行終日仰羡木杪幽禽啼但見雨色來雲物颯以凄忽然長嘯得石頂痛快如御駿馬蹄萬里來長風五色開晴霓長劍倚天立皎潔瑩鷿鵜平地拔起不傾側物外想有神物提詩家舊品嵩少同畫圖省見巫山低誰令九華名獨與八柱齊千態萬狀天不知敢以兩目窮端倪騫騰誰避若飛隼側瞰何屈如怒猊千年落窮邊煙草寒萋萋若非酈亭書生此鄉國物色誰省曽分題乾坤至寳㑹有待豈有江山如此不著幽人棲頗聞山中人雲間時聞犬與鷄只疑名山别有靈境在不許塵世窮攀躋不是先生南游有成約徑欲共把白雲犁九疑窺衡湘禹穴探㑹稽玉井爛賞金芙蕖日觀倒巻青玻璃風煙回首莫瀟洒南㳺凖擬相招擕書李伯時九歌圖後吳澄㓜清李家畫手入神品楚賢流風清凛凛誰遣巫陽呌帝閽為招江上歸來魂音紛紛音紛紛柱高辰逺聰不聞扶桑初暾海横雲司命播物泥在鈞洪纎厚薄無齊雲公無渡公無渡衝風起螭黿怒夜猿啾啾天欲雨天欲雨迷歸路歲晏山中采蘭杜靈修顧顧復去莫怨瑶臺神女妬坎坎鼓進芳醑耻作蠻巫小腰舞千年往事今如新摩挲舊畫空愴神騰身輕舉一回首楚天萬里江湖春送孟仲則游荆湖兼往襄漢趙孟頫子昂行路方難子何往瀟湘洞庭天一方長江風來浪如雪荆門木落天雨霜千金養客不復見萬里訪舊庸何傷子才有用未得試牛刀愛惜藏鋒芒似聞逺遊未渠央更欲攬轡趨襄陽昔年戰鬭且休息白骨已瘞愁雲黄伏龍鳯雛在何處鹿門山色還蒼蒼登高弔古一長嘯萬事慘淡悲衷腸人生聚散安可常為君起舞君舉觴明朝帆影拂浮玉寄言客居思故鄉小孤山阻風梁曽貢父江上青山一劍孤氣虹夜貫斗牛墟寒藤古祠神所居謾説彭郎迎小姑此言不經聴者愚舉世孰謂明言誣山下長江通蜀吳飛亷怒鎖千軸艫乾坤變色慘不舒竿摧櫓折愁萬夫初疑破虜遇老狐又訝伏波留賈胡陽侯負弩雄前驅馮夷擊鼓嚴後車六鰲掣釣軒蓬壺八駿按轡鞭龍魚神靈怪駭千萬殊縱有健筆難窮書一官長沙賦歸歟三年卧病南陽廬故交新貴一字無扁舟薄泛松江鱸行或止之不可虞呼童取酒聊自娛短歌激烈驚樵漁掀髯一笑誰和予隣商去住依祝巫盤飡拜飼檣上烏百錢之利從所趨浪走不待晨鷄呼進鋭退速中乗除未要冐險争前途江山政自不我疎我亦樂與江山俱安得匹素百尺餘他年寫與東游圗岳陽樓張經徳常洞庭一水七百里煙朝月夕皆經過豈知斜陽萬里更有一佳處君山十二盤青螺乾坤有此樓萬古高嵯峨憶昨長江咫尺限南北風煙畫本一日千摩挲今朝快一登恍若驅沉疴生平所羡鑑湖請乃今更覺君恩多湘靈也似知我至時令白鳥來婆娑銕笛紫荆曲春草黄陵歌江山一醉謾不省悲風落日生白波愛山愛水亦非癖奈此日月如飛梭彭蠡銀山堆碧海青銅磨武昌雲間歎黄鶴采石天外愁青蛾詩家割據幾今古元氣發泄天不訶扁舟歸來月一蓑仙槎已候三山阿吾欲乘興觀銀河金人出塞圖虞集伯生海風吹沙如巻濤高為陁磧深為壕築壘其上嚴周遭名王専居氣振豪肉食湩飲田為遨八月草白風颼颾馬食草實輕骨毛加弦試弓復置櫜今日不樂心慅慅什什伍伍呼其曹銀黄鶻明繡袍鷓鴣小管隨鳴鞉背孤向虚出北臯海東之鷙王不驕錦鞲金鏃紅絨絛按習久蓄思一超是時皛清天翳絶鴐鵞東來雲帖帖去地萬仞天一瞥離婁屬望目力竭微如聞音鷙一掣束身直上不回折遂使孤飛一片雪頃刻平蕪洒毛血争誇得雋頓足悦挂縣狼何足説旌旗先歸向城闕落日悲風起蕭屑煙塵滿城鼓微咽大豪要王具甘歠王亦欣然沃焦熱閼支出迎騎小銕琵琶兩姬紅顴頬舞歌迭進醉燭㓕穹廬斜轉氍毹月三鳯行贈海東之下第南歸海東之兄弟三人如鳯皇胷臆羽翮皆文章九年三入天門翔仲沖天季驚人一日四海皆知名東之之文五色雲見者眩晃生眵昏三進三已之了若耳不聞二人得之喜未足云東之不愠乃可尊束書江上歸見親君子之樂樂最真君不見匡廬之山􅍶崒而嵯峨左界乎豫章諸川匯為蠡番其隂千源浩浩尊岷經潜沱山氣東鬱不得去上衝為紫盖直與天相摩為雲覆八極為雨漲九河海東之子能觀山以成徳其進盖未易量也偶爾小詘奈爾何偶爾小詘奈爾何送戴真人歸越戴先生日飲五斗醉不得再飲一石不肯眠昨從桃源來兩袖擕風煙長安市上小兒女拍手攔道呼神仙馬如游龍花如雨蹴蹋春秋作朝莫東方不作牕間戲上帝還令海邊去海邊玉虹夜不收貝宫珠闕皆蛟虬芝田玉樹久相待天上老仙那許留戴先生鑑湖之水三千丈不可以鑑可以釀明朝亦脱錦袍去與爾酣歌釣船上家兄孟修父輸賦京師南還大兄五月來作客十年不見頭搃白五人兄弟四人在每憶中郎淚沾臆我家蜀西忠孝門無田無宅惟書存兄雖管庫寔父䕃弟竊微禄承君恩文章不如仲氏好叔氏最少今亦老五郎十歲未知學嗟我胡為長逺道諸兒讀書苦不多又不力耕將奈何憂來每得二三友㸔花把酒臨風歌蜀山嵯峨歸未得盤盤先壠臨川側碧梧翠竹手自移應與青松各千尺南風吹雪河始氷兄歸烏㡌何煢煢明年乞身向天子共讀父書歌太平題張令鹿門圖張侯襄陽人深知襄陽樂十年宦學懷襄陽故託豪縑寫山郭老我不樂思蜀郡人言嵩陽好隠居三十六峯常對靣水竹田廬還可圖欲往不能心懆懆忽見新圖被山惱沙禽浦樹俱可人金澗石床為誰好向來耆舊皆英雄駕言從之道焉從㺯珠夜冷識游女沉劍潭深知卧龍八月霜晴水清淺聞道扁舟足回轉何時古寺傍檀溪幾度殘碑在江峴呼鷹臺高秋草多飬魚池中蓮芡波蜀嵩未必不如此我今不游奈老何張侯張侯早結屋莫待史詹為君卜要看壟上課兒畊好在魚梁白沙曲題楊友直檢校所藏李營丘枯木圖老龍出海蒼髯鬚營丘枯木天下無回枝屈銕墮厓雪澗底應拾青珊瑚明堂清廟要梁棟朔風吹沙澤腹凍老身不用歎衰遲按圖來求萬鈞重已未行范梈徳機二年六月已未朔京城五更大地作卧者顛衣起若吹起者環庭眩相愕室宇無波上下揺乾坤有位東西却自我南來覩再震初震依微不今若昨朝展席坐堂上躭翫圖書静無覺堂下羣兒又驚報方饌饔人喪盃勺櫛者倉皇下床榻門屋鏗鏘震鈴鐸祗今猶自騰妖譌旦莫殊言共郛郭大家夜卧張廬穹小家露坐瞻星落焉知怪變不可屢安巢盡有南飛鵲昔聞上帝憂瀛洲親勅巨鰲十二頭特為羣臣舉首戴萬古不與水東流豈其九州亦類此此事或誕或有由上帝甚神吾甚愚戴者勿動心優游孟先生孟先生愛青山㸔山累月出不還蹇驢長笑天地間杖頭酒壺時取酌身雖飢病多容顔往時佳句動明主富有聲名無比數先生遇之亦不驚去卧南山紫蘿雨嗟吾豈是先生徒朝朝飽飯謁禁廬莫歸却向衡門趨刻畫造化論錙銖但有千載名衆人不知而已獨信非其愚未知吾師先生先生師吾孔子不師周公吾亦聊自以娛嗟哉先生獨不得相與于同世雲龍上下游八區題先天觀圖學仙之人與仙為徒住在匡廬之奥湖江之區張公煉丹作龍虎丹成御氣游六虚後來出者絶代無何不學仙住𤣥都𤣥都之壇角井孤上摩萬里之黄鵠下伏千尺之飢鼯隂森檜筠自太古斬種力與開闢俱扶桑朝日挂絶壁坐見樓觀青糢糊擘崖控石瀉哀湍春秋雲露芝田腴我亦人間山澤癯偶陪䕫龍賓唐虞有時一醉黄公壚震風三日撼不蘇折花未得渡弱水揮手始識仙凡殊玉堂學士元與吳遺我兹山之畫圖尋牕數户久嘆息無因致我雙摴蒱獨行幽人不受呼掃葉青澗聴啼烏日暮蘿徑相縈紆相縈紆向何處明朝為借麻姑鵬我亦騎之上天去奉和翰林侍講學士鄧善之韻曩承持節江之東騎鯨再上蓬萊宫蓬萊仙人歌白鶴聲落五湖煙雨中世間爵禄不易致何獨去就如飄風朝廷禮樂須制作六經隠義資發䝉論思廟堂集耆碩啟沃寧讓前諸公閉門讀書古都市四輦冠盖方隆隆我生生長在空谷那有文字争人雄謬䝉引譽百寮上負禄府署慚無功一别十年還又五昔者少壯今成翁誰知復客七閩下隔二千里來詩筒羸軀頓醒瘴癘惡頼此以慰心忡忡越王城南浪自白越王城西花正紅搗練圖深宫佳人白日長夜感蟋蟀鳴中堂起視河漢心回徨雲鬢籠鬆分作行清水如天收素練翠娥帶月杵𤣥霜轆轤無繩金井悄邊頭不見梧桐黄裁縫熨帖坐在床載𤣥載黄公子裳製成不逺煩寄將但見寒暑凋三光身體甚適時平康君不見古來邊庭士雪壓闗河征戰多折盡衣裘淚如水夏五月武昌舟中觸目掲傒斯曼碩兩髯背立鳴雙櫓短蓑開合滄江雨青山如龍入雲去白髪何人並沙語船頭放歌船尾和篷上雨鳴篷下坐推篷不省是何鄉但見雙雙白鷗過送趙履道虞叔常還江左趙子我同里虞郎我同年手折武昌栁送上西江船買魚沽酒燒荻鞭夜下西塞寒山前西塞山碧如苔君今去幾時來東風花開春水漲待君黄鶴磯頭望君庾公樓上夢兩雛阿英十二能辟纑阿牛五歲貪讀書辟纑成縷無人織讀書有志令人惜汝父飄零汝母休吾親雖健俱白頭雨聲斷道風驚屋阿婆獨抱諸孫哭大信晚泊呈舟中諸公千家楊栁江當門東梁西梁兩岸蹲連檣大船集日昏摐金伐鼓海上聞小江更出采石後前人立功後人守大信花采石酒陌上相逄莫回首題陳所翁雙龍圖愛龍畫擘𤣥淵開萬物顛倒隨雲雷龍公被髮向空下身是真龍非畫者銕作鬚鬛玉作鱗電出兩目雲繞身偶然㑹合此何處仰靣向天天不嗔世間眩轉空形影倐然變化那能省高僧説法夜來聴誰道相逢非夢境斗牛蒼蒼風雨莫泉阿豈識延平路當時縱無雷煥與張華未必終藏不飛去題捕魚圖歐陽𤣥元功太湖三萬六千頃靈槎倒壓青天影大魚吹浪高如山小魚巻鬛為龍盤羣漁聫艘伐桴鼓勢同三軍戰彊虜長網大罟三百尺欄截中流若環堵吳王宫中宴未䦨銀絲斫膾飛龍鸞大官八珍奉公子猩猩頳唇鯉魚尾洞庭木落天南秋黄蘆滿天飛白鷗江頭吹笛喚漁舟與君大醉岳陽樓送時中兄入京楊載仲𢎞先生意氣非常流有如鵰鶚厲九秋讀書不肯守章句經濟可許斯人儔懐抱利器將逺游直往上國交公侯王侯位高不下士如以蛟龍視螻蟻為君莫獻光範書以氣撼揺差可耳功名倘來不足為丈夫須作逺大期君不見麒麟閣上圖英俊當時或自閭閻奮次韻虞彦高游陽明洞憶昔神禹奠九州兹山㑹計功始休諸侯玉帛渺何許但見萬水從東流衣冠永閉陽明洞夜聞鬼哭巖之幽珠宫貝闕號龍瑞天造地設非人謀义牙怪樹凍不死化作千丈蒼玉虬丹洞呀然仙掌裂翠峯巧笑蛾眉修梅梁飛去銕鎖斷往往雷雨生靈湫軒轅候神極秘怪海上笙鶴時相投平生閉門讀史記子乃探穴先吾游明當挾子期汗漫題詩更上最上頭不妨山水樂吾樂豈有飢渴憂民憂故家喬木尚可求有子有孫百世留卧横玉簫泛歸舟吹散萬斛江南愁吳真人古劍歌閒閒真人藏古劒敬之如神不敢忽賓客時來求一觀輒有悲風起倉卒人言此是金鐵精良工煅煉久始成動揺天地含變化摩蕩日月含光精昔年有蛟起江中口吐烈熖燒長空下民昏溺上帝怒雷電往擊皆無功常持此劒斬蛟首流血滔滔侵廬阜傳記傳聞時既久不意世間今尚有吾過下里多惡氛魍魎魑魅能食人請君為我絶此怪一洗宇宙長清新題華岳江城圖華岳能詩世有名學畫丹青亦豪放此圖似寫安慶城雉堞樓臺儼相向北風將至江靣黑千艘萬艘争避匿滄溟湧溢水倒流南岳動揺天柱側蛟龍戲落秋潭底素練平鋪八千里時清好作釣魚翁閒弄輕舟煙霧裏過黄陵廟李材子構黄陵廟前湘水緑天寒漁郎唱巴曲沙棠舟上月蒼蒼翠蛟白蜃江茫茫似聞清怨五十柱萬里鴻飛楓葉暮神雅翻舞洞門開珠裳玉袖霑莓苔𤣥猿晝啼薜蘿影赤鱗夜去芙蓉冷北渚淚痕斑竹紋南風哀思蒼梧雲山頭古桂秋露碧山下江流豈終極荒凉掲車雜杜蘅靈風自吹煙霧旌輕帆晚向芳洲泊聊薦蘋羞奠蘭酌沅有汜兮湘有沱洞庭木落生層波徘徊獨詠騷人歌乾坤清氣巻三
