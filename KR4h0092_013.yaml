front:
  text: 欽定四庫全書乾坤清氣卷十三
  hash: sha256:55be8d6edaafde5d19d17a3a50f841b3241e4e6b89bd2c7a38228c821f509233
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0092_WYG_013-1a, image: WYG1370/WYG1370-0386a.png}
body:
  text: 明偶桓編五言律詩過山居周權衡之數里榕隂合迢迢過客稀煙溪桑子熟山雨藥苗肥窗冷雲侵座琴清月在扉怡然無俗子我巳早忘機送楊友直赴刑部主事丁復仲容少昊煩司幕先生自此升九重趨玉陛一騎發金陵邉靜龍堆月河清馬頰冰徒慙太平日江海老無能蘭堂上人之金陵因寄憲府張使君初平牧羊處白石及秋登挂錫月中到禪房雲上曾使君持玉節老客望金陵想見雙溪水先霜早已冰送賈西伯西風苜蓿花南客又移家此道寧無用吾生未有涯峰青宜霧日潮白逆江沙猶憶南樓夜吹簫度嵗華送王伯庸赴石埭校官先生官已冷地僻冷於官座席嵐歸潤琴壇月過寒竒峰花作朵幽瀨玉為湍所喜無迎送髙吟倚碧瀾郭生生子歌愛誇頭玉憐應過掌珠河東真小鳳冀北定名駒英物須啼看先生要醉扶老夫無重大折簡便當呼東華門觀百寮待朝陳肅伯將重城流月影飛闕動霞光度栁分龍隊穿花列鴈行珮連都尉粉衣染令君香忽聽傳呼永催班入建章恩制寒食賜百僚宴罷遂幸長公主宅桃花明玉澗栁葉暗金堤緑錦呈調馬朱絲表鬭雞筵開同日永樂奏與雲齊更問平陽第還過小苑西答張翰林扈駕還京羽林環紫蓋玄武颯黃旗大校長楊獵重修好畤祠雲生三秀草風動萬年枝想得張供奉還多應詔詩聞康給事禁中寓直因寄重慚長樂注曲館建章通户裛金仙露窗含玉女風濃香千緒繭華燭五文虹顧此清宵興遙憐誰與同送浦御史往荆南悵望荆南道飄然忽去羣雲隨驄馬色花學繡衣紋過峽思神女逢灘問使君王程歸有限應未落春分寄上元韓少府借問為仙吏幽懷定若何江聲雲外急山色雨餘多小市金陵酒遺宫玉樹歌好乘巴馬子間踏落花過寄柯博士吳克恭寅夫柯侯五雲吏自號丹丘生先皇御宸極髙閣詠文明羽蓋橋山集彩舟江上行蘇州韋刺史那獨擅才名三月十日與薩天錫録事遊京口城南小寺忽虞伯生祕監寄薩詩用韻呈席上不見祕書久憶公清且間看詩野殿側把酒春林間因送碧鵝使相過黃鶴山遙憐西閣侍文采映珊珊寄薩天錫時居福建憲幕春日江南郡懷人杜若生烏啼建業樹客在福州城桂酒銀壺重華裾玉珮清題詩幕中罷應得動髙情寄題剪韭亭園有幽亭趣題之剪韭名老夫無長物上客總髙情脆碧含風斷輕黃帶雨烹相過乳餅白還愛酒壺清題李伯時畫馬柯九思敬仲聞説龍眠畫曽師十二間桃花晴泛水苜蓿曉連山蹴月馳周道嘶雲入楚關驍騰萬里志顧影落人間送祕書掾李道濟之峽州知事館閣論交久都門出餞遲同為遊宦客忍賦送行詩蜀道傳鸚鵡江亭呌子規地偏公事少峽外看舟移送峽州學正鄭元祐明德夜雨西陵樹春風至喜亭學宫資裁正士類仰儀刑天際開三峽人心繫六經哀猿月中嘯莫作異鄉聽送張飬晦潘純子素寂寞麒麟閣浮沉雁鶩行巳聞書上考應不負前王古井宫槐冷空山海檜長歸心似潮水日日問錢塘題劉髙州國初運糧文卷後帝室經營始髙州積運多猶存數紙在巳是百年過勳業麒麟閣英雄勑勒歌漢廷功第一只合數蕭何送杜元甫赴南臺掾故國江山在行臺北望優顧瞻烏亦好却憶鳳曾遊寺影清河曉蟬聲玉樹秋郎官多古意莫上最髙樓山行即事石子路三義居人八九家緑分鄰寺竹紅出短籬花野老能娛客山泉自煮茶茜裙誰氏女赤腳髻雙了題豫章楊季子水北山房舊聞楊季子水北在山房竹色長年緑松隂六月涼雨絲深釣渚風帙亂書床亦欲相從去江波不可航寄王仲叔陳方子貞陌上誰家子行春並騎來揮鞭不相問回顧復疑猜二月初消雪東風尚落梅更尋禪寂地石上玩蒼苔次許廷佐喜見寺樓詩張憲思亷髙樓名喜見逺客獨傷心鞍馬思劉備衣冠惜華歆曙光浮海闊秋色到江深送目闌干久冥鴻入窅沈雪郭翼羲仲漠漠年華晚霏霏夜色分江明非借月樹重或兼雲始訝花驚陳翻愁鶴失羣梁園詞賦客飄泊獨懷君和東禪悅堂遣興韻讀經香滿室燕坐自朝曛鳥啄生臺飯龍吞洗鉢雲心花幽處現天籟靜中聞汩汩紅塵海虛空念不分寒林雪落黃泥坂江空采石磯老龍寒卧蟄栖鵲夜驚飛笙籟無時息漁樵落日稀明年春色裏還此看林霏合溪别業和顧玉山韻雞犬秦人宅迢迢隔戰氛桃花浮釣艇草閣散鷗羣碧樹重溪合斜陽逺笛聞吟詩雲半席遙想與誰分寄雙徑主者問信維摩詰山中一錫歸遙瞻雙徑月長照五銖衣寶樹交珠網香雲護碧扉虎溪溪上路來往且忘機新雁江上聞新雁秋風第一聲幾行雲接塞昨夜月臨城萬里驚烽火羣飛憶弟兄關山書未寄愁感異鄉情寄郭羲仲鄭東季明憶君持酒别初月出東城溪艇幾時到春潮日夜生白沙眠翡翠青竹下鵁鶄遙想汪徴士題詩慰逸情題余生山居野水流花澗春雲映草亭地連桐柏觀人識少微星養鶴還知相煎茶亦著經卜鄰應未晚休勒北山銘贈吕一相者男子始墮地百年那可量買臣歸作郡顔駟老為郎得路青雲裏垂綸野水傍持杯勸君飲吾意正茫茫谷口郯韶九成谷口大星稀蒼茫夜景微草驚知鹿過潭響覺龍歸楚舞時相狎商歌自攬衣鹿門應有待莫遣壯心違病起書事病起秋水上拂衣塵土間雞鳴帶星出月黑騎馬還旌節黃龍塞羽書青草灣征人在萬里風雪鬢毛斑寄楊團練君濟楊基孟載海嶼通村險邉城去敵遙旗燈秋寨雨鈴柝夜溝潮士飽爭投石農間教舞簫無令廢收穫隴上有枯苖夏夜有懷二首重露澄秋色輕風生夜涼碧看湖草亂紅愛渚蓮香有弟徒相憶何人不異鄉悲笳在城上雙淚落衣裳西月離東井黃雲近紫微秦州今日亂漢使幾時回故舊皆朱紱風塵只素衣流螢念孤寂相照入踈幃召命因母老夜宿嘉禾孫華元實嵗晚離家客更深上水船犬鳴營柝外漁唱驛燈前逺役關慈母孤忠仗老天極知朱紱貴無奈彩衣妍漢使徴求急潘輿定省貧小人猶有母率土莫非臣嵗儉盤炊玉家貧酒泛銀自憂緣白髮豈敢逆龍鱗送李徴君訪王司丞倪瓚元鎮何處尋狂客故人王子猷花落庭前樹風吹溪上舟紫笋生春雨緑蘋滿芳洲心隨酒船發悵望不能休贈義興墨生生住荆溪上桐花收夕煙墨成羣玉祕囊售百金傳孰謂奚圭勝徒稱潘谷仙老松端愧汝桐法更精研張心逺訪郯九成因書以寄州府今為掾風埃多厚顔香芹渾滿澗去鶴未巢山思逐春雲亂心隨野水間張君應話我樗散碧岩間宴聽雪齋分韻得飛字于立彥成暮雪密成圍寒侵酒力微度窗聞暗響投隙見斜飛漸覺明書幌時來近舞衣酣歌過午夜香靄正霏霏簡報國寺僧清逺邵思文文彥聞説招提境空山紫翠中法王新象馭天子舊龍宫愛酒慙陶令能詩憶逺公欲尋方丈室相續晉賢風浙江亭極目錢塘上千峰列畫屛雨晴江樹碧潮落海門青對景悲王𨗳移家憶管寧臨風一惆悵沽酒慰飄零和韻送于彥成歸越瞿榮智惠夫匡山于外史上越有歸舟久負江湖客寧為嵗月留瓊書天上鶴渌水鏡中鷗一曲真幽絶當追賀老遊挽穆爾古蘇董章士明丈夫寧制敵元帥豈容文白髮難忘母丹心只為君虎狼千里戰吳越半江分落日孤城在忠良死後聞次友人韻唐室何多難詩愁杜拾遺皇天終厭亂聖德本無虧自比當年事空懷故國悲一般思弟妹不在漢鍾離秋興憂國三千里思家五七年白雲南去越黃道北歸燕志士懷經濟生靈若倒懸邉廷今日將誰畫上凌煙送丁希元侍母舅北上屠彜彥德白璧連城價明珠照乘光才名推舅氏文采見諸郎栁色迷長樂鶯聲滿建章知君能獻賦官硯發天香暢上人文溪别業文暢青蓮客回溪别業開南山當驃騎東海極蓬萊空境思懸錫中流且度杯相尋多法侣冉冉下天台仇仁父解秩建康有新文曰金淵集老去陶元亮歸來向子平鄉關成久别故舊喜相迎卜宅來江燕移尊笑海鯨新傳浣花句未怪作金聲憶舊遊王逄原吉醉酒髙陽里題詩左氏莊碧雲垂草帶紅旭散花房流水循除活飛絲拂鬢長座中誰潦倒遺却紫香囊簡任子良縣尹儒雅南陵尹歸吳賦遂初畫傳韓幹馬羮煮季鷹魚栁暗凝香閣花交織翠裾能令兩童子為我𨗳行車仙茅塢夜宿仙茅塢金鰲湧亂山天風來海外煙火落人間白石思同煮青蘿喜獨攀絺衣弄華月公子亦忘還韓蘄王墓道過韓王墓停驂淚滿巾中興無輔相恢復有勳臣碑冷靈岩月山還古寺春雲礽尚詩禮時薦碧溪蘋題畢天池道士太霞樓畢卓太霞樓霜晴錦樹稠天光開日觀海色動昆丘織女機橫夜仙人座對秋時將玉尺八醉擁翠雲裘乾坤清氣卷十三
