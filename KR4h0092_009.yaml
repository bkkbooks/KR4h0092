body:
  text: 乾坤清氣巻九明偶桓編古樂府送别曲察伋士安曈曨出扶桑照見大黒洋直升中天上萬國蒙清光三山樓閣蓬萊東丹霞翠壁金芙蓉鴻濛凝結古元氣我欲往遊從赤松剡郎朝玉京船開南風生海頭撾鼔人起舞椎牛釃酒祈神明逺寄平安書十日到直沽阿翁髮半白莫醉黄公壚履霜操并序楊維楨廉夫琴操有履霜謂尹吉甫子伯竒為後母譖而見逐自傷而作也其詞曰朝履霜兮采晨寒考不明其心兮信讒言何辜皇天兮遭斯愆痛殁不同兮恩有偏誰說碩兮知此寃使是詞果其出伯竒則伯竒不得希於舜矣霜鮮鮮兮草戔戔兒獨履兮兒宿野田荷之葉兮葉易穿采楟花以為食兮食不下咽嗟兒天父兮天胡有偏我不父順兮父寧不兒憐履晨霜兮泣吾天鴻門㑹天迷闗地迷户東龍白日西龍雨撞鐘飲酒愁海翻碧火吹巢雙猰㺄范增項莊照天萬古無二烏殘星破月來天隅座中有客天子氣左股七十二子連明珠軍聲十萬振屋瓦拔劍當人面如赭將軍下馬力排山氣巻黄河酒中㵼劒光上天寒彗殘明朝畫地分河山將軍呼龍將客走石破青天撞玉斗蕭杖歌為永嘉璣天則道人賦空心勁草琅玕節瘦如筆枝赤如鐡壺公手中曾擲之黄公石上飛星裂璣天道人雙眼青見之不减九節藤神丁未窺混沌竅中有萬壑銅龍聲道人親鑿崆峒玉九漏玲瓏尺度足黑蛇飛來膝上横道人髯中嘯鸞鵠自言竒音不敢作寒星墮地風折嶽去年臺山解虎鬭今年狼山敲豸角鐡崖相見洞庭東腰間笛佩蒼精龍湘江雨脚吹雌風相呼道人木上座杖陂水拔鬚睂峯蹋踘篇二首為劉娘賦江南女兒花娟娟五花繡出葵花圓蹋花上下雙文鴛雙文鴛玉連𤨏髻斜斜馬初堕金鞭齊停馬上郎落花旋風掃毬塲繡輪擲過東家墻東家墻噪雙燕平頭奴揺便面苦雨謠去年雨坍鹻土今年雨没竈釜竈釜三月青無烟官家火程不問雨胥靡移來坐監主旬申虧官走揷户大風謠大風起不終朝如何三日夜日日夜夜旋扶搖巻水覆我舟巻土覆我窕嗚呼太平玉琯將誰調五日一風不鳴條五禽言喚起喚起東方明門前巳如市上林有鳥解司晨苦殺蕭娘睡方美提胡盧提胡盧沽酒何處沽烏程與若下美酒髙無價小姑典金釵勸郎醉即罷君不見城中官長胡盧提十日九日醉如泥姑惡姑惡姑不惡妾命苦姑有孝女姑為慈母妾亦甘為東海婦子規子規子不歸白頭阿㜷慈且悲子弗歸待何時君不見西江處士章九華十年去赴丘園科母死妻啼未還家行不得哥哥我不行奈我何西山有豺虎西江有風波風波尚可壺豺虎尚可羅弩兒闗平地多行不得哥哥地震謠至正壬午七月朔地震如雷民屋㐳上出毛如白絲紀詩一章章十三句四月一日南省火七月一日南地震地積大塊作方載豈有壞崩憂杞人如何一震白毛茁泰山動搖海水洩便恐崑崙八柱折赤子啾啾憂地裂唐堯天子居上頭賢相柱天如不周保國如甌馭民如舟吁嗟赤子爾何憂金溪孝女歌唐敬宗時撫之金溪有金銀塲銀戸葛佑者輸銀不足監官黄慷榜佑垂死佑二女投銀冶中化銀二錠事聞遂罷銀塲金溪與二女立廟至今血食危太樸有巻求余詩為賦孝女歌云金溪石石生銀鑿石石有盡銀令無時磷昨夜銀官下山頭㸃銀户葛家父無丁惟二女葛家父苦楚苦椘與死鄰二女痛父闗一身駢首跳冶烈焰闇烈焰焚二女不焚二女心天慘慘神森森化作雙白金雙白金盛龍錦願作萬壽巵以奉天子飲一飲銀鬼泣再飲銀令寢箕山操為許生作李孝光季和箕之塚兮白雲幽幽箕之陽兮其木樛樛夫世之人兮孰能遺我以憂雖欲從兮其路無繇朝有人兮來飯其牛采蓮曲為魯子翬作采蓮復采蓮蓮生隔江水不愁無舟楫但恐風浪起采蓮復采蓮水深不得歸兒饑須母哺當令阿誰飴茅山謠送證上人道人兩髩青如蓮大醉上山捫青天青天蕩蕩玉盤出引手舉盤天上懸銀河顚倒挂桂影長風吹香落丹井地上小兒沾賸馥玉兎急𢷬𤣥霜熟仙家十二白玉樓夜半起㸔踆烏浴手招茅君呌列仙帯劒上立紅雲前茅君騎虎上天去道士乞我明霞篇吳趨曲送薩天錫四座竝清聽聽我歌狹邪狹邪不可聽聽我為爾歌吳趨美人珠衱貂諸于美人寳釵有九雛美人投我明月珠采蓮曲送王伯循采蓮江之南采蓮江之北采蓮何所有但采蓮中薏早聞别離苦當爾不願從前作相識縱令别離不復相憶長干行秋風從西來吹我庭前樹聞歡在揚州却向姑蘇住估客離長干敎儂寄書去太乙眞人歌題蓮舟圖銀河跨西海秋至天為白一片玉芙蓉洗出明月魄太乙眞人挾兩龍脫巾大笑眠其中鳳麟洲西與天通扶桑乃在碧海東手把緑雲有兩童掣嬲二鳥開金籠歙硯歌渴龍夜飲天池水六丁揮戈斷其尾黑風吹落歙山深化作𤣥精石中髓山深夜夜飛神光良工盜發天所藏鑿開蒼崖斸寒玉磨礲秋水歸文房元氣淋漓翠光濕松花香碎蟾蜍泣醉掃郇公五色雲倒鳳顚鸞秋瑟瑟誰能持此歸玉堂經天緯地成文章月中老吹寒芒與君同上青雲鄉浣紗曲張天英南渠溪頭浣紗女素足弄清波緑窗費纎手鳴機不停梭織成絺與綌貴之如綺羅持此寄逺客思君心緒多烏夜啼城頭烏夜啼月白薊門時朝陽借光彩翺翔鳯凰池春風黄金樹結巢在髙枝中心懷返哺還向故山飛貞女吟嘗聞漢宫人恩深妬還重自憐冰雪姿肯戀金屛寵春風吹倒山妾心初不動羞死王昭君玉顔没青塚久别離送韶之西安久别離長相思溪頭楊栁樹十見黄金枝枝長花飛如白雪心期暗結東風知東風吹花化為萍一夜浮游滿溪水滿溪水到天池萍亦因之幾千里何時萍實成與君乗舟泛蓬瀛胡波斯引為丹陽氏作查居廣廣居紫鳳檀瓢剖鳴玉斒鏡面蚺蛇腹銀絲四索挂寒冰中有驪珠三萬斛丹陽老人今樂師當筵一曲胡波斯太宰新聲變哈失曹綱縮手昭君悲捩軸抽絃彈曳樂歴亂金盤撒飛雹貝宫月冷泣雌蛟瑤漢秋清呌孤鷟玉壺水咽銅龍哀繞指忽作盤空雪劒光迸火玉斗碎馬蹄飛蹴河冰裂洪牙促羽調聲轉壯士氣酣毛髮立蹋歌起舞勸一觴不惜花袍酒淋濕老人波斯技絶倫出入侯門三十春銀鸞半臂紫貂㡌光動主翁筵上人繁華轉眼成今古獨技波斯向誰鼓歸來醉卧錦氍毺髙樓一夜梨花雨夜寒怨張天雨伯雨貞白眞人擬古樂府夜寒怨山學弟子用末語擬一解夜寒生羣獸驚寂兮寥兮栖遁情隂宫漫漫落葉平岡頭霜月耿微明寒漏澁寒絃𦂳愁腸斷愁語盡人生異木石思來誰能忍奔月巵歌甓社明珠奔入月脫殻政似風蟬潔漁䋞出之不敢視滌盡含沙光不滅文昌四星呑在腹一一金晶大如菽蜃物還來作飲器日夜雄虹亘茅屋一扇桃核寛有餘半葉蕉心卷未舒飲非其人躍入水怪雨盲風生座隅置之天上白玉盤斗柄挹酒長闌干李白跳下鯨魚背持勸我飲相交歡幽宫馮夷為予泣酌盡海水百怪立還我平生老蚌胎許君醉卧鮫人室玉笙謠為鐵門笙伶周竒賦我有紫霞想愛聞白玉笙懸匏比竹無靈氣昆丘采此十二莖鳳咮銜明珠鳳翼排素翎金華周郎妙宫徴子晉仙人初教成月下吹參差羣雛亦和鳴緱氏山頭白雲起七月七日來相迎長謝世人一揮手飄下滿空鸞鶴聲月氐王頭飲器歌釋大訢笑隠呼韓欵塞稱藩臣已知絶漠無王庭馳突猶誇漢使者縱馬夜出居延城我有飲器非飲酒開函視之萬鬼走世世無忘冒頓功月氐强王頭在手帳下朔風吹酒寒凝酥㸃雪紅斕斑想見長纓繫馬上髑髏濺血如奔湍手揮欲回斗柄轉河決昆侖注尊滿酒酣劒吼浮雲悲使者辭歡歸就舘古稱尊俎備獻酬孰知盟誓生戈矛斬取樓蘭懸漢闕功臣猶數義陽侯明鏡詞贈傅秀才楊鑄季子亭亭青銅鏡似月雲端缺無復照花顔輝光暗消歇憂來不欲近坐恐生白髮時傅方悼亡木綿花歌胡缺艾山吳姫織綾雙鳳花越女製綺五色霞烟熏麝染臙粉氣落落不到山人家蜀江橦老鵠銜子種我南園趂春雨淺金花細亞黄葵濃緑苞微壓青李吐成秋繭不用繰回頭春箔眞徒勞烏鏐笴滑脫茸核角弓絃𦂳翻雲濤挼挲玉筋光奪雪紡絡冰絲細如髮津津貧女得野蠶軋軋寒梭緯霜月布成不異白㲲氊價重唾取青銅錢不須坐卧壚火上便覺挾纊春風前衣無美惡煖則一木綿裘敵天孫織飲散金山弄玉簫風流未遜揚州客鴻門宴周權衡之項王髙宴鴻門北風雲奔走天為黑椎牛刺豹酒三行談笑戈矛生頃刻豈知天命非人謀玉玦三提事何益興亡楚漢兩干將開闔乾坤雙白璧喑嗚謾說萬人敵隆準天人竟誰識玉斗聲中霸業空烏江江水還流東明妃曲逝水無逥波去箭無返筈十載昭陽春萬里龍荒月塵沙滿宫衣慘淡餘香歇哀絃濕絲淚淚盡絃亦絶寄語漢飛將此計誠太拙蛾眉豈長好不久為枯骨長相思髙堂炯菱花鑑貌不鑑心何以寫貞素調彼緑綺琴初成别鶴操再作離鸞吟悵然邈佳期桃李青春深湘中吟離思溢冲抱遊子感年嵗長洲藹芳杜湘雨濕行斾青林動江色杳杳白鳥逝歌騷佇髙風誰與奠椒桂輕薄篇陳肅伯將華駒細犢小香車城南陌上問倡家倡家窈窕可憐妾石榴帬裾飛蛺蝶零陵酒熟正宜嘗嬌歌一曲雙斷腸斂笑含顰背花燭眼意拂君君暫宿相逢行吳王城上啼春鴉吳王宫前多落花粉翠三千掩佳麗珠貂十萬歇豪奢昔余好遊錢塘里亦復結客來吳市炙魚揷匕嗟盜雄下馬投金想公子浩歌長嘯出閶門逢君意氣在一言解余芙蓉之寶劒勸君葡萄之玉尊余從山東入燕趙身歴河陽抵豐鎬當時然諾激肺肝今日還過盡懷抱風塵澒洞生干戈世上英雄本不多男兒愼勿憂富貴富貴逼人將奈何夜闌曲陳樵君采碧宇星回夜漫漫靈蕪烟煖重薫薦冷翠香銷青桂枝冰荷蓋光光繞帷花樓艶舞金萎㽔呉羮蜀酒精瓊糜酒闌半解龍綃衣春朝曲渚聞鵾鷄七夕宫詞内人拜月金鋪户鳳宿梧枝秋葉下露華入袂玉階寒織署錦工催祭杼月下金鈿照骨明同心絲繪紅生縷素瓜碧實上華樓夜闌飈馭下銀州海人謠海南蠻奴髮垂身朝朝采寶丹崖裏夜光盈尺出飛魚柏葉收珠寒蕋蕋幽箔連錢生緑花切玉蠻刀如切水九譯來朝萬里天北風不動琅玕死出塞曲為戍潼關李總管賦鐲鏤夜啼光屬地將軍一出欃槍死行塵不動人歸市帶甲如雲自天至取君甲兵為君洗分明袖有銀河水手中遺下泥一丸不封函谷封泰山長安有狹斜行長安有狹斜方駕秦中客云自牛丞相來自薄家宅薄家萬户侯朱門暎椒壁長楸車馬來賔客御瑤席金屋貯尹邢阿嬌淚沾臆燕燕慵束妝繁華照春色轉蕙光風翻趙帶徘徊月到班姫牀班姬輟芳翰紈扇從風揚明妃鬭百草玉環御雲裝向來溫柔地盡入白雲鄉何以慰王孫琵琶隨驌驦何以奉燕燕罷舞歌慨慷何以奉明主緑珠奏清商嫫母挾無鹽搔首愛宫粧公莫舞項炯可立龍蟠錦帳金奕奕虎旗無際人馬立肉林垂􅎺陵阜赤萬甕行酒晴虹濕大蛇中斷狂魄滅重瞳無光射寶玦雷憤風愁三尺鐡河山未必如瓜裂老荒捽珥語公莫頭上青天懸日月吳宫怨繡楣洒黄粉椒壁漲紅青倚檐樹如鬼深草虵夜鳴髑髏巳無淚古恨埋石扄鶴臯辭贈張鍊師呉克恭寅夫吹笙王子晉鍊鼎茅初成清秋金穴遊白羽雲中行五烟隨露掌太霞乗火精髙歌落渺茫逸氣凌紫清時飲玉池水朝餐珠樹英追隨神雀舞低昻威鳳鳴如何九臯上託子以脩名楚人弓陸居仁宅之楚人弓懸兩石五十萬矢陷强敵綘人弓箭三隻長歌入闗成偉績多箭不如少箭力制敵若在弓矢間鳴條牧野髙如山春華蛺蝶謠鄭元祐明德花魂迷春招不歸夣騎胡蝶江南飛碧㽔粉香飛不起卧帖芳茵唾鉛水痴娥眼嬌錯驚顧解裙撲蝶濕寒露折釵搔首笑相語何人芳心共栩栩頽雲流光空影寒冰絃結恨啼闌干鬻石篇張簡仲簡山中學仙人斷穀自有方泌水生石精鬻之以為糧候火中夜起松林襲馨香切以昆吾刀間以瓊華漿長生尚服食玉體生光芒一朝凡骨換白日淩風翔周郎玉笙謠我嘗躡輕鴻浮雲度瑤闕醉㸔碧桃花吹笙弄明月仙人王喬董雙成為作春水流花聲昆侖十三鳳飛舞相和鳴曲終飄然上鶴去逸韻散落天風清自從失脚堕塵世飛夢尚繞芙蓉城浮丘公今不見白玉龜臺走雷電雲和妙曲杳無閒萬壑松風洗清怨鴻門歌夏溥大志大風揚兮赤雲屯楚人望氣皆龍文當時吾甚笑亞父幸至彭城疽背死誰云沐猴竟遭烹汝乃盛怒咍孺子嗟㢤㧞山之力不可得扶義而西取天下者以三尺君㸔項王重瞳舜重瞳天命乃在隆準公呉山謠和亷夫中興過江笑諸人二十三表哀老臣倡和國事可斬檜馬上青衣竟何在采石未靖瓜州驚戰功今乃歸儒生第一峰前誰立馬夜箭射血來帳下妾薄命宋无子虛雲母屏琢春冰鮫女織綃蟬翼輕比妾妾薄命比君君薄情紅綿拭鏡照膽明還疑妾貌非傾城傾城從來有人妬况復君心不如故故人心尚峰九疑新妾那能無故時補天天髙塡海海深不食蓮菂不知妾心古硯歌神媧踏雲補天去遺下一團蒼黑天千年萬年乾不得長帯盤古青紫烟玉工割天天化石石内星精有餘魄琱光發炯成禹璧海王川后輸𤣥液帝青呵霧坤倪濕匣月不開太隂泣破天殘缺無人補一穴繰絲漏春雨空藏老石磨古今補天何時興天語櫻桃詞失名江南四月春歸早紅紫千枝迹如掃枝頭新綴纓絡珠一樹櫻桃爛晴昊菱花照見白家娘一顆胭脂相鬪好青樓逺客迷芳草三食櫻桃送春老鳳凰在何方銜將飛逺道乾坤清氣巻九
