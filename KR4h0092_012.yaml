body:
  text: 乾坤清氣巻十二明偶桓編五言律詩鄢陵經進士李伯昭墓雅勒呼正卿激烈山陽笛淒凉祖逖鞭才髙天不惜命薄世空怜故里一丘土荒城五畆田雖云有宿草寧忍不澘然雲溪眞館眞館雲溪上孤髙逼太清江山環几席星斗拂簷楹樹古成龍去篁疎作鳳鳴仙遊始可接我欲謝塵纓送趙宗吉編修代祀西岳北上函香去西南致禮勤蜀山千丈雪秦嶺萬重雲驛騎鳴金勒宫袍粲錦丈白頭抱闗吏自羡識終軍送李唐卿御史黃溍晉卿去去紅塵外秋風滿華嵩故鄉歸衣錦行路避乗驄未覺長安逺真成冀北空燕山一枝桂回首正西風含香道中殘日亭猶逺輕風帽易斜稻畦低没鶴草徑曲行蛇經世知無策謀生會有涯殷勤理黄菊留眼待秋花陪仁父存博登石頭城談笑逢諸老登臨失故亭薄遊成汗漫髙步覺竛竮江近通淮碧山遙失楚青平生一盃酒及此慰飄零送達兼善僉憲河南王沂師魯袖有新封事囊無舊賜金園司馬賦魏闕子牟心秋菊誰同来燕鴻好寄音故人如問我為誦白頭吟送蕭九齡赴淮西漢將傳華胄蘇卿弊黑貂曳裾非我事置醴逺相招楚甸春多草淮流日兩潮空吟小山賦叢桂影蕭蕭越上早行青鞋三十里草露惹衣斑潮落曹娥渡雲昏夏禹山秋聲黄葉裏天影白鷗閒欲問錢塘路漁家半掩闗瓜洲烟際繫孤舟蘆花滿櫂秋江空雙雁落天濶一星流急鼓西津渡殘燈北固樓商人茅屋下沽酒話揚州金陵六代帝王州宫烟滿石頭星河天北轉江漢水東流步絶金蓮雨歌殘玉樹秋白頭有漁者猶說景陽樓度三花嶺絶壁三千丈荒烟八九家黄茅青草瘴黑質白章蛇橄欖髙懸子芭蕉倒吐花嶺南一回首何處是京華杭州汪元量水雲有客腸迴九無人髮握三闗中新約法江左舊清談鉄騎來天北樓舡過海南一枝巢越鳥八繭熟呉蠶天也今如此人乎可奈何臺邉西子去宫裏北人過玉樹歌方息金銅淚已多旌旗遮御路舟楫滿官河送項錬師還天台陳旅衆仲不學東方朔歸尋馬子微人間無藥賣海上有雲飛谷暖金鵝大溪深土鴨肥當年種桃樹髙過石樓扉張書巢畫圖萬里青城叟歸尋江上山瀑喧春雨過汀暗暮雲還駐馬白沙曲懷人緑樹間薊門有巢父幽興最相闗青漳黄氏北别墅聞說黄家墅開門入翠嵐細岑依舍北流水出城南雨煖蘭抽笋霜晴樹落柑千年讀書地更莫乞羊曇送謝仲連小鹿巡檢小鹿謝將軍前朝宰相孫故家巳為庶今代得承恩笳鼓鳴沙月旌旗樹海暾送行車幾兩回首躍龍門史局懷柯監書方積叔高每日明光殿傳宣㸔畫圖姓名呼我寫識監古人無賈傅俄辭漢張生竟入吳遂令風雨夜長憶在江湖想君滄海上夜夜夢皇州母子三千里君王一萬秋修書期力盡報國入神遊賴有年光識青春照白頭閣下鈔書作待漏趨青閣移書近紫霞竹光翻野草硯影落宫花學士春承宴中官晚進茶君王思四海朝退欲棲鴉送友還家台哈布哈兼善君向天台去煩君過我廬可於山下問只在水邉居門外梅應老窗前竹巳疎寄聲諸弟姪老健莫愁予賦得上林鶯送張兵曹二首春隂花樹合日出見黄鸝圓聲度繁木流羽拂髙枝時節苦易換况經多别離君子貴求友勿懷幽谷悲春日陽闗道鶯聲滿上林來從金谷曉飛度玉樓隂栁嫩難分色歌停稍辨音明朝空解語人去落花深秋雨夜坐甘立允從風雨夜窗急庭幃秋思多蕭蕭聞落木洶洶度驚波堦濕吟蛩亂簷深宿鳥過青燈挑不盡無奈客愁何七夕傅若金與礪耿耿玉京夜迢迢銀漢流影斜烏鵲樹光隠鳳凰樓雲錦虚張月星房冷閉秋遙怜天帝子辛苦會牽牛即事目斷虞淵日心傷魏闕秋霍光元在漢周勃固安劉廟社多佳氣公卿足逺猷宸居終不改羈旅莫深憂詰陳宗道酒不至淹留髙劉諸公坐酒許今晨送燈從昨夜花遣人聽繫馬留客過栖鴉髙適邀同坐劉伶興轉賒不成投轄飲悵望隔風沙賦得天際舟送張孟功治河日下行人發春晨去鷁催䌫侵斜月解帆向斷雲開度鳥窺詩巻垂虹映酒杯尋源不可近奉使幾時回隠居圖聞說幽栖處遥連郁木天徑開移竹地渠引灌花泉座客留傾釀隣人訪草𤣥京華逺遊子那得共盤旋栁先生祠江抱零陵郡山藏鈷鉧潭古人如水去祠樹與天參述作籠諸子風騷廹二南後來竊時譽吾軰得無慚六月二十八日至京使節違雙闕天書下百蠻雨蒸歸日路雲合去時山嶺表兵猶動灤陽駕未還安邉數策在不得犯龍顔仰山寺張缺蒲澗僅一袈裟地師今第㡬傳寺當初建日國是太平年風起山如湧佛閒花自妍早遊天竺勝晚及四藤禪江樓蕭缺周逺憑䦨聊望逺天外白雲飛江静沙㽜月樓髙風動扉山川入夜濶鼓角出城微又報鄉村警兵戈未解圍寺橋古刹傳清梵横橋雨歇時年華流水去春事落花知宇宙遺陳跡江山本後期向來多薄命今日信枯藜顔子中池亭劉聞文廷池浄天容湛窗虚水氣通逺山來戸外飛雨洒亭中薜荔含朝景蒹葭集晚風平生江海念相對與無窮種樹年年長開窗面面凉雨苔生砌緑秋葉堕池黄得句閒拈筆抛書懶近床旅懷隨所至誰復計行藏蠟燭高缺孤雲取質蜂甜後融春火力深直中元有骨明處本無心花吐燒空日龍盤照夜金剪殘更漏永樓月度髙林寄李道復平章郝缺新齋聖主尊賢輔明時仗老臣策勲分二陜錫土列三秦邉徼風塵息乾坤雨露均遙知黄閣下得句更清新憶王成之高缺志翔北望烟雲隔東風草又深身安輕客路書到重鄉心自許寧論晚相知遂有今平生種桃李幾樹不成隂送石民瞻過呉江訪友薩都拉天錫老友呉江去呉江水正髙一尊斫鱸膾四月過櫻桃矍鑠緑玉杖風流白苧袍西窗故人夜應是對揮毫和虞伯生見寄韵白鬢眉山老玉堂清晝閒聲名滿天下翰墨落人間才俊賈太傅行髙元魯山獨怜江海客尊酒夜䦨珊投宿龍潭道林寺倦遊借禪榻客意稍從容落日江舡鼓孤燈野寺鐘竹雞啼雨過山臼帶雲舂半夜波濤作長潭起卧龍鳳凰臺望祭鄭復初録事巳矣鄭録事功名與願違鬚翹如挿㦸體弱不勝衣白日長江去青山何處歸崇臺三酹酒目斷雁南飛夜宿昇龍觀舊日宸遊地珠簾䕶輦紋龍飛九天雨鶴夢一龕雲神火丹砂見仙音客枕聞殷勤謝道士深夜禮茅君秋日雨中登石頭城訪珪白岩不遇石頭城上去紅葉雨紛紛半日不見路四山都是雲魚龍隨水上鐘磬滿江聞遙憶南庄叟天寒補衲裙鹿角站阻風楊缺信可風送洞庭沙維舟隠荻花水枯魚上秋老燕移家日暮長河急天寒去路賒故鄉三十驛歸夢繞天涯送泗州同知偰世南赴任郭缺君彦夢喜三刀驗之官正少年龍纒倚天劒虹繞載春舡淮泗名先振湘潭政可傳門闌多喜氣屢見出英賢錦衣臨泗水仙境足吟哦烟樹連淮逺雲山入楚多濟川功不小經世意如何會見沙堤上春風響玉珂西山道院幽居絶瀟洒深院鹿成羣山色開窗得泉聲隔竹聞猿啼臨水樹風送渡溪雲客至渾無事談詩到夜分贈方外閑人貢師泰泰甫白日青天外壺中别有春江湖萬里客宇宙一閑人采藥雲歸袖㸔花月滿身何時重會面醉拂布袍塵台州寄楊子秀路轉千峰合溪通一帶斜飯炊黄渡雪酒染赤城霞未訪仙人宅先尋博士家近聞歸隠處盡種碧桃花將干嶺絶頂低南斗重闗壯北門隴雲浮地白谷水帶泥渾宇宙神功大山河帝業尊小臣叨載筆華髮感深恩宫中舞隊歌詞張翥仲舉十六天魔女分行錦繡圍千花織步障百寶貼仙衣回雪紛難定行雲不肯歸舞心挑轉急一一欲空飛鑿海行龍舸憑山起鵠臺天池神馬出月殿舞鸞來六合妖氛净羣生夀域開吾皇樂民樂願上萬年盃白玉琱釵燕黄金鑿步蓮簫吹鳳臺女花獻蕋宫仙香霧圍銀燭歌雲撲錦筵請將供奉曲同賀太平年禖臺嬪御親弓䪅祠禖有古臺瑤池今寂寞𤣥鳥自歸來鼎再移支子星俄坼上台興亡闗厯數祇遣後人哀遊石頭城清凉寺用天錫題壁詩韵捫蘿上絶頂嵐氣濕繽紛日色不到地樹隂渾似雲僧歸過嶺見樵唱逆風聞更待詩人醉狂書白練裙大駕時廵千官𨗳送至大口萬乗廵行逺三靈佑䕶多旌旄隨大駕鼓鐸襍鳴駝初日浮黄繖微風送玉珂臣心如草色不斷到灤河寄雲門僧聞道耶溪叟髙年出寺遲眉毫長㡬許布衲破多時挂錫鶴移樹繙經花滿池相望一江水嵗晚赴幽期發富陽段天祐吉甫逺海初曦動長林積霧開山從呉會起潮向富陽回野飯松毛火村醪樹癭盃風吹黄葉度偏傍馬鞍來發嘉興明發嘉興縣扁舟宜向東天寒待伴雪日暮打頭風逺寺明霞外孤城練水中等閒作離别不擬見歸鴻夏夜向夕南風起開窗散鬱蒸草間車水鼓松下捕魚燈山壑雲填雪河流月走冰城樓更五鼓車馬逐晨興題蘇武牧羊圖楊維楨亷夫未入麒麟閣時時望帝鄉寄書元有鴈食雪不離羊旄盡風霜節心懸日月光李陵何以别涕淚滿河梁送呉生良之金陵五月秦淮去南風水接天雨晴梅子後人近鳳臺前雲樹連春驛星河落夜舡金陵佳麗地遲子廣新篇送曹生之京十載辭京國常懷玉笋班鳳麐遊壁水虎豹啟天關海樹分秦雨江雲隔楚山壯遊須努力况子正紅顔送李五峰召著作聖主徴遺逸郎官老謫仙青山蔵古史金馬得時賢吾道推先路恩光照晚年宣丈忙視草銀燭賜金蓮送用上人之京陵東土帝王州髙僧汗漫遊衲衣收夜雨洗鉢度江流草發金銀穴花飛霹靂溝擕詩見短李應下讀書樓送楊生琰歸溧陽之子吾同姓相逢已道南春衣彫白苧佳樹長黄柑雨淡潛龍寺天清漂女潭蒲公讀書處白石有新庵留侯廟李孝光季和感慨留侯廟曾聞客下邳手扶仁義主身是帝王師興漢功居最存韓志可悲如何刼髙后反使夘金危馮秦卿藏書榮中富貴傳賔客盡能文屬世方櫜武無人學解紛劒成猿接水圍合鹿號羣官作清時好長吟坐白雲送公子趙去疾二首綿綿萬里道利涉有方舟城郭通吳㑹江源起益州圖經開白帝祠祭過黄牛他日浣花老猶能作勝遊辭吳向三楚送遠指秦川髙鴈憂離罟輕鷗不避舡天青微露下江黑大星懸郢曲長多怨聞歌祇自怜秋岑更覺秋岑碧能尋勝日躋樹凉來鸛鶴山斷見虹霓釋子行相問幽人去不迷雨餘天姥出吾欲涉丹梯燕粟總管玩芳亭薛𤣥曦𤣥卿粟氏林亭好飄飄借馬遊藥闌當户宻花逕近城幽未許朝參懶聊為逸興留使君行樂處風物為春柔湖寺湧碧泉張天雨伯雨喧寂一塵隔湖濵出寶坊荷隂分補衲水氣雜燒香書勘烏皮几茵敷白㲲床從來已公屋詩客許徜徉嵗暮忽忽嵗云暮徒興白首嗟山留待伴雪春禁隔年花把巻因遮眼分餳且膠牙自縁身懶堕莫遣送窮車送張仲鼎遊燕南釋大訢笑隠天上知名久由來漢客星江湖歌白雪風露滿青冥巴蜀須傳檄燕山待勒銘壯夫期遠大不獨抱遺經次韵寗宣慰將門三葉貴古劒削霜硎霧巻烏蠻浄風生碧海清投壺驚甲帳飛墨動雲屛未愜清遊興松房聽雨聲送薩天錫照磨赴燕南憲幕蕭寺留詩别髙懷不負公江聲元自急山勢古來雄下榻疎鐘雨登臺落木風重來無幾日除道避乗驄答王子長宋无子虚病後得書頻情知未立身孤燈風雨夜兩處别離人乙鳥歸來社辛夷開過春如逢元白問莫說為詩貧銅陵萬松山中樵聲聞遠林流水隔雲深茅屋在何處桃花無路尋身黄松上鼠頭白竹間禽應有仙家住避秦來至今乾坤清氣巻十二
