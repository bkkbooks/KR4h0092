body:
  text: 乾坤清氣巻四明偶桓編七言古詩送華山隠歸西湖王士熈繼學方士求仙入滄海十二城樓定何在金銅移盤露滿天琪樹離離人不采軒轅高拱聖明居羣仙真人左右趨青牛谷口迎紫氣白鶴洞中傳素書珊珊鳴珮星辰逺寂寂珠庭雲霧虚修髯如漆古仙子玉林芙容染秋水九闗高塞不可留歸去江湖種蘭芷山頭宫殿風玲瓏𤣥猱飛來千尺松閒房誦經鐘磬響石壁題詩苔蘚封欲向君王乞祠禄安排杖履來相從送蘇公赴嶺北行省郎中居庸闗頭亂山積李陵臺西白沙磧畫省郎中貂㡌側飛雪皚皚馬韁濕馬蹄雪深遲遲行冷月凄雲塞垣明銕甲無光烽不驚萬營角聲如水清明年四月新草生征人賣劒隴頭畊思君遥遥隔高城南風城頭來鴈鳴贈廣東憲史張漢英之南臺掾生平不願為傭書亦不願作章句儒酒酣詩成吐素霓意氣凛凛吞千夫前年排雲呌閶闔出門一夜車四角去年海嶠席未温一舸乘潮又催發大江之西日本東廬陵文物常稱雄决科歲占十八九君當努力提詞鋒才高不用長嘆息四海彌天豈無識壯年懐居亦何有著眼帶礪開胸臆巖巖柏府凌高寒豪士傾葢宜交歡我知屠龍不屠豨食馬政欲食馬肝吳姬壓酒飄香絮謫仙神游歌白紵敬亭惟有孤雲閒欲雨人間亦飛去離京夜抵潞陽賦詩遥慰匡廬隠者併以寄金門諸公為一噱云李泂溉之野馬脱覊鞅倐疑天地寛臨風一長鳴風吹散入青𠖇間頗如魯仲連蹈海不復還又如安期生長留一舄令人㸔江南浩蕩忽如海落日照耀浮雲闗既不能低眉伏氣摧心顔詭遇特達驚𠖇頑又不能抱書挾䇿干萬乘調笑日月相回盤匡廬迢迢接仙山仙翁泛若秋雲閒長松之隂引孤鶴望我不見空長歎采鉛天池津飲醁桃花灣蒼梧倒影三湘寒赤城霞氣生微瀾鯨鯢翻空海波赤曉色欲上扶桑難人間之樂兮誠不足恃何如歸卧棲巖巒棲巖巒卧巖穴夜半天風吹酒醒猶有青溪萬年月題丁氏松磵圖鄧文原善之天目之峰凌紫煙下周林壑紆長川清池斗絶涵倒影神運直自疏鑿先彼美幽貞廬閑房曲奥辛夷荃蒼松手植經幾年靈虬夭嬌今參天門前朝流莫流水但聞激石瀉瀬鳴濺濺山人養真衡茅下有書可讀琴可絃意行清澗曲長嘯松風前山月出林高山花弄春妍仙人歌來夜將半天空鶴唳山淒然飈塵大笑狂馳子口誦丹訣傳真𤣥我欲從之結隣屋待疏藥圃謀芝田送友之官江西胡寛則大花間乳鶯啼曙色送客驅車上南陌陌頭芳草緑萋萋今人古人滅行跡明發吳儂燕尾船江巻寒潮飛練白鸞童乘月吹紫笙不似琵琶怨秋瑟滕王閣中歌舞䦨一望雲林謝公宅題周晹明皇水中射鹿圖雅勒呼正卿開元天子奮神武一矢成功定寰宇飛騎營中墮牝雞妖星散落紛如雨邇來校獵渭城東姚崇發蹤指顧中馬前十論効驅䇿君王已賀獲雋功波濤澒洞真龍立應見波間老蛟泣畫師盤礴筆有神千載英姿如昨日君不見天寳年來事事非宫中行樂晝游稀可憐野鹿銜花去猶向樽前按舞衣送御史王伯循之南臺京華歲晏饒風雪況復知交逺相别金貂貰酒燕市傍官栁殘條未堪折客心戀戀不忍發離歌莫唱陽闗叠羡君年少蚤致身文章徳業追古人繡衣驄馬向南去江湖草木含青春杭州送兒姪歸里黄溍晉卿空江月滿潮聲怒二兒勇踏潮頭去故園天末渺予懐夢中識汝歸來路起向江樓遥望汝江上青楓正霜露凉風䬃䬃吹汝急櫓揺背指龍山渡翩然一葉舞中流嗟汝童心得無懼自我西游歴三紀舉目交游半新故下車相揖何紛紛白頭朝士猶徒步𤣥都觀裏舊桃花見我重來能幾度緬思疇昔仍念汝徙倚䦨干日將莫前潮將斷後潮續層波複浪無重數魚龍出沒相後先疾雷槌山雨如注隔岸巒峰空復多沙際𠖇濛但煙霧計程知汝已登陸息肩弛擔今何處明朝過我三釜山能勿徘徊起哀慕近聞旱魃肆為虐殺吾手植千株樹且須為我語比隣莫遣牛羊上丘墓贈俞觀光東牕讀書吻正悲坐聞剶啄走啟扉衝風踏凍至者誰俞子訪我由剡溪相逢把臂語移時婦人驚笑羣兒痴俗物疾我不可鑒眼明求此珊瑚枝朝來贈我天馬詩忽然掉頭去莫覊鼻頭氣息干虹霓詎能折腰向小兒文章技痒聊娛嬉䇿勲聖處今毋遲繄我愛子莫助之臨岐躑躅徒嗟咨題李坦之學道齋詩文神仙中人世莫識政以文章為戲劇李生也復可憐人手種蟠桃待春色山空歲寒誰念汝青楓墮影霜露白逺游賦成一朝去翠盖雲旗莫可適蓬萊煙霧秋𠖇𠖇鄧君白鹿無消息袖中驪珠三百顆夜深勿近蛟龍宅金華山高青矗天山人㸔山忘歲年黄精芝草幸可食安得與子巢其顛石床醉聴松風眠無為長歌怨如哭使汝惻愴凋朱顔半月樓柯九思敬仲峨眉山色凝秋碧山下雲連鏡湖濕萬里青天月半規十二樓頭夜吹笛滿庭桂樹仙人家玉兔𢷬藥來紅霞青蓮居士下東海祗在蓬萊掃落花跋南岳夀寧觀碑後元明善復初朱陵靈臺天柱巍太虛空洞緑煙扉上館赤帝朱鳥飛祝融宅南參與旗羲娥兩曜愁蔽虧象緯冷逼嗟位迷四觀燕吳與秦齊恒嵩泰華孰崇卑五氣順布百志熈流祥阜物宣后祗雨風露雷豈其私惠爾下土尸者誰中有異人餐玉芝夜眠秋霞晝天倪衣以青雲裳白霓風車八極参兩螭七十二峯足幽棲琳宫貝闕輝陸離潛光煉魄如嬰兒大丹入咽無渇飢誰其思之吳宗師神變倐忽方張施泠然御風渺何之太君歲晏嘉予期千秋萬歲受鴻釐皇圖景運永以丕手持芙蓉朝紫微旋飈天闔此來歸彰靈荅貺達爾垂磨崖䥴我瑶華碑出門别親友陳孚剛中停君漢水浮鴨之翠杓聴我嶧陽棲鸞之緑桐男兒拂衣出門去龍泉三尺光如虹君不見磻溪鶴髪釣魚者偶擲漁竿來收野白旄揮開炮烙煙桓圭朱芾侯青社又不見南陽卧龍人不識一朝佐漢狠石羽扇輕揺蛇鳥驚火精熖熖天西極旗亭四月栁如藍紫騮嘶風黄金驂豈無扣牛歌亦有捫蝨談天生巉巖崒嵂骨蒿萊槁死誰能甘我欲登泰山扶笻欵天闗東溟若木如可攀手弄日月青雲間我欲渡黄河赤脚凌秋波水仙樓閣銀嵯峨徑叱海若笞蛟鼉停君翠杓聴我緑桐真人開天六合同風騶虞鳯凰飛舞鎬宫有線五色獻於重瞳補舜衣裳山龍華蟲虎豹九闗兮不可以達吾則脱冠歸來兮丹丘之青峯長揖二三子目送西征鴻常州毗陵城西漁火紅家家夜香燒碧空荻花離離季子塜楓葉索索春申宫鷄聲人語三十里大船小船浪相倚鸂鶒一雙飛上天人在柂樓弄秋水居庸闗車稜稜石确确車聲彭彭鬭石角馬蹄蹴石石欲落不知何年鬼斧鑿僅與青天通一握上有藤束萬仞之崖下有泉噴千尺之壑大行羊腸蜀劍閣身熱頭痛懸度索一夫當闗萬夫却未必有此竒巘崿吾皇神聖混地絡烽火不紅停夜柝但有地險今猶昨我扶瘦笻息倦脚欲扣往事雲漠漠平沙風起鳴凍雀送鄭子經游霞城陳旅衆仲子經與我真弟兄海風十二吹青萍桐花影裏忽相見美人為奏青樓笙酒酣氣盛欲飛起謂可戻契圖功名樓前雪惡鴈欲墮寳鞭笑指丹霞城人生聚散亦何有歲月與子相峥嶸金臺有約不可爽春船擬破滹沱氷泰定元年秋八月七日書於龍溪校宫時劉能静亦在坐去年送君歌此詩今年我亦同覊棲年年離合誰所使握手一指秋雲低我今歸矣子勿遲桐花落盡青樓西題天台桃源圖天台一溪緑周遭溪南溪北都種桃東風吹花開復落游人不來春水高錢塘道士張彦輔畫圖送得劉郎去昨夜神雀海上來洞裏胡麻欲成樹和蕭秀才歌風臺歌風臺前埜水長王媪賣酒茅屋凉酒邊父老説劉季頭戴竹冠歸故鄉山河霸氣已消歇颯颯老栁吹斜陽臺前小兒更擊筑筑聲更似三侯章太𤣥子祈雪歌傅若金與礪至元二年冬不雪天子夙夜憂黎民宫庭擇日詔方士臺觀通天求百神留侯之孫住龍虎世領祠官列圭組鳬舄經時謁紫微鳯章半夜飛𤣥武皇天憂民祈可必臘雪依微應三日望拜還聞在竹宫受釐忽報臨宣室天地杳然韜𤣥功賜予紛紜恩數隆請和六氣輔元化常使九州歌歲豐憶昔行送雅勒呼歸武昌待高郵闕廣亦除静江同知皆未任憶昔文皇御天厯知君已是青𠖇客寳氣經年動斗牛璇光徹夜通奎壁比來蹇剥人所歎當路宣昭氣斯直忽聞除書雙及門老親白髪生顔色秦郵近水足秔稻桂林只今多盗賊待次且食武昌魚擕家不過湘南驛王祥舊來驅别乘賈誼未久遭前席此時父老怨來遲他日攀轅忽霑臆麒驥那愁九州大鳯凰早恨三山隔秋浮江漢雲木清夜過淮河月波白新詩屢成知自誦逺道即見何由得黄鶴樓前遇故人因君為致長相憶邯鄲行邯鄲城高下白日邯鄲市上風蕭瑟故壘空餘鳥雀悲荒垣只見狐狸出何王墳墓對山阿尚憶諸侯争戰多趙客歸來重毛遂㤗軍老去畏亷頗黄塵白草宫前道鬼火如燈夜相照公子秋來不見過美人月下那聞笑當時冠盖激浮雲撾鐘考鼓宴青春只今惟有郵亭樹還送年年行路人和題吳閒閒京館王本中醉作竹石壁薩都拉天錫硯池花落丹水香步虚白日聲琅琅江西道士愛瀟洒新粉素壁如秋霜王郎酒酣衫袖濕醉眼朦朧電光急𤣥龍雲重雨脚斜白兔秋髙月中泣倦游借榻日觀東恍惚夜夢三湘中鷓鴣啼斷江路逺青林雨暗春濛濛題喜夀里客㕔雪山壁圖一年在京口雪片深冬大如手獨騎瘦馬入誰家四靣雲山如户牖大江東去流無聲金焦二山如水晶瓜州江口人不渡時有蓑笠漁舟横一年在建業臘月梅花滿城雪五更凍合石頭城霜風號寒氷柱裂秦淮酒樓高十層鍾山對靣如銀屏鷺洲不見二水白天外失却三山青一年在鎮陽燕山積雪飛太行滹沱氷合斷人跡井陘路失迷羊腸長空萬里絶飛鳥巻地朔風吹馬倒狐裘公子獵城南茅店酒帘縣樹杪今年入閩闗馬蹄出入千萬山瘴煙朝莫氣藹藹石泉日夜聲潺潺雪花半落不到地但見晴空湧流翠海頭鼓角動邊城木末樓臺出僧寺何人蹇驢踏軟沙出門何處不梅花江潮入市海船集水煖游魚不用义良工寫此雪山壁過眼令人憶南北玉京銀闕五雲端待漏何年鳯池側送左祥卿之香山縣尹貢師泰泰甫九星排玉雙門開抱旗石鼓青嵬嵬帝子城邊跨龍去仙人海上騎羊來禺南燕北天萬里五月河邊青雀起鸊鵜膏煖射晴虹海月光寒烱明水宓子琴中化已成吟得新詩字字清立馬街前待衙退刺桐花裏鷓鴣鳴分題得姑蘇臺送吳元振赴江浙省左丞姑蘇城外江水緑姑蘇臺是吳王築吳王宴罷越王來館娃夜冷宫門開落花飛去春無跡江邊却起姑蘇驛馬頭旌節何皇皇候吏傳呼謁道傍孤山梅白堤栁黄相君入坐中書堂送涇王府蒲司馬西還重弓滿引鳴鏑和翻身躍馬渡長河日高射獵王半醉軍中司馬功最多白狼西來獻天子腰間玉龍鱗甲紫寳書緘奏動宸京黄封御酒貺邊城弦蒲汭鞠幾千里芳草萋萋春似水鳥聲山色不勝情枚生作賦才難比送張介臣伴讀歸省濟南白天迷濛日脚消雪花散落風飄蕭重裘著體如壓鐵呼酒不來寒正驕東風匹馬去千里仰視王屋當雲霄到家方慰母心喜入門更聴兒啼嬌華燈夜照舞衣熱彷彿鳴鳯和笙簫暗黄著栁垂長條虎闈春信趣還鑣一杯遲子城南橋題蘓武李陵泣别圖歐陽檢伯恭浚稽山前箭如雨渤海岸邊羝不乳同是肝腸十九年白髪君歸朝故主臣心有血一斗許亦欲隨君歸釁鼓五千健兒五千母臣若獨歸魂魄苦空將老涙寄君歸歸洒茂陵墳上土題金宣孝太子墨竹張翥仲舉少海神光射天起中有蟠龍龍有子混同江聲何處來巻作琳琅墨池水蜿蜒歘起鱗甲張蛻骨立化千篔簹一朝侍臣抱髯泣鶴駕不歸雲路長百年梁苑陵谷變流落人間能幾見明昌内府應秘藏小字親題保成殿吁嗟帝子真天人此君亦作天人真君不見洋州老太守揮洒雖工無此神題李白觀泉圖玻瓈杯中春酒緑醉墨淋漓牡丹曲平生合置七寳床白苧烏紗美如玉阿瞞荒宴百不理寧計宫花衘野鹿何物老嫗生此兒偷向金鷄帳中宿高將軍纔奴𨽻耳誤使脱靴吾所辱要留汗襪踏鯨魚鼠子何堪煩一蹴尋常溝瀆不可濯何處容伸遭汚足翩然却下匡廬雲五老峰前㸔飛瀑周昉按樂圖美人按樂春晝長緑鬟翠袖雙鳴璫玉簫高吹銀管笛二十三弦啼鳯凰後來知是調筝手窈窕傍聴曽誤否梁州徧徹六么翻此曲惟應天上有行雲不動莫雨生流鶯瞥目飛鴻驚宫馳羽疾争新聲花月六宫無限情君不見後庭玉樹棃園譜日日君王醉歌舞一朝鼙鼓動地來禄兒危似韓擒虎丹青縱復工何益由來嗜音必亡國田家機杼人不知好寫豳風勸蠶織緑玉連環歌為邢從周典簿作于闐河頭夜光發赤髯賈胡采明月中有美璞凝寒晶惟有鬼工能琢成伊誰得此邢公子示我緑玉雙連環怳如空碧虹氣垂半隠青瑶蟾一規展之兩環不盈尺叠作團團小蒼璧縠文錯落映雷文宛是昆吾寳刀刻廬陵學士癖好竒辨古重以瓊琚詞珊瑚佩鉤詎可數我疑制自金源時集賢仙公丈人行鳯閣舍人文有様請君留束錦宫袍待㸔揮毫玉堂上入京危素太朴春風浩蕩吹江南危子行年二十三長謡空谷天蕩蕩劍倚白日風潭潭氣高却怪星象動身在肯為飢寒貪宫中聖人朝萬國臣抱犂鋤在山澤中年讀書空自勞三島求仙豈能得齒牙未落心未摧欲奏長䇿天門開周公仲尼没已久麒麟鳯凰去不來世無忠臣與孝子四海風俗何由回徐人歌季子有劍秋水色徐君見之惜不得徐君墓上荒草寒季子解劍挂樹間一生一死見交義嗟哉延陵吳季子乾坤清氣巻四
