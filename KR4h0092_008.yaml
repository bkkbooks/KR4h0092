body:
  text: 乾坤清氣巻八明偶桓編古樂府漢使謠陳泰所安海昬昬雲瑟瑟漢家歸使雲中發千騶萬騎歘如雷蛇子蛇孫鎻金軛天狼一墮天門開羲和走馬從西來燕山雪漢家將軍愁失道燕支半夜雙蛾老祁連千丈酸風髙日日氈車翻海濤誰憐中郎齒如㦸誰憐明妃髮如漆秦淮月沙頭薄暮生林樾烟水茫茫沙雪白女墻夜静潮無聲惟有中天一片月年年故宫照禾黍年年商舡照歌舞春愁曲王沂師魯花房泣露珠滴紅繡屛金鴨香濛濛鸚鵡喚遲梳洗晚遊絲撲蝶飛燕嬾蕋粉染黄塗額好赤心莫擘庭前棗虬鬚公子射麋歸望覺雄心醉中老别起髙樓連苑東鸞絃鳳竹㡬春風一自驊騮思故櫪門前芳草年年碧送春詞黄金臺下東西道紫燕矜誇銀勒好長溝漾晴晴不盡碧草迷人人易老樓上迎春又送春邯鄲女兒嬌翠顰一聲鶗鴂鳳城曙滿眼芳洲生白蘋柔桑繞舍麥如尾錦雉將雛梅結子為問歸耕海上田何如但索長安米陽春曲楊花濛濛海波白十里香風飄紫陌流蘇寶網金陸離漢家帝子朝天歸葡萄美酒新勅賜蓬萊宫中緑衣使道傍縮首觀且避蹀躞玉鞭光照地大堤緑樹啼嬌鴉知是平陽公主家回首畫橋芳草暮蝴蝶不隨春色去禽言婆餅焦徒爾鳴黄雲茫茫與天平去年麥熟苦梅雨東疇西隴飛蛾生今年麥熟不得割去學精衛填滄溟婆餅焦無樂聲蠶筐八隻脚新繭已上箔新繭上箔且莫喜門前催租吏如鬼小姑繰絲手不停夜畏碩鼠朝畏蠅織成匹素不中式姑嫂相㸔機杼泣提葫蘆聲相呼去年賣犢出賦租江村酒賤無錢沽無錢沽酒莫作惡不到縣門身即樂泥滑滑江頭路路上行人一回顧古云燮理真謾語却是山禽管晴雨李將軍行隴西將軍年少時雕弓錦帶生光輝捲旗夜斫樓蘭帳赤鞍晝截雙雕飛曾經百餘戰屢出九重圍横行遼水上殺敵榆關歸戍樓霧暗烽火滅沙塲雪深救兵絶人渴斧氷飲馬寒抱鞍歇漢月凍欲死北風利如切魚腸寶刀斷燕尾蝥孤裂歸來藍田空白首鉄衣換飲新豐酒酒酣射石没金鏃夢裏鳴笳雜刁斗昔時偏裨皆奏功侯印佩出甘泉宫客來問著塞垣事時時撚箭送飛鴻西方太白光墮地中夜悲歌增意氣漢家定起李輕車未用先誅㶚陵尉小城南吟陳孚剛中城南三月花亂開花間羯鼓聲如雷蟬衫麟帶誰家子笑騎白馬穿花來美人如花映碧水榴裙吹舞金鵲尾手折楊枝擲水中腰裊如弓送窮鬼人言此是上河梁滿川羅綺春風香年年窮鬼送不去波心驚起雙鴛鴦蓮莖一寸緑芒短老盡碧桃春不管遊人醉歸夜迢迢十二天街御烟煖吳宫子夜歌紫貝樓闕鬱金香煖雲七十紅鴛鴦玉蟬笑擁霞綃裳星河不墮宫漏長緑尊灔灔麟髓泣露重花寒秋不濕歈歌一聲起雪濤海龍夾陛如人立誰知淺顰蛾半掃中有殘螢滿秋沼越兵曉踏西風來碧波一夜芙蓉老東歸歌送鄭子經陳旅衆仲北風吹山蕉葉黄長亭野日寒荒荒驅車送子歸故鄉人生此處堪斷腸舊遊回首秋山下醉帽簮花同走馬歡娯如此離别何華月芳年不堪把子今去矣來何時翠壺雲深那可知向來亦有燕山期子今去矣來何時分題得車遙遙送方叔髙作官江南車遙遙薊門路髙麗驕馬不受鞭方郎得官上車去薊門南頭盧水流燕姬十五居酒樓彈筝唱歌折楊栁落日車前勸郎酒南陌行人往復來㡬人得官似郎回郎車勿驅傷馬足車中本載連城玉車遙遙鄔子洲賣車買舡載旗鼓晴湖風輕聞棹謳三笋吟子經家藏三笋圖予作三笋吟以誌之蜀妓椎蠒如截肪鮫宫夜織青犀裳翰林待詔擅花竹硯屛春透宫雲香鑱根蔫鮮玉生汗南風入林翠胎綻牙根寃血㸃㸃紅三鳳聲沈九秋晏太官金錡陳淳熬㸔圖未必葅爾曹饞夫煮簀政未熟見此豪奪君其弢海獸蒲萄鏡歌予友莆田鄭君子經家藏漢海獸蒲桃鏡乃夾漈公故物也予為賦此尚方老冶收精銅金膏玉水開曈曨未央曉日低青桐六宫秋井生芙蓉當塗妖鬼弄神器銅人登車數行淚寶奩偶落長安市來與人間照珠翠凝隂空祭江心龍海雨夜入閩王宫胡僧合掌西溪翁屋上綘氣吹晴虹貝丘紫露堪作酒中有騊駼活欲走青絲結鼻莫去手龍女鮫童俟之久秋婦詞贈王秀才方積叔高蟋蟀蟋蟀啼我幃明月皎皎當兩扉昨日雙星㑹河渚今朝秦郎當遠歸郎歸不與妾念彼去時身上衣身上衣慈母線常恐秋風吹秋風吹楊栁妾但辛勤養慈母七夕詞織女女有夫牛郎郎有妻可惜不相守夜夜河東望河西一嵗纔一會會合一何稀吾聞河西有田郎可犁雲中織錦女有機胡不一耕一織長相隨長相隨無别離吳山髙題畫吳山髙吳水深吳人住宅在山隂吳僧更愛山頂好别掃白雲種瑤草吳山髙何迢迢吳門日夜出春潮吳兒作舡住舡裏日日吳門弄潮水桐花烟為吳國良賦台哈布哈兼善吳郎骨相非食肉朝采桐花洞庭曲洞庭三月桐始花千枝萬朶搖江緑吳郎采采盈頃筐寶之不啻瓊膏粟真珠龍腦吹香霧夜夜山房𢷬𤣥玉墨成誰共進蓬萊天顔一笑金門開河伯噴香飛木葉太守嘘氣成樓臺龍賔十二吾何有不意龍文入吾手芙蓉粉煖玻瓈匣雲藍色映彤墀栁玉堂退食春晝長桃花紙透冰油光筠管時時濡秀石銀鈎歴歴凝𤣥霜君不聞易水仙人號奇絶落紙三年光不滅又不聞唐生烏玉玦坡老當年書柿葉惜哉唐李不復見吳郎善保千金訣嗚呼吳郎善保千金訣衛將軍玉印歌武皇䧺畧呑八荒將軍分道出朔方甘泉論功誰第一將軍金印照白日尚方寳玉將作匠别刻姓名示殊賞蟠螭交紐古篆文太常鐘鼎旌竒勲君不見祁連山下戰骨深中原父老淚滿襟衛后廢殂太子死茂陵落日秋風起天荒地老故物存摩挲斷文弔英魂分得城上烏送張兵曹甘立允従月落城上樓烏啼樓上頭一啼海色動再啼朝景浮馬鳴黄金勒霜滿翠羽裘烏啼在何處人生多去留歸來三曲送李建中傅若金與礪月皎皎兮河漢長黄鵠在天兮招我以翺翔天氣涼兮夜未央援鳴琴兮託宫商商聲作兮風摵摵歸來兮天路杳渺不可以終極月皎皎兮夜既寒白露下兮衣裳單南風一去兮何時還援鳴琴兮曲再彈曲再彈兮天地為秋歸來兮清都之上不可以久留月皎皎兮寒風作猿啾啾兮怨鳴鶴常恐秋遂為冬兮羣物以蕭索援鳴琴兮忽不樂忽不樂兮思吾土歸來兮山中之人不可以無父琵琶怨美人揮哀絃上客嘆蛾睂急響多悲思孰知心所悲感昔奉綢繆不言生别離誓將桃李顔結君長相思如何雙栖鳳中路忽乖暌不怨歡會難但恐恩愛虧含情冀回顧中曲多苦辭君子茍不聽賤妾亦奚為白苧詞白苧白白如霜美人玉手親自浣製作春衣宜短長春衣成有時逺行歸無期願君著衣重愛惜風塵變白能為黑秋夜長送方叔髙秋夜長長如嵗長如嵗尚可夜涼薄人不能寐羣鴈各南翔一鳬向北飛團團素明月流光照我衣當歌正激烈慷慨送將歸丈夫成名微亦足烏能終夜悲刺促秋月皎皎夜何長念君客遊思故鄉當壚美人惜年芳長夜起舞歌清商歌清商送急管為君酌美酒請君勿辭滿夜長迢迢漏未終離思比之何時斷離思長夜猶短秋夜曲草木搖落鴈南飛文窗皎潔承月輝凄風入房露沾扉紅顔含彩垂佩幃簮金鳴玉揚舞衣蘭缸對耀照君帷逺行胡為未言歸廣西謠廣西謠一何悲水泠泠山淒淒寧逢猺賊過莫逢官軍來猺賊尚可死官軍掠我妻與子楊花曲薩都拉天錫燕京女兒十六七顔如花紅眼如漆蘭香滿路馬如飛翠袖籠鞭嬌滴滴春風淡蕩搖春心錦笙銀燭髙堂深繡衾不煖鴛鴦夢紫烟紅霧天沈沈芳年可惜去如水春困著人倦梳洗夜來小雨潤天階滿院楊花飛不起秋夜長秋夜長青燈半灺玉漏未央雲葉颺影露華凝光老樹驚鵲枯莎怨螿幽人對景耿不寐西風一叠神凄凉我欲渡河無梁我欲濟津無航扳鱗附翼愧凡骨化金㸃石無仙方腰犀秉象兮我貌不揚剸蛟縛虎兮我機弗張有劒徒爾射斗牛有弓何由挂扶桑夜光明月孰辨昔鄒子黄河太華誰是今歐陽天髙地大若無礙無處可著詩人狂西風再叠兮形無爾傷黄鵠可跨兮蒼虬可驤南箕可播兮北斗可漿庶不可以智力而致者惟命之常何聖賢亦不能免于厄者或毁于臧或畏于匡然大人虎變有不可得而測者豈非尋常之中有築巖之傅釣磻之吕卧廬之亮納履之良者耶西風三叠兮聲始洋洋黄金滿地岩花香呼童重洗琥珀觴籬菊已露螯已霜樂天知命兮吾亦從此逝矣相與忘形于無何有之鄉也歌欲斷夜將半拔劒起舞無人伴却對姮娥影淩亂君不見芙蓉曉夢晚花酣有人却恨春宵短芙蓉曲秋江渺渺芙蓉芳秋江女兒將斷腸絳袍春淺䕶雲暖翠袖日暮迎風凉鯨魚吹浪江波白霜落洞庭飛木葉盪舟何處采蓮人愛惜芙蓉好顔色如夢曲哀燕將軍芙蓉花為誰好洞房昨夜將軍老將軍老去空鐡衣漆燈照室人不歸海子頭誰家樓繡簾半捲風悠悠行人謂是將軍府將軍不來罷歌舞將軍容丹砂紅威風凜凜蓋世雄出門千騎塞行路今日蕭蕭去何處將軍功世莫比皇都甲第連雲起將軍一去空鎻門上馬臺邊無一人折楊栁送方叔髙趙頤子期楊栁青青春水生借問行人行未行雕弓在弢馬騰櫪家住湓江江上城柔條好拂江頭路千縷萬縷牽情緒馬上郎君新得官阿誰解使留春住留春住春欲歸江南江北栁花飛栁花飛渡江水遮莫東風吹不起楊白花貢師泰泰甫楊白花無定止昨日宫中飛今朝渡江水江水茫茫千萬里綿輕雪薄春旖旎把臂踏歌歌未巳石頭城邉風亂起楊花白無定止采菱女落日照淮甸中流蕩回光窈窕誰家女采菱在横塘風吹荷葉低忽見紅粉粧紅粧背人去驚起雙鴛鴦鴛鴦去復來烟水空茫茫段節婦吟河可塞山可移志不可奪義不可虧妾為段家婦年紀方及筓上堂奉翁姑入室擕兩兒兒死夫亦死此生將何為昔如雙鴛鴦今日為孤雌昔如三春花今日成枯枝寒風吹短髮明月照空帷百年在世能㡬何父兮母兮不我知青天在上將誰欺㓜輿折齒歌羅缺澗谷秋衫未成錦機語棠梨半花鳳一羽象床雪綜小龍梭細穴銀光吐冰縷西鄰郎君東海歸芙蓉半白杏雨肥十二闌邉說幽怨勸織南浦鴛鴦飛匿蘭含蕙無消息春醒丹霞漾玉色小龍呵出風雨聲奔騰觸裂雙白石白石國城三十六女子軍來兩城覆鸞歌猿嘯强激昻百戸風來如箭簇章臺公子真豪縱復以微言相感動郎君切莫更痴心忍作甘心可人痛海樹歌林缺羲元江海之東龍君所都火精夜浴海波煖鬼仙催種紅珊瑚珊瑚枝老愁天呉中有海人長一尺别種雲根烏玉色卑枝交羅屈生鐡樹寒水鴉栖不得白龍魚服枝上嬉漁父舉網幷得之動搖光怪龍女知鮫人泣血勞相思漁家入手不敢㸔沙頭棄之光撩亂老禪缺之挂苔壁三月坐㸔忘眠食蛾睂鐡樹琪林枝此樹一出空羣姿驚濤千里漬蒼潤龍筋不受秋風吹禪僧愛客勝愛樹持以贈客翻得睡青玉案明月璫不如報子露華章愁來思樹撫石床髙歌一曲雲滿房天台鴈蕩長相望聽琴歌楊夀景熈十八年少誰家女綽約容儀衣楚楚秋波瀲灔映春山暫駐空刀裁白苧輕移蓮歩出重幃玉繊閑理焦桐絲琳琅婺女不足數前身疑是蔡文姬一鼓天風生再鼓山月明蒼龍夜啼老蛟泣孤鸞别鶴不敢鳴一絃宫牛鳴古盎應黄鍾二絃商梧桐葉落𫾣銀床三絃角野猿暮嘯岩花落四絃徵百囀黄鸝綠隂裏五絃羽洞庭蕭蕭落寒雨大宫小宫錯雜彈一堂魚水情交懽我聞此聲重歎息歴代聖賢能作述杏壇千古有遺音何須更聽湘妃瑟杏葉黄張翥仲舉杏葉黄杏葉黄蝴蝶雙飛來飛來東家墻東家女兒繡衣裳可憐蝴蝶惜流芳粧髩無心蘇合香起彈牀上筝自歌杏葉黄杏葉青時君去鄉坐見黄落思斷腸安得致之在我傍君不來天繁霜寒漏明次韻王子常寒漏明時一聆夜長不能寐月色明階庭西風落葉争秋聲鷄啼未啼霜滿城城中有思婦正促征衣成東家西家砧杵急使我起坐時時驚歸心如廢弓屢折不可檠寒漏明時一聆嵗云暮矣三首送李五峯之溫州嵗云暮矣子將焉之江南木落鴻鴈飛娟娟美人淮水湄淮水去不止相思日千里嵗云暮矣子將焉往燕山雪片大如掌娟娟美人淮水上淮水日夜流相思人白頭嵗云暮矣子將焉行江空木落天雨霜娟娟美人淮水旁淮水不回頭行人上蘭舟青青水中蒲青青水中蒲水落蒲根見無車可裹輪且織乗牛薦種蒲水中央夜雨生秋漲青青蒲根萍却居蒲葉上乾坤清氣巻八
