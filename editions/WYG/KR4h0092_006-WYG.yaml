body:
  text: 乾坤清氣巻六明偶桓編七言古詩送周生李孝光季和二月已莫江水深春風吹折行人心山頭明月落未落杜鵑夜半莫哀吟泊船上有青楓林三月欲來花繞陌又唱銅鞮送行客男兒莫爾可憐生男兒生身好顔色拔劍起舞雞鳴柵沙頭酒店江邊楊栁金蟲落雨過桃花香漠漠沙堤小市似新豐阿姬十五當壚惡縷金半臂雙鴛鴦翠杓銀罌勸客嘗嘶殺門前五花馬羅敷有夫空斷腸和陳叔夏章字韻詩送此山師天孫織錦當朝陽銀梭軋軋回天章麒麟鳯皇映東壁煌煌珠笈帝所藏分送天人寳花雨紫狐夜泣龍髯塵袖間明月大如屋老蛟來飲銅盤露天孫何曽辛苦為春風吹緑雲錦機娉婷盈盈渡河漢世上那有新相知送達兼善典簽江頭風多花暗天舟子擊鼓牽官船繡鞍大馬來如煙學士翠鵰袍領妍袖中三尺軟玉鞭手揮送者日在山隴西男子更致言東方民力願少寛達官擔橐横索錢先生歸到明主前上言赤子天哀憐仁人在位如解縣大臣不讓臯䕫賢天下畫一徽張絃未將鼎爼烹小鮮如吾但當歸力田眼見霖雨開豐年墻下飯牛薺花圓送陳君禮之婺女兼寄徐仲禮陳公子騏驥騊駼一日馳萬里珍怪生從渥洼水不隨衆馬仰秣芻泛駕亦莫牽鼓車陳公子公起為我舞我能為爾歌古來豪傑不擇術蕭曹刀筆終身多身為國士足可惜致主堯舜今何如陳公子努力富貴勉自强白髪坐見千丈長鄒陽枚乘焉足學去學董子登賢良讀書未及無伴律脱令貧賤猶馨香陳公子我之故人柏臺史三年不得一書紙鞭麒笞鳯作官府往往吹笙碧雲裏芙蓉衣裾雲錦褠手奪天巧天孫愁豈憶故人在下土夜半短衣行飯牛陳公子我有幽蘭白雪之古曲不辭為言歌宿宿有使東來即寄書莫學故人忘我為舟中為人題青山白雲圖江氣贔屭如蛟龍曉風吹落金芙蓉神女凌波洗雲去暮為行雨陽臺東朝來白雲散白石小姑蛾眉翠欲滴老蛟化為百歲翁彭郎磯頭夜吹笛送林彦清有客新自東方來瞳子如月無纎埃言昔東見容成君接上軒轅張樂之層臺手捫青天冷至骨白榆列宿何崔嵬軒轅仙成去已久皆騎威鳯驂龍媒珠璫明珮隔風雨天門晃朗相當開仙家玉女少愁思踏雪雙歌紫雲迴君嘗教我三洗髓已覺靈氣生根荄我時坐客桂樹下縱之使言手拄頦客似師横差短耳眼似恨小髯䯱䰄不見横君三十年眼中見子吾已衰却憶相擕入鴈谷山中二月如天台風吹桃花行水靣大笑酌我紫霞杯客今好游自不惡名山往往多竒才倘逢俗子莫與語世貴瓦缶輕尊罍舟行江中慎濯足磯下乃有鼈與能更莫然犀照水怪自倚善幻驅霆雷望見九華足雲氣一上絶頂驅蓬萊題楊鐵崖琴書安樂窩舉世之樂無如鼓琴琴可以禁人之邪心易人之哇滛舉世之樂莫如讀書書可以絶小人之狹邪履君子之坦途世人為樂千種有不如我樂長可保叶彼有嗜飲樂飲逢毒若酖艶妻懽娛自令身枯溺缺貨殖為盗賊積崇勢淩人鬼神斷嗔蚤官驕子疾為禍首或世所樂自詭神仙累萬人學無一長年有樂放恣毁除鬚髪捐棄父母終竟不覺有察于獄謂彼不憯性習浸移久而泰甚凡此衆樂豈不可懐不如我樂無患與菑鐵仙左琴右書傳終日危坐笑以咍忽見吾詩仰天歌鐵仙豈不大樂哉曹伯珪築室曰桂齋戲作俳偕體釋大訢笑隠阿仙騎鯨白銀闕醉折秋花餐玉屑霓裳曲散墮清塵涼夜素娥悲白髪玉輪碾香空翠寒流光萬里君合懽大星漸低海色白髙齋翠影空團團萬巻芳心期厚地憔悴秋香忍相棄百年空使富貴覊淮南小山歸不歸扶桑行送銛仲剛東歸丁復仲容日出扶桑根日上扶桑頂海色秋茫茫天光何萬頃扶桑日東出若木日西落日出天始明扶桑人不惡扶桑有國自鴻荒有國有人天性良亦復有君臣棟宇垂衣裳自古國有主不知何姓氏聞自周中王世嗣相傳宗揖讓至今惟一姓不識有興亡君君臣臣父父子子至道之綱何弛何張且吾聞之扶桑之國人寧殺不受辱豈不謂死亦何短生亦何長身在義所恥身死義不忘皇元發仁被六合海服逺來貢大舶凌廣洋陳辭極懇款器物盡精緻黄金鑄甲白日光大珠徑寸夜發芒利刀截鐵斷兩旁水玉拾海底湛澈團天漿竒才妙識不及數一一具獻無詭藏上者國有使下者通販啇年年以為常奈何漢中葉獨用桑􅊼羊内府無錢愧張武大官小吏貪如狼懐金辱明主穢徳腥外邦彼豈侮大國顧敢為猖狂夜半海水赤南風無回檣十年不遣使東天遂裂長鯨奮怒火熾揚波濤洶生海中不寧上人何年來瞳人正碧􅄠未蒼詞句所發如衆妙香自言讀書在扶桑慕法五天竺十七來錢唐十八姑蘓住浩歌濯滄浪問劍虎丘石拄席楓橋霜古臺吟鳯去新寺訪龍翔振衣香爐顛洗鉢三石梁天上歸來虞閣老留之卄日埽室置禪床笑謂門生及兒子海國有此圭與璋一一作歌送彷彿扶桑之故鄉珊瑚樹底龍所宫照之五色雲錦章龍兒䕶惜不得睡中天夜掉紫玉幢意用慰此遥相望往年上人去我在霅上不得見前年上人歸我方僦宅園中央日夕還往雙檜下列榻坐受南薫涼冩詩不記首把酒無數觴苧袍浮霜踏月色夜未及鼓猶擕將雙檜先生不及仕抱甕灌園而已矣有家何曽隔海水有路未即還鄉里園芎二畝差可擬菜本作羮播其子日日月月逝莫止朝朝莫莫聊爾耳此非天運固如此扶桑之國邈東溟子其懐歸子所應天之所在子無能方今天子聖且明子能有道玉帛徴林泉之家從所營子子孫孫無盡燈子國君臣家父兄一日聞之千載名子毋扶桑歸聴我歌此扶桑行月灣釣者歌月灣釣者天與閒長日釣魚明月灣黄昏坐到月上山天低月高人未還月圓在天半在水明月灣頭人所喜先生月灣家密邇坐釣明月那可已波神起笑㺯明月月滿波心魚撥剌柔緍揺月寒餌没爛月錦鱗魚上出得魚叩月喚隣家煮魚和月吞香霞舉杯月來金滿花湮光漾月天無涯杯痕倒㵼月入腹月興惱人清不足杯空仰天月照目顧影翻憐月孤獨夜深月冷霜滿天勸月不飲月乃延置杯餽月坐月前月謂汝飲天之縁呼童就月即更酌月故憐人月不落月在憂來無處著但恐樽空月相却豈不知曹老瞞明月可掇憂無端豈不聞嚴家灘漢月不滿羊裘寒非熊辭月就西伯夜夜渭川空月白未如明月灣頭客釣月取魚賖酒喫忽自笑把酒問月者何如古人今人月在諸金尊照月長不虚胡為捉月騎鯨魚青溪好月連江湖迴環九曲月若鋪我今亦願為月灣釣者徒磯頭展席為月沽酒後耳熱醉舞明月歌嗚嗚題長江萬里圖天不限南北人方樂畊漁承平百年日慷慨萬里圖恍然舊游地浩蕩清興發放船白帝城下秋載酒黄牛峽中月明發古夷陵為訪姜詩井披蓁罥修筒寒花汲空冷湍流激柔櫓崚下荆門灘荒藤漢景廟落日還登攀霞沈宜都驛夜宿松滋渡水色瑪瑙光繁星粲無數荆南亦坂郢章華猶故臺壊堤明斷鏃團沙如粟堆雨休雲夢澤天空洞庭水曹瞞敗軍處殘灰餘故壘仙人白雲表招手為我留待網嘉魚穴銜華黄鶴樓醉來思禰衡憤起叱黄祖不見人間來鳯皇何用筵前賦鸚鵡磯頭若蹲虎江流多怒聲客枕不成寐已在潯陽城飛瀑瀉銀河匡廬倚天碧遥憶義熙人黄花空好色黄陵二女廟小姑江上頭舟人問風水幾日到揚州月色過馬當長風沙在眼鴈投秋浦雲鴉歸戍樓晚蕪湖水東注逆磯無回波兩山隔江滸倒浸雙青蛾抵掌女媧石浩然歌白苧太真然犀真自愚謫仙騎鯨竟何去黄鬚天子七寳鞭曽挂當塗道邊樹一百二十里樹色連長干豪將多反覆都邑無時安金蓮曉歩㓕玉樹朝歌闌千載空舊迹令人起長歎天運開昌期地險亦何有年年江上春東風入楊栁往來白下亭日夕金陵酒􅈎船出金焦越賈行松維况聞巴人婦半是吳女兒我生亦何幸白首無亂離所願億萬年永永長如斯送林彦清歸永嘉鄭元祐明徳玉晨明皇大道君丹霞上宫校瓊文芙蓉製冠珠織裙並乗緑轝駕飛雲有美一人岸青帉來從東甌東海濆不笑不語寡戚忻帝驚顧語仙聖羣是能執持神化藴子昔夢噩帝怒賁拯子于危釋憂慬報崇仙堦秩孔殷尚念無以章殊勲琳宫紫幄珠流熉靈來乗純去乘雯影響濁世那由聞神孫飄翩接芳芬烹陽冶隂調夕昕氣神元精駐不分由能錬之久益賁水浸不溺火不焚是謂真人非外棼鴈蕩木落溪沄沄子今東歸似驚麇將與浮脆同氤氲釃之清泠濯垢氛我將學之意則勤其如衰年日已曛况復歲晏手足皸作詩送子空云云五峰將還維揚因言沈侍郎在吳賦此以寄二月桃始花三月客還家階前踈雨落堂上春衣薄為言沈約在吳中玉壺青絲酒如空春風相過蕙草緑芳菲滿堂樂未終懐友人俞伯貞沈存肯堂去年秋風巻黄埃美人躍馬沙邊來今年秋雨洒白日美人逺上黄金臺黄金臺下燕山道漠漠寒雲接衰草鴈飛不斷青天長長使征人路傍老美人美人胡不歸清霜凋盡珊瑚枝臨風三嘆思欲絶悲莫悲兮生别離擬梁簡文體送鐵文彬左丞奉召北還鄭基本初將軍功葢世揚威浄海隅虵矛縈後騎虎衛促前驅三門開地甲八陣轉天衢鐃鼓潮頭響竿旗日下趨飛梯躡暗島合璧示宏圖降醜尋封奉帝廷聖書銜鳯落青𠖇再召伏波歸闕下南荒銅柱已鐫銘騑騑返駟馬黄河春始融輕風流碧塞晴日炫彫弓栁折秦山麗氷消泗水通錦鶻窺長坂白鴈墮春空黄封將法酒羽檄候元戎麟閣圖形已預知更應設帳㑹瑶池夕劍花光歌吹歇御帖重頒紀宴詩美人圖郭翼羲仲鬱金殿前楊栁新長門草色春復春下堦微微動香步波影晴光流素塵翠釵蜻蜓彫玉珮攬髻回風舞裙帶合懽花落無好枝伯勞單飛鶯亂啼玉音夜夜宫車絶露㸃蒼苔怨明月送秀石芝上人請龍門禪老住奉聖寺芝草生秀石野樹含碧姿青山為屏幛白雲為藩籬菩提山中之人胡不歸乃言要與龍門期龍門吾友僧者竒爾毋恃力奪去之龍門山高開翠微兩崖峽束雷雨垂六月隂隂㸔雪飛不肯走熱觸且馳南澗送爾來乞詩爾速行矣無遲遲交游莫年星亂稀微斯人兮吾將疇依微斯人兮吾將疇依雲泉生歌雲泉生氣如雲其心玉堂氷汪汪萬傾澄不清雲將龍變化氷與芙蓉青華岳天風動飛鶚朝陽噦噦孤鸞鳴雲泉生其家亦貧無一錢躬畊何用南陽田諸侯不薦士朝廷不求賢讀書試吏東海邊君不見漢留侯掉舌曽為帝者師張鎬窮谷一叟耳丈夫際㑹各有時騏驥一日千里馳未遇伯樂猶鳴悲荆山之璧亘光彩世無卞和誰識之君于富貴端可期施之政事無不宜浮雲漠漠抗高節君之心兮江水知捧檄自甘升斗禄城裏青山照書屋回首西風𤓰戍秋把酒青天送黄鵠黄鵠兮高飛啄琅玕兮飲瑶池再飛直上昆侖栖鷄鶩螭龍豈與尺鷃同藩籬雲泉生錦袍仙人爾之祖步武金鑾動人主采石江頭秋月高熖熖文章照千古功名事業在壯年安得與子同飛騫甚矣吾衰也久矣山中早晚結松屋遲子歸來兮月明爛醉歌雲泉題畫松壁鄭東季明八月江頭茅屋破日日盲風雨交和眼前安得大厦成拾遺歸來淚空墮紛紛萬木争出山𤨏碎榱桷非為難萬牛莫挽楩與楠往往棄置丘壑間獨立風霜二千尺未識何時逢匠石白頭老樵空嘆息題趙魏公墨竹陳基敬初魏公仙者徒清風動千古夢斷江南春飄飄遊帝所鈞天張樂如洞庭十二參差鸞鳯鳴歸來記得當時曲寫作湘靈鼓瑟聲高秋素壁含蕭颯彷彿凉風起閶闔滿天明月浸鷗波嵗晏懐人霜露多僕嘗夜夢從彦成飲彦成曰此荔枝漿也飲之令人夀子能為我賦之當贈三百壺予自口占一詩覺乃夢也及㑹玉山聞彦成釀酒果名荔枝漿以夢白之不覺大笑玉山曰君當書此詩吾當與子致酒以質所夢因莞爾書之彦成見之必更一笑也凉州莫謾誇蒲萄中山枉詫松為醪仙人自釀真一酒洞庭春色嗟徒勞瓊漿滴盡生茘枝玉露瀉入黄金巵一杯入口夀千歲安用火棗并交梨不願青州覔從事不願步兵為校尉但令喚鶴共呼鸞日日從君花下醉春衣行送陶栗夫之杭楊基孟載春衣未著春風起紅白梅花似桃李江頭美人舟欲行一幅雲帆挂春水吳江二月春水生江漚涓涓江草青一雙玉壺不忍倒兩個黄鸝差可聴問君東行向何處云向西湖水邊住蘓小門前野草花傷心不似當時路當時湖上酒如川吳娃蕩漿歌可憐玉簫嫋裊鳴春雨珠箔玲瓏巻莫煙百年佳麗空回首獨有參差路傍栁無奈東風翡翠絲等閑摘向行人手君行先謁貢尚書北斗之南一鉅儒聞說春闈選多士莫使諸生賦子虛再謁杭州謝太守聲華已播羣公口豈無美政化蒼生亦有新詩傳不朽苗軍寨中春草多楊公長騎白馬過英雄既往行伍散吳兒至今能楚歌歌聲嗚咽悲未已何趙劉楊相啖餌古來壯士争相妬出乎爾者反乎爾酒酣江亭望東粤吳郎霸圖今已歇斗牛中間落天星十月烏臺雨飛血祇今三闗方苦戰羽檄交馳急如箭不是諸公英武姿嗟我蚩蚩命如線願君勿愁功與名鄉里竪子咸公卿相逄未尚秦儀辯欲以空言致太平空言呶呶何足補自有神模定中土世祖洪基億萬年中興孰謂非光武蹇余一身苦飄泊未甘餓死填溝壑平生不作兒女悲今日因君淚雙落摩挲淚眼為君舞舟人為我槌大鼓家貧愧乏黄金贈欲别未别心最苦陶郎陶郎爾今去後勿我悲我無羽翼相追隨人生窮達自有命丈夫節義不可虧嗚呼丈夫節義不可虧眼前富貴孰取為陳公輔聴雨軒吾衍子行帝子吟瀟湘瀟湘雲煙竟茫茫楚客歌洞庭洞庭木葉空秋聲豈如敬亭山前野人宅西風不驚響雲滴燭花未剪書在床愛爾𤣥音起虚寂忽無復忽有天洒來自然山中枕流人如聴洗耳泉神融意適有真趣汝南郭泰來何莫忽憶隴頭水罷我膝上琴旅人動遐思無此瀟洒心君不聞簷花悲歌杜陵老山雪空回剡溪棹祁寒暑雨惟怨咨流麥漂衢竟誰道與君歌聴雨秋雨最可聴明朝雨歇雲亦散月色滿地秋𠖇𠖇望夫磯劉致時中望夫山頭日欲頽望夫山下江聲哀山頭日日風雨落江上不見行人回空山亭亭幾朝莫猶記行人去時路知君渡河長不歸恨不當年逐君去此身化作千仞磯石猶可轉心不移長江水涸黄塵飛行人應有歸來時送李公質之揚州文質學古海風吹秋秋無痕秋風洒落秋無魂樓船萬斛戞明月怒濤駕空相吐吞隴西才人天上客古劍飛花溜新白腰纒十萬何足云載詩未許揚州鶴揚州瓊花天下無為我貰酒提胡盧醉來莫問江南侣豪氣逼人真丈夫舟中夜歸釋宗衍道原夕風蕭蕭雲氣亂篙子移舟頻觸岸溪頭犬吠聲轉獰沙際人歸暗相喚兩三家村稍已近十五里程纔過半一星不出雨欲來時復推篷仰天㸔題趙子昂畫馬歌陳泰所安九原駿骨埋地中一夕盡化霜皮松畫史刳松作神墨埽出麒麟帶松骨煙沙漠漠披風鬃精氣炯烔房星同天山無人草木白西極日没黄河東時平使汝困轅軛不得變化騰為龍黄金擲送燕臺下當日君王惜高價自從汗血去人間老死英雄空見畫千年只說魏將軍弟子韓幹終無聞今之畫者趙翰林嗚呼三晉賢子孫汴京董缺則裕仙人一巻石片片民瘡痍皇城一坯土寸寸民膏脂古人惜之如金珠取之盡銖錙今人視之如沙泥棄之如蓬茨古人不知今人嗤今人不知古人痴古人今人孰是非山兮城兮竟何禆城有時而荒隳山有時而崩虧山崩虧兮塵迷迷城荒隳兮草離離塵迷迷兮飛刼灰草離離兮化隍池君不見日月爍樵牧移寒暑薄風雨吹豈無一時好千載有餘悲嗚呼豈無一時好千載有餘悲乾坤清氣巻六
