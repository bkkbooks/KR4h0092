body:
  text: 乾坤清氣卷五明偶桓編七言古詩望嶧山鮮于樞伯機東方巨鎮宗岱宗羣山列侍臣妾同西南崛起一萬仞却立不屈如爭雄何年天皇下星宫墮地化作青芙蓉外如刻削中崆洞閬風玄圃遙相通我昔東遊訪青童羣仙招我遊中峯悔不絶粒巢雲松失身誤落塵網中如今可望不可到􅋈舟空羡南飛鴻神仙可學事已晚安用屑屑悲秋蓬吾聞嶧陽有孤桐鳯凰鳴處朝陽紅安得斫為寶琴獻天子為民解愠歌南風木牛歌劉詵桂翁吾聞景升飬牛千斤肥椎之不了士卒飢王生號牛八百里徒瑩蹄角將何為此猶虛名乏實用負任毫末了不支何如武侯象其似獨化枯稿為神竒平生憂人不自食餉運常飽千里師刳心俯首竭筋骨氣象深穩人誰疑中多抱負外遲鈍論功猶勝狂犢馳雖無奮勞效耕種尚以微力禆興衰自期中道可不廢雖有捷徑寧能追惜哉清渭不可渡未得束載四海隨我常讀書論成敗魏不足控為吳持江陵蹶羽子規衄郿南衰髮秋風知前謀既輕後過重天意蹉跌長如兹浩歌木牛感豪傑空有遺恨供人知天馬歌贈甲寅進士陳所安房星夜墮滎波中驊騮奮出如飛龍昂頭星宫逐枉矢振鬛雲闕追天風漢家將軍三十六分道出塞爭竒功當時一耀萬里盡蹴踏少海霓旌紅韓哀謝輿伯樂去蹶塊誤落奚官庸十年皂櫪食不飽雖有駿步難爭雄春隨錦韉北陵北秋卧衰草東阡東時從駑駘飲沙澗未免泥滓沾風鬃夜寒苜蓿山谷逈長嘶落月天地空時平文軌明蕩蕩萬里穹荒無虎帳交河不用踏層氷褁足山城學馴象吾聞天子之廄十二間驥騄並收無棄放金根雲罕出都門喚取雍容肅仙仗送劉玉成之杭錢塘之景天下無我昔未遊知畫圖吳王闌檻神仙壺沙河燈火錦繡衢四城翠翹上靈隱萬家畫舫遊西湖孤村梅花白雪廬大堤楊栁黃金株百年風物未盡改遊子那得聞其初錢王觚稜墮秋蕪趙家宫殿佛鼓喧朝晡西風吹潮落越嶠夜角呼月沈姑蘇劉郎妙趣世希有五色粲爛披珊瑚請君一往覽古昔酹以千斛之酒鵝黃酥寫以文考賦魯城之筆千萬字吹以東坡弔孟德之簫聲嗚嗚歸來錦囊壓蹇驢與君共簸明月珠題文山衡陽躍馬圖和須溪韻將軍紫綬馳燕然丞相白髮祁山前重瞳悲歌泣虞美伏波眼穿鳶墮水英雄相望千萬年西風荒草迷五原延秋王孫折金鞭女墻明月銅駝間衡山春濃風日好紫韁電轉人未老豈知蹶塊追海橫海天如雪狂瀾倒玉樓十二春衣妍流雲却月爭取憐落花金谷獨一死蒼旻不語丹心傳劉家的盧空識意金粟龍媒俱久逝少年相對那得知掩圖醉倚南風睡銅雀硯周霆震亨逺柏梁仙掌辭深殿西晉銅駝棘中見魏臺片瓦閲興亡流落人間還作硯無情漳水去不回西陵罷望餘蒿萊分香賣履俱寂寞獨此微物留餘哀客卿子墨辭滂沛管城中書鋒課最銷磨不盡建安年照見姦雄心膽碎按頭拂拭塵土昏幾劫冷灰藏燒痕不足文房收薄用斷磚殘礫復誰論杜鵑行我不暇自哀古帝魂春來却念今王孫王孫馬蹄去何處但見黃鶴落日故宇煙塵昏我昔蜀帝空名存絶憐王孫玉牒尊春宫天鵝壓酥酪凝香夕帳貂皮溫紫茸吳姬河西曲白馬怯薛鷹絛捫居民只尺甚天上冠冕臣僕羣趨奔漢川一炬冦飛度四海寒食如荒村暴骸泣霜關月老恨血埋雨江波渾投鞭七寶委道側落花送客慚春恩勸歸我亦久流落幾欲出口聲復吞莫道人生歸去好江南無處弔王孫驥羣空幽燕之馬毛骨殊龍種肇自昆崘墟百年帝業振長䇿玉帛萬國同車書明堂大開武庫列白日矯矯升天衢昨來毫頴吐芒角赤祲光怪干斗樞河流䪺徙渥窪竭天廄十二駑駘居中原塵起遂鼎沸御者撫轡空長吁盛衰反覆古來爾誤國致此其誰歟英雄緩急何代無惠養汗血由攻駒五陵佳氣育神雋往問伯樂今何如代北鷹隂山角鷹距如鐵天壓穹廬飽霜雪御前校獵誇逺揚海口朔風吹地裂憑陵殺氣隘原野走馬身翻臂韝掣秋飛鴻鴈春燕鶯分寸躋攀勢縣絶山東一夕塵沙黃狐兔根深豺虎穴古臺寂寞呼不聞坐使荆榛遍城闕嗟哉爾曹既不能訴寃口流血又不是造天逢翼折上林供奉濫君恩架上錦絛長綰結偷生忍恥獨何心天下滔滔同一轍哀余淮南昆侖烈風撼坤軸日車斂轡咸池浴六龍飲渴呼不聞赤蟻玄蜂厭人肉荆襄弗支廬夀孤江東掃地如摧枯忠臣當代誰第一七載舒州天下無東南此地關形勝天柱之峯屹千仞當年赤壁走曹瞞天為孫吳産公瑾我公千載遙相望﨑嶇恆以弱擊強孤城大小二百戰食盡北拜天無光當關拔劍蒼龍吼盡室肯汙姦黨手摧鋒闔郡無生降羣盜言之皆稽首堂堂省憲羅公卿建官分閫日募兵哀哉坐視無寸䇿遂使流血西江平向來不曉皇天意大將南征死相繼一時貪暴聚庸才玩冦偷安叨富貴河流浩浩龍門西燕山萬騎攢霜蹄英雄暴骨心未死去作海色催朝雞玉衣飛舞空中見太息孤忠鏖百戰五陵元氣待天還睢陽誰續中丞傳哀李潯陽蜀川會漢投匡廬潯陽之厄江西樞李侯伏節忠貫日存歿誓與城池俱夫何郡將弛練卒世祿忍負私其軀冦來談笑啓關遁坐使邑井成丘墟侯時力疾短兵奮臣首當血心當刳魂歸謁帝慟伏闕塗地肝腦民何辜臣衷願瀝付渠答臣首欲飛宜僕姑誓堅洪壁殱衆醜却掃淮蔡匡全吳黃塵四低黑風淡赤豹騰駕蒼虯呼山川幾劫鑄英氣上遡古昔誰其徒平原汗馬河北重江淮安堵睢陽孤顔張凛凛心未死逈立千載誠相孚况聞有子殊激烈義在從父輕頭顱石頭之袁姑孰卞兩間忠孝何時無紛紛賣降與棄甲仰視汗喘呀長吁惟公蓋自元氣立顧盻所取皆詩書當年射䇿首多士已分一念金無渝朂哉謀國慎所託古今大勇惟真儒哀張千户貫楊將軍年十九祖父死邊功不朽虎符前月始蔭官衆議南征推好手奮身萬衆首搴旗偏鋒再進深履危瘴煙毒霧晦白日飲血拔箭輿尸歸閨中青年美如玉昨夢夫還兒在腹兒生夫死時日同忠在王家三世哭隂山之虎出文彪海鷹抱雛霜角遒雄心九死知不悔散入鼓角邊城秋堂上老姑髮垂縷帳底兒啼淚如雨淒涼部曲舊營存千里魂歸投幕府幕中大將坐封侯生平不識青海頭贈鐵腳劉道人馮子振海粟道人鐵腳更鐵冠山人鐵靣仍鐵肝道人山人兩相值靣色腳色俱蒼寒道人鋒稜崖骨削山人劍氣星斗干山空人去夜猿别一葦北渡黃河乾盧溝月濕波蕩潏太行雲皛峰巑岏古來豪傑數燕代長轂騕裊榴花鞍呼鷹射鴈逐雞狗脫手柘彈排金丸璧門雙闕照燕碣虎豹蹲踞蛟龍盤布衣一語動萬乘不識宰相為何官雲飛風起對紫檀血指瀝瀝衷如丹尚方百奉諂骨裂山人九死聖度寬萬里放還真墮甑回視歲月驚流湍南山清渭一夢覺但見落葉吹長安道人捶札未棄置欲刻朽骨為榮觀野麋豈是麟閣具滄海自分終魚竿窮林尺鷃無處著豈意思想南溟搏人間新貴奪紈綺曲眉婉孌浮山巒為渠向作白玉盤眼耳鼻舌渾熱瞞劉郎他日高眼看歸來取鋏歌馮歡送彭丙翁胡復初采詩吳缺原可君行為我觀海潮浙江亭下風蕭蕭君行為我泛湖月蘇公堤上楊花雪只今何處不聞詩南音寥寥君得知海風吹寒翡翠尾秋露滴老珊瑚枝山川光怪豈敢閟采之采之盡君意願君勿學梁昭明是非未定輕間情願君但似吳季子四海之風定誰美馬蹄跌宕輿地開幽燕浩浩風雲來丈夫西遊今可矣前日江南數千里别廣西憲史張漢英陳缺渙翁長吟不了秋階蛩君飲不盡春江虹涓涓泠泠仙掌露落落穆穆長松風少年憲幕廣西去意氣倐忽超鴻濛御史行部玉花驄南度瀚海君與同日出鰲頭指若木月明鵬背看芙蓉有時調笑却蛟鰐赤手得珠龍伯宫君才一似列蕃貨明犀色射珊瑚紅象牙鶴頂世所有桂蠧盛以玻璃鍾歸來老母怪方朔何事紫薇衣袖中劍光差差不可狎寧教小蟄全其鋒願君此行好自愛雲氣蓊蓊東崖東題徽宗織錦圖楊缺子承君不見文君白頭吟氷絃撥斷鳯皇琴又不見明妃離漢闕馬上琵琶青冢月爭如深宫白晝長美人睡起慵梳妝能將千條五色線織成一片雲霞光一姬織罷春纎困香軟東風扶不定雙蛾淡淡逺山橫嬌羞未醒梨花夢一姬辛勤不下機機聲軋軋穿梭遲都來半軸秦川錦不知補衮當何時行雲隨影肌凝雪斜軃烏絲寶叉滑桃花瓣脫芳塵中壓碎環兒馬嵬襪道君玩物何拳拳黃金博得芙蓉仙尚期千秋萬古傳玉書圖記宣和年金戈南下闞􅡟虎中原白骨埋黃土青城赴約落姦謀江山如錦誰為主一龍北狩不復還我今聞之心猶酸豈料人間存此卷相逢依舊春風靣哭女醜行假天祐吉甫假家五歲花枝女繡帽彩衣嬌楚楚全家看作掌中珠不但阿爺憐惜汝阿爺官滿常熟州移家來杭年未周無心偶得汝懷抱使我䪺解平生愁自從生汝三月後喚汝醜哥要長久阿爺正因憐汝深命名剛以好為醜蘭芽玉樹春照映綽約身材好情性易得易養不藉人最喜生來不知病一年二年長精神三年言語字字真舉頭四靣候人意識人歡喜知人嗔四年行履輕且便堂上來往如春燕阿婆房裏索梨栗大姊床頭覓針線眼明望汝到成人門楣之秀閨房珍斯須不見情緒惡逡巡或來顔色新至元戊寅月窮紀江上竒寒寒墮指家家兒女病痘瘡十家之中九家死阿爺適奉差遣行臨行顧汝難為情舟中一見九回首道上半旬三寄聲明年正月初七日忽得家書知汝疾置書案上不忍看便道多凶還少吉良久殷勤問來者答言勢惡君當舍瘡頭黑陷苦爬搔目瞑口噤如盲啞爾後三朝書再至知汝繼世即遐棄遡風南望淚闌干十日如癡復如醉汝生汝死都在天與汝聰慧不與年含靈蠢動保夀命造物不能天兩全華亭官舍寒栗烈簷雨淙淙燈暈結一時往事到心頭誰道阿爺腸似鐵原缺官事得容與江橋明日風帆舉到家剪紙作金錢桂酒椒漿當酹汝題胡修撰金華雜興小藳黃清老子肅吾聞金華之山東南峯石壁巉絶如飛龍滄溟盤礴幾萬里但見扶桑日影倒挂金芙蓉山中仙人古愚老青霞落落雲間松翩然獨去遊無窮謁帝西上昆侖宫春苔染水碧于酒輦路人家插楊栁金莖露瀉明月珠散落人間作星斗君不見西山日上紫氣橫花下有人調玉笙太平擬進九成樂五雲樓閣生秋聲上繼學王公大風卷地沙塵昏十日不得一出門胸中俗子浩于海思欲一見雲中君雲中之君玉為節豸冠峩峩照晴雪振衣驚落琪樹花片片人間作明月有時霹歷生風雷松聲曉失青崔嵬衆芳收雨作春色瑶草緑遍三蓬萊有時筆端吐光怪干將生花五龍蛻廣寒天上聞步虛萬壑千崖度秋籟嗟豫困學無所成仙家幸識黃麒麟願從輞川覔詩法白鷗吟入南山春丁卯及第歸和揭經歷見賀詩兒時見月欲上天昆侖獨往三十年山深染得秋水緑所思忽到梅花邊螢燈照雪心炯炯危坐空齋似禪定落花啼鳥意不驚澗瀑松風自相應書成上謁天帝君半夜掣起扶桑雲麒麟峥嶸列萬户虎豹屭贔縣千鈞翠盤八珍為君薦劍珮鏘鏘揖羣彥木天日上五色雲知有百靈護經傳春城如海花滿園狂吟中有白與元至今風雨飛動意垂揚起舞花能言銀潢東流幾時了松下夢回秋又曉蒼蒼此意誰得知蟾闕佳人霜雪皎送海東之海東之玉關之人奈子何一朝趨試當大廷搜竒抉祕如縣河胸中二三䇿發憤精研磨中山兔毫渴濡染緑文巨硯出大沱御卷足揮霍如見山之泰華江之番紫髯長戟凍不折濁流鼓枻氷峩峩得官固好好東之情最真遂使吾儂日相親不誇文字雄退與寒士相推尊淫哇鄭衛非所云闔閭城邊種楊栁栁江栁子子亦聞我有刻玉書願與窮朝昏子若修之可凌雲不廢世間功與名況聞子弟功䇿勛一門科第凡五人瓊林之中翺且翔如此文文而章章所以青城樵者有歌曰海東之兄弟三人如鳯皇我歌曰二雛亦復鳴朝陽再歌曰二雛亦復鳴朝陽王鐵槍像楊維楨亷夫鐵槍兒五代傑滑中歸來義尤烈捷聞三日破南城鐵槍竒兵果竒絶鐵槍折河北裂唐家又移梁日月阿巖雞狗何足尤虎豹一死皮須留烏乎癡頑老魅老不死朝梁暮晉復歸周誰復拔劍知相仇王粲登樓圖臨洮水涸銅人毁西園青青草千里秦川公子走亂離瘦馬疲童靣如鬼俊君威命誇漢南虎視走鹿何耽耽可憐膝下盡豚犬誰復大厦收楩楠落日樓頭髀空拊目斷神州隔風雨平生不識大耳公座上客歸丞相府春深銅雀眼中蒿攬涕尚復思登高江山破碎非舊土版圗何日還金刀荆臺高棲已荆棘丹青寫賦工何益君不見袁家有客能罵賊將軍頭風重草檄漁莊君不見裴家之莊在子午臺池已作張家墅又不見李家之莊在平泉花石亦入陶家園不如漁莊在崑之所官不得奪人不得取或言投長竿蹲會稽釣嚴灘隱蟠溪彼數子者逃名而名至孰能索我于東溪之東西山之西春江冥冥春水瀰瀰桃花亂流跳魴與鱮會稽丈人本釣徒釣竿手拂珊瑚株浩歌小海入東去大魚鱗鱗來媵豫子知我我知魚濠梁之樂樂有餘二喬讀書圖喬家女兒雙芙蓉一代國色江之東亂離惟恐埋百草豈料一日俱乘龍江東子弟孫郎䇿同住周郎道南宅弟兄不減骨肉親喜作喬家兩嬌客明年䇿死鏡中妖銅雀春深愁大喬自是阿瑜能了事黃星一道隨煙消小喬初嫁有如此天下三分從此始風流顧曲本多才風雨雞鳴戒君子喬公教女能詩書豈比小姑持刃為帳中草檄名漢賊已知事屬方頤兒君不見阿瞞晚贖蔡文姬博學才辨何所施天下羞誦胡笳詩題錢選畫江山萬里圖神禹劃天塹橫分南北州祗今天不限南北一葦航之如丈溝洪源發從瞿塘口險峽中擘分黃牛括漢包湘會沅澧二妃風浪兼天浮青山何罪受秦赭翠黛依然生逺愁洞庭微波木葉脫有客起登黃鶴樓老瞞橫槊處釃酒澆江流江東數豪傑乃是孫與周東風一信江上發從此鼎國曹孫劉吳南晉北後倐忽開六朝江南龍虎地山水清相繆渡頭龍馬王氣歇洲邊鸚鵡才名留新亭風景豈有異長江不洗諸公羞宫中金蓮步方曉後庭玉樹聲已秋何如一杯酒錦袍仙人月下舟解道澄江淨如練醉呼小謝開青眸鐵崖散人萬里漚拙迹今似林中鳩不如大賈舶江山足勝遊腰纒只跨揚州鶴樓船不問蓬萊丘平生此志苦未酬眼明萬里移蒼洲烏乎楚水尾吳江頭山河一髮瞻神州孰使我户不出兮囚山囚題馬文壁辨山圖七十二辨一辨高而孤兩雷相望有如大小姑我昔攀蘿上孤辨曽見碧眼胡浮屠生綃一幅在下地三萬六頃鴟夷湖湖山開圖一嘆息胡僧幾歲寄我空中書淵明漉酒圖義熙老人羲上人一生嗜酒見天真山中今日新酒熟漉酒不知頭上巾酒醒亂髮吹蕭屑架上烏紗洗糟蘖客來莫怪頭不巾巾冠豈為我輩設故人設具在道南老人一笑猩猩貪東林法師非酒社攢眉入社吾何堪家貧不食檀公肉肯食劉家天子祿頽然徑醉卧坦腹笑爾阿𢎞來奉足送人之浙省幕官潘純子素東家老人語且悲衰年恰憶垂髫時王師百萬若過客青蓋夜出民不知巷南巷北癡兒女把臂牽衣學蕃語高樓急管酒旗風小院新聲杏花雨比來官長能相憐民間蛺蝶飛青錢黃金白璧大宛馬明珠紫貝西洋船繁華消歇如翻掌官中賦斂年年長里巷蕭條竟不歸華屋重門結蛛網語中嗚咽不堪聞飢狼餓虎方紛紜麒麟鳯皇那復得使我益重髯參軍參軍在官僅一考素髮蕭蕭坐成老上官掣肘下吏罵賴有閭閻獨稱好杭州公事天下繁大材取決無留難參軍纍官日益貴何術可使斯民安乾坤清氣卷五
